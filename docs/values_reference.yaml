# Pod-only labels (applied to pod template only, not Deployment metadata).
# Use this for labels that should only be on pods, e.g., workload identity.
# podLabels:
#   azure.workload.identity/use: "true"
podLabels: {}

# customAnnotations:
#   my-custom-annotation: "my-value"
customAnnotations: {}

# ==========================
# Custom Metrics
# ==========================
# Enable Prometheus scrape annotations on all RPI service pods.
# When enabled, each pod gets prometheus.io/scrape, /port, and /path annotations.
customMetrics:
  enabled: false

# ==========================
# RPI Observability (AI-driven Pulse_Logging summarizer; opt-in)
# ==========================
# Standalone in-cluster service that periodically reads the Pulse_Logging
# database (READ-ONLY), clusters errors/traces, and asks an LLM to produce
# human-readable summaries plus chart/values recommendations. Reports are
# stored in a local SQLite file (PVC-backed) and served via a built-in UI
# at https://<ingress.hosts.observability>.<ingress.domain>.
#
# All in-cluster: nothing leaves the customer's perimeter except outbound
# calls to the configured LLM provider's endpoint. Pulse_Logging access is
# via a dedicated read-only DB user the customer creates and stores in the
# cloud vault as `Observability-LoggingDatabaseConnectionString` (full
# connection string, including the host -- 127.0.0.1 if cloudSqlProxy is on).
# ---- Single-instance deployment contract (v1) --------------------------
# RPI Observability is single-instance by design. The pod owns local
# SQLite state, runs the cycle scheduler in-process, holds the auth
# cache + token-budget bucket in memory, and binds K8s collectors to a
# single namespace. There is no leader election or shared-state
# coordination. Setting `observability.replicas` (or any value that
# implies more than one running instance) is rejected at chart-render
# time. Multi-replica is a v2 concern; do not interpret the
# single-instance shape as an accidental limitation.
observability:
  enabled: false
  serviceAccount:
    enabled: true                    # creates rpi-observability SA in per-service mode

  # ---- RPI ClientID (REQUIRED) ------------------------------------------
  # The RPI tenant identifier (a GUID) that this observability instance serves.
  # Used as the lookup key against Pulse_<env>.dbo.rpi_Clients to resolve
  # the tenant's Interaction + InteractionAudit DB names (ADR-0009).
  #
  # REQUIRED whenever observability.enabled=true. Empty / missing causes
  # `helm template` and `helm install` to fail. There is no fallback,
  # no inference, no single-tenant auto-detection -- behavior is
  # identical for single-tenant and multi-tenant deployments. See
  # workspace doc forbidden/silent-fallback-in-config.md.
  #
  # Find the value: SELECT ClientID FROM Pulse_<env>.dbo.rpi_Clients
  # (uppercase GUID, e.g. 9A39D66C-111C-408E-AE5B-D97880BAC496).
  clientId: ""

  # ---- Node health panel -------------------------------------------------
  # Powers the Node Health section on the System Health tab. Reads node
  # state + per-node CPU/memory from the Kubernetes API and metrics-server.
  # Nodes are cluster-scoped, so this binds a ClusterRole to the observability service's
  # ServiceAccount granting get/list on nodes (core) and nodes
  # (metrics.k8s.io). When disabled, no ClusterRole is created and the
  # Node health panel renders a quiet "disabled by chart values" caption.
  # Some security teams require explicit approval for cluster-scoped RBAC;
  # leave this off in those clusters.
  nodeHealth:
    enabled: true

  # ---- Intelligence Runtime ----------------------------------------------
  # The observability service's AI surface (incident summarization, failure
  # explanation, RCA, severity classification) is served by the
  # Intelligence Runtime. It is part of the observability solution, not a
  # separate feature with its own enable flag -- observability.enabled
  # turns on the whole solution.
  #
  # Single-provider selection: `intelligence.provider` picks one of:
  #
  #   local   -- in-cluster inference (default, served by rpi-observability-llm)
  #   azure   -- Azure AI Foundry or Azure OpenAI
  #   google  -- Vertex AI
  #   aws     -- Bedrock
  #
  # When provider=local, the chart deploys a StatefulSet
  # (rpi-observability-llm) running the rpi-observability-llm
  # image and the observability service routes to it via the in-cluster
  # Service. When provider is azure/google/aws, no in-cluster serving
  # layer is rendered; the observability service reaches the cloud
  # provider directly over its public API using managed-identity-first
  # auth (no static keys required when Workload Identity / IRSA / WIF
  # are in place).
  intelligence:
    # Active provider. Drives:
    #   - which provider implementation the runtime registers
    #   - whether the chart renders the in-cluster serving StatefulSet
    #     (only when provider=local)
    #   - which sub-block (local / azure / google / aws) is consumed
    provider: local                          # local | azure | google | aws

    # Per-inference timeout. Hard-bound so a slow inference cannot
    # destabilize the observability cycle: when exceeded, the call returns
    # a typed AIStatus.TIMEOUT and the cycle proceeds without an AI
    # summary. Sized for CPU inference of ~1000-token briefings on a
    # standard worker with the 7B Q4 model (~5-8 tokens/sec across
    # 8 cores); operators on GPU profiles or smaller workloads can
    # lower it.
    timeoutSeconds: 240

    # ---- Local (in-cluster serving) ------------------------------------
    # Consumed only when provider=local. The serving layer is a
    # StatefulSet running the rpi-observability-llm image: self-
    # contained, llama.cpp server + Qwen 2.5 7B Instruct GGUF Q4_K_M
    # baked in, no runtime downloads, deployable in air-gapped
    # clusters.
    #
    # The model is shipped with the image and is NOT a customer-
    # configurable knob. The chart deploys exactly one model under
    # provider=local. To use a different model, switch
    # intelligence.provider to azure | google | aws and configure
    # that provider's block.
    local:
      # Default points at the in-cluster Service. Override only if the
      # operator self-hosts the serving layer elsewhere on the cluster.
      baseUrl: ""                            # blank = http://rpi-observability-llm.<ns>.svc.cluster.local:8000/v1

      # Serving-layer deployment. When enabled, the chart renders the
      # StatefulSet using the canonical Redpoint-built
      # rpi-observability-llm image. Disable when the operator
      # self-hosts the serving layer elsewhere -- in that case set
      # local.baseUrl to the operator's endpoint.
      deployment:
        enabled: true

        # Container image override. Blank means the chart resolves
        # the canonical Redpoint-built rpi-observability-llm image
        # via rpi.image. Set to an internal registry mirror or
        # regulated-registry pull path; the image must be a
        # rpi-observability-llm build serving the same baked-in
        # model. Overriding to a different model variant is NOT
        # supported under provider=local; switch the provider to
        # azure | google | aws for a different model.
        image: ""
        imagePullPolicy: ""                  # blank = global.deployment.images.imagePullPolicy

        # Container resources. Blank requests sensible defaults
        # sized for the 7B Q4 model on standard worker nodes.
        resources: {}

        service:
          port: 8000

        serviceAccount:
          enabled: true
          annotations: {}

        # Backend CLI args appended to the image's entrypoint. The
        # image already wires the essential flags (model path, host,
        # port, threads, context size). Use this for operator-
        # specific tuning (KV cache size, sampling parameters, etc.).
        extraArgs: []

    # ---- Azure (AI Foundry or Azure OpenAI) -----------------------------
    # Consumed only when provider=azure. Endpoint + deployment are
    # required; the chart fails fast at render time if either is
    # missing.
    azure:
      service: foundry                       # foundry | openai
      endpoint: ""                           # e.g. https://<resource>.openai.azure.com
      deployment: ""                         # the deployed model name
      apiVersion: ""                         # only for service=openai
      # Optional: when set in non-SDK mode, the chart binds
      # AZURE_INTELLIGENCE_API_KEY from this Secret key. Leave blank to
      # use managed identity (preferred).
      apiKeySecretKey: ""

    # ---- Google (Vertex AI) --------------------------------------------
    # Consumed only when provider=google. Project + location + model
    # are all required; the chart fails fast at render time if any is
    # missing. Auth: ADC + Workload Identity Federation (reuses
    # cloudIdentity.google).
    google:
      project: ""                            # GCP project ID
      location: ""                           # e.g. us-central1
      model: ""                              # e.g. gemini-2.0-flash-001

    # ---- AWS (Bedrock) -------------------------------------------------
    # Consumed only when provider=aws. Region + modelId are required;
    # the chart fails fast at render time if either is missing. Auth:
    # IRSA + Pod Identity (reuses cloudIdentity.amazon).
    aws:
      region: ""                             # e.g. us-east-1
      modelId: ""                            # e.g. anthropic.claude-3-5-sonnet-20241022-v2:0

  # ---- Token + request budget --------------------------------------------
  # Hard caps enforced inside the observability service (token-bucket). When exceeded,
  # the next analysis cycle is skipped and the budget event is logged.
  budget:
    maxTokensPerHour: 200000
    maxRequestsPerHour: 60

  # ---- Analysis cadence --------------------------------------------------
  # Two scheduling modes:
  #   - interval: runs every `intervalMinutes` after pod startup (default).
  #   - daily:    set `dailyAtUtc` to "HH:MM" (UTC). Overrides intervalMinutes
  #               and fires once per day at that wall-clock time. In daily
  #               mode the email + teams digests fire on every run regardless
  #               of email.onlyOnNewErrors / teams.onlyOnNewErrors -- the
  #               assumption is you wanted a daily summary.
  # `lookbackMinutes` defaults to `intervalMinutes` in interval mode (so
  # each cycle's data window matches its cadence with no gap or overlap),
  # or 1440 (24h) in daily mode. Set it explicitly here to override either
  # default.
  schedule:
    intervalMinutes: 30              # batch cycle period (interval mode)
    dailyAtUtc: ""                   # "HH:MM" UTC -- e.g. "00:00" for midnight
    lookbackMinutes: ""              # leave empty for auto: matches intervalMinutes (interval mode) or 1440 (daily mode). Override with an int.

  # ---- Operational DB names (Diagnostics tab) ----------------------------
  # The Diagnostics tab needs two tenant-specific database names:
  #   * the Interaction DB (op_InteractionWorkflows / op_DataWorkflows)
  #   * the InteractionAudit DB (SQLTraceLog / AuditHistory)
  # These are NOT operator-typed chart values. The observability service resolves them
  # at startup from Pulse_<env>.dbo.rpi_Clients using observability.clientId
  # (above) as the lookup key. See ADR-0009 strict refinement -- no
  # fallback, no inference. Behavior is identical for single-tenant and
  # multi-tenant deployments.

  # ---- Diagnostics tab ---------------------------------------------------
  # Per-Interaction lookup + bundle download (parity with the on-prem
  # "Download Diagnostics" zip). When fileOutput.enabled is true AND
  # storage.persistentVolumeClaims.FileOutputDirectory.enabled is also
  # true (chart-wide), the same PVC the .NET services write to is mounted
  # read-only on the observability service StatefulSet so the bundle can include the
  # workflow's output files. The mount tracks the existing FileOutput
  # claimName + mountPath -- no parallel value to maintain. When the
  # FileOutputDirectory PVC is not enabled chart-wide, this toggle is
  # a no-op and the bundle's Files/ folder gets _empty.txt.
  diagnostics:
    fileOutput:
      enabled: true

  # ---- Database Queries (read-only) --------------------------------------
  # The Database Queries tab is a live snapshot of in-flight database
  # commands sourced directly from rpi_ExecutionQueries via the same
  # shared RPI operational-database connection every other RPI service
  # uses (no new env vars, no new secrets, no new chart values). The
  # surface is read-only: Observability does not cancel, kill, or
  # otherwise mutate execution state -- operators perform those
  # actions through the native RPI client.
  #
  # Capability:
  #   diagnostics.viewLiveQueries -- Configuration, System Administrator
  #
  # The capability defaults to restrictive groups because in-flight SQL
  # text can carry PII through WHERE-clause literals and parameter values.

  # ---- Custom Metrics (T4 telemetry) -------------------------------------
  # Reads Prometheus-style /metrics endpoints exposed by RPI services
  # in-cluster, parses them, and renders the Custom Metrics tab. T4
  # telemetry only -- never authoritative for identity / topology /
  # configuration. See workspace docs:
  #   reference/rpi-metrics-catalog.md
  #   principles/discovery-authority.md
  #
  # No external monitoring system is required. Parsing uses a Python
  # library (prometheus-client); no cluster-side Prometheus stack is
  # assumed or installed by Observability.
  #
  # Defaults below cover the standard RPI deployment shape; operator
  # overrides are not required. To disable the feature entirely, set
  # enabled: false.
  metrics:
    enabled: true
    scrapeIntervalSeconds: 15
    timeoutSeconds: 5
    bufferSize: 240               # ~60 min of 15s samples per series
    # Curated list of RPI services that expose a Prometheus /metrics
    # endpoint. Two filters apply at chart-render time:
    #   1. Capability (this list): a service is included here ONLY
    #      if it actually exposes /metrics. Listing a service that
    #      doesn't will produce phantom "X unreachable" incidents
    #      on the System Health surface.
    #   2. Deployment (.enabled flag): each entry is automatically
    #      filtered out when the corresponding top-level service is
    #      disabled (e.g. realtimeapi.enabled=false drops "Realtime
    #      API" from the emitted OBSERVABILITY__METRICS__SERVICES).
    # Convention: dnsName matches the K8s Service name; the
    # service's values key is dnsName minus the "rpi-" prefix.
    #
    # NOT listed (and why):
    #   - rpi-rebrandly: does not expose /metrics. Adding it here
    #     causes a phantom "Rebrandly unreachable" active incident.
    #   - rpi-deploymentapi, rpi-rabbitmq-console, rpi-smartActivation:
    #     no /metrics today. Add when the service ships an endpoint.
    #
    # K8s Service port is 80 (targetPort 8080 inside the container).
    # Service-to-service traffic in the cluster always uses port 80;
    # 8080 only works from INSIDE the pod (localhost:8080) and is NOT
    # the cross-pod path.
    services:
      - name: "Execution Service"
        dnsName: "rpi-executionservice"
        port: 80
        path: "/metrics"
      - name: "Node Manager"
        dnsName: "rpi-nodemanager"
        port: 80
        path: "/metrics"
      - name: "Queue Reader"
        dnsName: "rpi-queuereader"
        port: 80
        path: "/metrics"
      - name: "Interaction API"
        dnsName: "rpi-interactionapi"
        port: 80
        path: "/metrics"
      - name: "Integration API"
        dnsName: "rpi-integrationapi"
        port: 80
        path: "/metrics"
      - name: "Callback API"
        dnsName: "rpi-callbackapi"
        port: 80
        path: "/metrics"
      - name: "Realtime API"
        dnsName: "rpi-realtimeapi"
        port: 80
        path: "/metrics"

  # ---- Telemetry mode (opt-in advanced) ----------------------------------
  # Telemetry source mode. One of: scrape | otel
  #
  # scrape (default): rpi-observability scrapes the IAPI's native
  #   Microsoft.AspNetCore.Hosting Meter exposition on port 80
  #   directly. Minimal footprint; production-safe baseline.
  #
  # otel: enables zero-code .NET auto-instrumentation on the
  #   Interaction API. An init container drops the OTel runtime into
  #   the IAPI pod; the IAPI process exports OTLP gRPC on loopback
  #   :4317 to an OpenTelemetry Collector sidecar running in the
  #   same pod. The sidecar re-exposes Prometheus on port 8889,
  #   which rpi-observability scrapes through the IAPI Service.
  #
  # Modes are mutually exclusive. No fallback. No hybrid. Flipping
  # the value re-rolls the IAPI deployment; exactly one source is
  # active per deployment.
  #
  # Two init-container / sidecar images are pulled when mode=otel,
  # both via the canonical rpi.image helper:
  #   rpi-observability-otel
  #     - upstream: ghcr.io/open-telemetry/opentelemetry-operator/
  #                 autoinstrumentation-dotnet
  #   rpi-observability-otel-collector
  #     - upstream: otel/opentelemetry-collector (core distribution)
  # Customers with mirrored registries override via the standard
  # global.deployment.images.overrides.<name> (full URI) or
  # global.deployment.images.nameOverrides.<name> (alternate name).
  telemetry:
    # scrape (default): native /metrics scrape, no OTel.
    # otel: every participating RPI service is auto-instrumented (no
    #   sidecars) and reports OTLP metrics to one shared OTel Collector,
    #   which re-exposes them as Prometheus on :8889 for the
    #   observability service to scrape. Includes the native SqlClient
    #   db.client.operation.duration metrics (per service -> database
    #   edge: calls / latency / errors) plus HTTP/runtime metrics.
    #   Participating services: interactionapi, executionservice,
    #   nodemanager, queuereader, realtimeapi, integrationapi,
    #   callbackapi, deploymentapi.
    mode: scrape

    # RPI service images that are musl-based (Alpine). The .NET OTel
    # auto-instrumentation native profiler is libc-specific: glibc images
    # load linux-x64, musl images need linux-musl-x64. Pointing a musl
    # image at the glibc profiler makes it fail to load - the service
    # then emits NO telemetry at all. Services listed here get the
    # linux-musl-x64 profiler path; everything else gets linux-x64.
    # Override if a service image's base libc changes between releases.
    muslServices:
      - rpi-integrationapi
      - rpi-callbackapi
      - rpi-deploymentapi

    otel:
      collector:
        # Shared Collector resource shape (it aggregates OTLP from all
        # participating services).
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

  # ---- Email digest (opt-in) ---------------------------------------------
  # When enabled, the observability service posts a short HTML summary of each cycle's
  # report to the configured recipients. SMTP transport reuses the
  # chart-wide SMTPSettings block (same SMTP server, sender, credentials
  # the .NET services already use); only the recipient list and the
  # "send when..." rule are observability-specific.
  #
  # The email is intentionally minimal: total errors, top types, and a
  # link back to the dashboard for the full breakdown / log downloads.
  email:
    enabled: false
    recipients: []                   # ["support@example.com", ...]
    onlyOnNewErrors: true            # only send when first-seen errors exist
                                     # (set false to email every cycle)

  # ---- Microsoft Teams notification (opt-in) -----------------------------
  # When enabled, the observability service posts an Adaptive Card per
  # cycle to a Teams channel via an incoming webhook.
  #
  # The webhook URL is credential-grade: anyone holding it can post into
  # the channel. It MUST live in the chart's standard RPI Secret (default:
  # redpoint-rpi-secrets), NEVER inline in this file or any override file.
  # Treat it the same as an API key, SMTP password, or OAuth client secret.
  #
  # Populate the Secret key (default: Observability_Teams_Webhook) before
  # setting enabled=true. Pod startup fails fast when enabled=true and
  # the key is empty.
  #
  # Get the webhook URL from Teams: in the channel, ... > Workflows >
  # "Post to a channel when a webhook request is received". Copy the
  # URL into the Secret; do not paste it into values.yaml.
  teams:
    enabled: false
    webhookSecretKey: Observability_Teams_Webhook
    onlyOnNewErrors: true            # only post when first-seen errors exist

  # ---- Authentication and authorization ---------------------------------
  # When enabled, the observability service participates in the RPI trust domain:
  # identity is delegated to whichever IDP RPI is configured against
  # (native rpi-interactionapi, Microsoft Entra, Keycloak, or Okta);
  # authorization is resolved through RPI's normalized user/group/
  # permission model in the operational database. Disabled by default
  # so existing deployments preserve the legacy unauthenticated path
  # until the operator explicitly opts in.
  #
  # See AUTH_DESIGN_RFC.md and SECURITY_BOUNDARIES_AND_DATA_HANDLING.md
  # in the observability source tree for the engineering contract and
  # security posture.
  auth:
    # Single-provider deployment model. Each deployment resolves to
    # exactly ONE of:
    #   public  -- no authentication; UI is fully anonymous
    #   native  -- RPI native auth (rpi-interactionapi / OpenIddict)
    #   entra   -- Microsoft Entra ID
    # Hybrid configurations are rejected at chart-render time.
    # Switching modes is a deployment-time decision, not a runtime
    # negotiation. Authentication mode and auth-provider configuration
    # use the standard RPI Authentication__* env-var contract.
    mode: public

    # Tenant scope is sourced from `observability.clientId` (the
    # canonical rpi_Clients lookup key, per ADR-0009). The authorization
    # provider and the diagnostics layer both consume that single
    # identity, so no separate auth-side tenant field exists.

    # Cookie security. Set false only for local development without TLS.
    cookieSecure: true

    # Session lifetime in seconds. Default 8 hours.
    sessionLifetimeSeconds: 28800

    # Per-process AuthorizationProvider cache TTL in seconds. Set 0 to
    # disable. Group membership changes in RPI take effect at most
    # this many seconds after assignment.
    authorizationCacheTtlSeconds: 60

    # Hostname the observability service is reachable at; used to build the OIDC
    # redirect URI advertised to the IDP for Entra mode. AUTO-DERIVED
    # from ingress.hosts.observability + ingress.domain when left empty.
    # Override only if the observability service is fronted by a different external
    # hostname (custom CNAME, external load balancer, etc.).
    ingressHost: ""

    # ---- Native posture overrides --------------------------------------
    # Used only when mode=native. Defaults are derived from the
    # canonical RPI ingress block.
    native:
      # AUTO-DERIVED from ingress.hosts.client + ingress.domain (the
      # rpi-interactionapi public host) when left empty.
      authorizationHost: ""
      # Optional separate metadata host (auth-meta endpoints). RPI
      # services that use a different metadata host set this; most
      # deployments leave it empty.
      authMetaHttpHost: ""
      # The OpenIddict client ID Observability uses. The customer (RPI
      # platform / DBA / identity admin) pre-registers a confidential
      # OpenIddict client with this ClientId and populates the chart's
      # standard RPI Secret (default: redpoint-rpi-secrets) under the
      # key Observability_NativeAuth_ClientSecret with the matching
      # ClientSecret. Observability never writes to OpenIddictApplications.
      clientId: rpi-observability

    # ---- Entra posture overrides ---------------------------------------
    # Used only when mode=entra. Defaults to the chart-wide
    # MicrosoftEntraID block. Override here only if Observability
    # needs different Entra config than the rest of the RPI deployment.
    microsoft:
      tenantId: ""              # default: MicrosoftEntraID.tenant_id
      clientApplicationId: ""   # default: MicrosoftEntraID.interaction_client_id
      apiApplicationId: ""      # default: MicrosoftEntraID.interaction_api_id

    # Capability map: optional overlay for CUSTOM RPI groups only.
    #
    # RPI is the authorization authority. The canonical groups
    # (System Administrators / Everyone / IntegrationAPI) map to
    # capabilities via built-in defaults inside the observability
    # service. Use this block ONLY when an enterprise deployment has
    # a custom non-canonical group (e.g. DataOps, SRE) that needs
    # observability access.
    #
    # Two prohibitions enforced at startup; violations fail the pod
    # CrashLoopBackOff with a clear error:
    #   * observability.admin cannot appear as a key. Administrative
    #     access flows from membership in the System Administrators
    #     RPI group only.
    #   * Canonical group names (System Administrators / Everyone /
    #     IntegrationAPI) cannot appear as values. Their capability
    #     sets are owned by the built-in defaults.
    #
    # Example -- grant the custom "DataOps" group diagnostics access:
    #   capabilityMap:
    #     diagnostics.view: ["DataOps"]
    #     diagnostics.viewSql: ["DataOps"]
    capabilityMap: {}

  # Pulse_Logging access: the observability service reads the same 4 connection
  # components the deploymentapi reads (host / username / password /
  # logging-db-name). No extra knobs here -- the chart's existing secrets
  # wiring takes care of everything.

  # ---- Local report store (SQLite) ---------------------------------------
  # The observability service keeps its report history in a small SQLite file at
  # /data/reports.db. SQLite needs a filesystem that honors POSIX byte-range
  # locks, so /data must be backed by block storage (Azure Disk, AWS EBS,
  # GCP PD) -- NOT Azure Files / NFS, which silently break SQLite locking.
  # Pattern matches Redis/RabbitMQ: dynamic provisioning by default, BYO
  # supported via existingClaim.
  storage:
    # BYO: name of a PVC you've already created. If set, volumeClaimTemplates
    # is ignored. The PVC must support RWO and POSIX locks (see above).
    existingClaim: ""
    volumeClaimTemplates:
      enabled: true                  # false + no existingClaim => emptyDir (data is lost on pod restart)
      accessModes: ReadWriteOnce
      storageClassName: ""           # empty = use cluster default storage class
      storage: 5Gi

  # ---- HTTP service ------------------------------------------------------
  # FastAPI is the sole runtime: serves the React static export at /,
  # the JSON API at /api, auth flows at /auth, and kubelet probes at
  # /health. Ingress routes every observability path to apiPort.
  service:
    apiPort: 8080

  # ---- Resources ---------------------------------------------------------
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# ==========================
# Post-Install Automation
# ==========================
# Automates license activation, cluster DB install, and optional tenant creation.
# Runs as a Helm post-install hook (and ArgoCD PostSync).
postInstall:
  enabled: false
  # Use an existing K8s secret instead of inline values
  # Keys: activation-key, admin-password, admin-username, admin-email
  # existingSecret: ""
  activationKey: ""
  systemName: ""
  adminUsername: "coreuser"
  adminPassword: ""
  adminEmail: ""
  tenant:
    enabled: false
    name: ""
    # existingSecret: ""  # Keys: dw-server, dw-database, dw-username, dw-password
    dataWarehouse:
      provider: SQLServer
      server: ""
      database: ""
      username: ""
      password: ""
  waitTimeout: 360
  backoffLimit: 3

  # === Per-service overridable defaults (from _defaults.tpl) ===
  # Uncomment and modify any of the lines below to override the
  # chart's per-service default.
  # enabled: false
  # existingSecret: ""
  # activationKey: ""
  # systemName: ""
  # adminUsername: coreuser
  # adminPassword: ""
  # adminEmail: ""
  # deploymentapiHost: rpi-deploymentapi
  # deploymentapiPort: "80"
  # waitTimeout: "360"
  # maxReadyWaitSeconds: "600"
  # pollIntervalSeconds: "15"
  # backoffLimit: 3
  # tenant:
  #   enabled: false
  #   name: ""
  #   existingSecret: ""
  #   dataWarehouse:
  #     provider: SQLServer
  #     server: ""
  #     database: ""
  #     username: ""
  #     password: ""
  # resources:
  #   requests:
  #     cpu: 50m
  #     memory: 64Mi
  #   limits:
  #     cpu: 200m
  #     memory: 128Mi


# ==========================
# Pre-flight Validation
# ==========================
# Validates configuration before deployment:
#   DNS resolution, DB connectivity, cloud identity, secrets management.
# mode: test     -> runs with `helm test rpi`
# mode: preInstall -> blocks install on failure
preflight:
  enabled: false
  mode: test
