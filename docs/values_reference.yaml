# ============================================================
# REDPOINT INTERACTION (RPI) - User Configuration
# ============================================================
# Only set the values you need to customize. All internal
# defaults (health probes, security contexts, logging levels,
# service ports, rollout strategies, etc.) are managed by the
# chart via _defaults.tpl.
# ============================================================

# ==========================
# Global Settings
# ==========================
global:
  deployment:
    # Deployment mode: standard | demo
    # standard: production deployment
    # demo: deploys embedded MSSQL + MongoDB containers for local dev/evaluation
    mode: standard
    # Cloud environment: azure, amazon, google, selfhosted
    platform: amazon

    images:
      registry: rg1acrpub.azurecr.io/docker/redpointglobal/releases
      # RPI version: <major.minor>.<year>-<MMDD>-<HHMM>
      tag: "7.7.20260414.1238"
      imagePullPolicy: Always
      imagePullSecret:
        enabled: true
        name: redpoint-rpi
      # net-utils (used by the database-upgrade job) resolves through the
      # canonical rpi.image helper, same as every other service. Default:
      # {registry}/net-utils:{tag}. Override via overrides or nameOverrides
      # below.
      # Image resolution priority: overrides > nameOverrides > default ({registry}/{service-name}:{tag})
      #
      # overrides: Full URI per service, used verbatim (no registry/tag appended).
      #   Use when images are in different registries or have custom tags.
      # overrides:
      #   rpi-interactionapi: 123456789.dkr.ecr.us-east-1.amazonaws.com/rpi:interactionapi-7.7.20260220.1524
      #   rpi-redis: 123456789.dkr.ecr.us-east-1.amazonaws.com/rpi:rediscache-7.7.20260220.1524
      #
      # nameOverrides: Replaces just the image name, keeps global registry and tag.
      #   Use when images are in the same registry with the same tag but different names.
      #   Result: {registry}/{nameOverride}:{tag}
      # nameOverrides:
      #   rpi-deploymentapi: redpoint-interaction-configuration-editor
      #   rpi-interactionapi: redpoint-interaction-client
    # Optional: set the pod's timezone (e.g., "America/New_York"); leave empty to use default UTC
    podTimezone: "" #

# ==========================
# Global Resource Defaults
# ==========================
# Applied to all services unless overridden per-service.
# Per-service overrides (e.g. interactionapi.resources) take priority.
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    memory: 3Gi

# ==========================
# Per-Service Overridable Settings
# ==========================
# These settings are defined in _defaults.tpl and can be overridden per service.
# Example: deploymentapi.enableProbes, executionservice.replicas, etc.
#
# Common per-service settings:
#   enableProbes: true          # Set to false to disable all probes (liveness, readiness, startup)
#   replicas: 1                 # Number of pod replicas
#   enableRPIAuthentication: true
#   enableSwagger: true
#   serviceMesh: true/false     # Per-service Linkerd opt-out
#   cloudIdentity: true/false   # Per-service cloud identity opt-in (per-service mode only)
#   autoscaling:
#     enabled: false
#     type: hpa
#     minReplicas: 2
#     maxReplicas: 5
#   resources:
#     requests: { cpu: 50m, memory: 256Mi }
#     limits: { memory: 3Gi }
#   logging:
#     default: Error
#     database: Error

# ==========================
# Pod Anti-Affinity
# ==========================
# Controls pod anti-affinity for all services.
# Default: soft (preferred) anti-affinity spreading pods across nodes.
# Set type to "required" for hard anti-affinity, or enabled to false to disable.
podAntiAffinity:
  enabled: true
  type: preferred               # preferred | required
  weight: 100                   # weight for preferred (1-100, ignored for required)
  topologyKey: kubernetes.io/hostname

# ==========================
# Custom CA Certificates
# ==========================
# Mount custom CA certificates into all pods.
# Useful when connecting to databases or services using internal/private CAs.
customCACerts:
  enabled: false
  name: ""                      # name of the Kubernetes Secret containing the CA bundle
  mountPath: /usr/local/share/ca-certificates/custom
  # Optional: set SSL_CERT_FILE env var to a specific file in the mount
  # certFile: ""                # e.g., "internal-ca.pem"
  # SDK provider: mount cert directly from vault via CSI inline volume
  # secretProviderClassName: "" # name of the SecretProviderClass to mount

# ==========================
# Common Annotations
# ==========================
# Annotations applied to all resource types: ServiceAccounts, Services, Deployments, and Pods.
# Use this for org-wide annotations (cost center, support email, alert routing, etc.).
commonAnnotations: {}
# commonAnnotations:
#   myorg.com/cost-center: "1234"
#   myorg.com/support-email: "team@example.com"
#   myorg.com/alert-channel: "email,pagerduty"

# Per-resource-type overrides (merged with commonAnnotations)
serviceAccountAnnotations: {}
serviceAnnotations: {}

# ==========================
# Operational Database
# ==========================
databases:
  operational:
    # Supported: sqlserver, postgresql, sqlserveronvm
    provider: sqlserver
    server_host: <my-database-server-host>
    server_username: <my-database-server-username>
    server_password: <my-database-server-password>
    pulse_database_name: <my-pulse-database-name>
    pulse_logging_database_name: <my-logging-database-name>
    encrypt: true

    # Google Cloud SQL Auth Proxy (GKE only; PostgreSQL or SQL Server).
    # When enabled, injects a native K8s sidecar (initContainers[*].restartPolicy: Always)
    # running the Cloud SQL Auth Proxy next to every pod that talks to the operational DB.
    # The chart rewrites ConnectionSettings__Server to 127.0.0.1 so the app connects
    # through the proxy instead of to the Cloud SQL instance directly.
    #
    # The proxy v2 binary speaks both PostgreSQL and SQL Server, so the chart picks the
    # right connection-string format based on `databases.operational.provider`.
    #
    # Activation gate: global.deployment.platform=google AND enabled=true
    #                  AND provider in {postgresql, sqlserver}
    #                  AND secretsManagement.provider=sdk (chart will fail if not).
    #
    # Cloud SQL Auth Proxy is supported only with secretsManagement.provider=sdk.
    # The proxy and the SDK secret provider share the same cloud-native security
    # realm (vault-backed, IAM-bound). The chart's job here is to inject the proxy
    # sidecar; ALL connection-string env vars come from your vault. Configure the
    # vault entries (ConnectionStrings--OperationalDatabase, ConnectionStrings--
    # LoggingDatabase, ClusterEnvironment--OperationalDatabase--ConnectionSettings--
    # Server, etc.) so the host points at 127.0.0.1 and the port matches
    # `cloudSqlProxy.port` (default 5432 / 1433).
    #
    # SQL Server gotchas (apply if provider=sqlserver):
    #   * Set `databases.operational.encrypt: false` in your overrides. The default
    #     is `true`, which makes Microsoft.Data.SqlClient negotiate TLS during
    #     pre-login. The loopback proxy is plaintext and SqlClient bails with
    #     "an error occurred during the pre-login handshake". Encryption on the
    #     wire is still handled by the proxy → Cloud SQL leg via mTLS.
    #   * Use comma-port syntax: `Server=tcp:127.0.0.1,1433` (NOT `:1433`). The
    #     colon form fails to parse and the proxy log will show zero connections.
    #   * Cloud SQL for SQL Server does NOT support IAM DB auth via the proxy.
    #     Leave `autoIamAuthn: false` and put a real SQL login/password in the vault.
    #   * Vault `ConnectionStrings--*` entries should include
    #     `Encrypt=False;TrustServerCertificate=True;` for the same reason as #1.
    cloudSqlProxy:
      enabled: false
      # Required when enabled: "<project>:<region>:<instance>"
      connectionName: ""
      image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.2
      # Local port the proxy exposes; the chart emits ConnectionSettings__Port with this value.
      # Defaults per engine: 5432 for postgresql, 1433 for sqlserver. Override here if needed.
      # port: 5432
      # Use the Cloud SQL instance's private IP (requires VPC peering between GKE and Cloud SQL).
      privateIp: true
      # Use IAM database authentication instead of password auth. PostgreSQL only;
      # ignored for SQL Server (Cloud SQL for SQL Server doesn't expose IAM DB auth via
      # the proxy). When true, the chart uses `cloudIdentity.google.serviceAccountEmail`
      # as the DB user and omits the password segment from the connection string; the
      # proxy injects an IAM token at connection time. Requires the SA email to be
      # registered as a Cloud SQL IAM user with the right grants:
      #   gcloud sql users create <sa-email> --type=cloud_iam_service_account ...
      autoIamAuthn: false
      # Graceful shutdown window; proxy drains connections before exiting.
      terminationGracePeriod: "30s"
      # Authentication mode (auto-detected):
      # - Workload Identity (default): pod SA must be bound to a GCP SA with
      #   roles/cloudsql.client. No key file is mounted.
      # - Service-account key file: triggered when `cloudIdentity.enabled=true`,
      #   `global.deployment.platform=google`, and `cloudIdentity.google.configMapName`
      #   is set. The proxy mounts the same ConfigMap into the sidecar at the same
      #   path the app sees as GOOGLE_APPLICATION_CREDENTIALS
      #   (`cloudIdentity.google.configMapFilePath` + `cloudIdentity.google.keyName`)
      #   and starts with --credentials-file pointing at that path. Reuses the
      #   platform-wide Google SA JSON; no separate ConfigMap or path is needed.
      resources:
        requests: { cpu: 50m, memory: 64Mi }
        limits:   { cpu: 200m, memory: 256Mi }
      # Extra CLI args appended to the proxy command (e.g., ["--structured-logs", "--debug"]).
      additionalArgs: []

  # ==========================
  # Data Warehouse Providers
  # ==========================
  datawarehouse:

    # BigQuery
    bigquery:
      enabled: false
      connections:
        - name: gbq-tenant1
          projectId: gbq-tenant1
          sqlDialect: 1
          OAuthMechanism: 0
          credentialsType: serviceAccount
          serviceAccountEmail: gbq-tenant1@my-project.iam.gserviceaccount.com
          configMapName: gbq-tenant1
          keyName: gbq-tenant1.json
          ConfigMapFilePath: /app/google-creds
          allowLargeResults: 0
          largeResultsDataSetId: _bqodbc_temp_tables
          largeResultsTempTableExpirationTime: "3600000"

    # Snowflake
    snowflake:
      enabled: false
      # Supported: snowflake_jwt
      credentialsType: snowflake_jwt
      mountPath: /app/snowflake-creds
      # For csi/sdk: set this to the SecretProviderClass name that mounts
      # the private key(s) via CSI inline volume.
      # secretProviderClassName: ""
      # Key files - one entry per tenant. Each needs its own secretName
      # (the K8s Secret containing the .p8 file) and keyName (the filename).
      # Connection string references: PRIVATE_KEY_FILE=/app/snowflake-creds/<keyName>
      keys:
        - keyName: my-snowflake-rsakey.p8
          secretName: snowflake-rsa-private-key
      # Multi-tenant example:
      # keys:
      #   - keyName: tenant1-private-key.p8
      #     secretName: snowflake-tenant1-key
      #   - keyName: tenant2-private-key.p8
      #     secretName: snowflake-tenant2-key


# ============================================================
# Cloud Identity
# ============================================================
# Pod-to-cloud authentication. Required for sdk and csi secrets modes.
# The authentication mechanism is derived from global.deployment.platform:
#   azure  -> Azure Workload Identity (ServiceAccount annotation + pod label)
#   google -> GCP Workload Identity (ServiceAccount annotation)
#   amazon -> IRSA (ServiceAccount annotation + env vars)
# ============================================================
cloudIdentity:
  enabled: false
  # ServiceAccount mode:
  #   shared      -> one shared SA used by all services (simplest for workload identity)
  #   per-service -> each service creates its own SA (for per-service IAM roles)
  serviceAccount:
    mode: per-service
    name: redpoint-rpi
  # --- Azure Workload Identity ---
  azure:
    managedIdentityClientId: your-workload-identity-client-id
    tenantId: your-azure-tenant-id
  # --- Google Cloud Workload Identity ---
  google:
    serviceAccountEmail: my-google-svs-account@my-project.iam.gserviceaccount.com
    projectId: your_google_project_id
    # ConfigMap containing the service account JSON credentials file
    configMapName: my-google-svs-account
    keyName: my-google-svs-account.json
    configMapFilePath: /app/google-creds
  # --- Amazon IRSA / Access Keys ---
  amazon:
    roleArn: arn:aws:iam::my-aws-account-id:role/my-role-name
    region: us-east-1
    # Set to true to inject AWS access keys from the secrets K8s Secret
    # The keys AWS_Access_Key_ID and AWS_Secret_Access_Key must exist in the secret
    useAccessKeys: false

# ============================================================
#  SECRETS MANAGEMENT
# ============================================================
# How secrets are provided to pods:
#   kubernetes -> Chart creates K8s Secret from values (or user pre-creates)
#   sdk        -> App reads directly from cloud vault at runtime (requires cloudIdentity)
#   csi        -> CSI driver syncs cloud vault to K8s Secret (requires cloudIdentity)
# ============================================================
secretsManagement:
  # kubernetes | sdk | csi
  provider: kubernetes
  # --------------------------------------------------------
  # Kubernetes secrets (provider: kubernetes)
  # --------------------------------------------------------
  kubernetes:
    # The chart does NOT create this secret. Create it before deploying using:
    #   rpihelmcli secrets -f overrides.yaml -n <namespace>
    # Then: kubectl apply -f secrets.yaml -n <namespace>
    secretName: redpoint-rpi-secrets
  # --------------------------------------------------------
  # SDK - App reads from cloud vault directly (provider: sdk)
  # --------------------------------------------------------
  sdk:
    azure:
      vaultUri: https://myvault.vault.azure.net/
      configurationReloadIntervalSeconds: 30
      useADTokenForDatabaseConnection: true
    amazon:
      secretTagKey: ""
    google:
      projectId: ""
  # --------------------------------------------------------
  # CSI - CSI driver syncs vault to K8s Secret (provider: csi)
  # Pods consume secrets via secretKeyRef (same as kubernetes mode)
  # --------------------------------------------------------
  csi:
    # The K8s secret name created by the CSI driver
    secretName: redpoint-rpi-secrets
    # How the CSI sync is triggered. Options:
    #   none          - use dedicated validation pods (default)
    #   deploymentapi - mount CSI volume on the Deployment API pod to trigger sync
    # When set to deploymentapi, the Deployment API pod mounts the CSI volume on
    # startup, which triggers the CSI driver to sync secrets from the vault into
    # the K8s Secret. No validation pods needed. All other service pods read from
    # the K8s Secret via secretKeyRef as usual.
    syncService: none
    # SecretProviderClass definitions
    secretProviderClasses:
    # ----------------------------------------------------
    # Example: TLS Certificate from Azure Key Vault
    # ----------------------------------------------------
    - name: my-secret-class-1
      provider: azure
      secretObjects:
        - secretName: secret1
          type: kubernetes.io/tls
          data:
            - key: tls.key
              objectName: my-tls-certificate
      parameters:
        keyvaultName: my-keyvault-name
        resourceGroup: my-resource-group
        subscriptionId: my-subscription-id
        clientID: my-managed-identity-client-id
        tenantId: my-azure-tenant-id
        usePodIdentity: "false"
        useVMManagedIdentity: "false"
        useWorkloadIdentity: "true"
      objects:
        - objectName: "my-tls-certificate"
          objectType: secret
    # ----------------------------------------------------
    # Example: Database Connection String
    # ----------------------------------------------------
    - name: my-secret-class-2
      provider: azure
      secretObjects:
        - secretName: secret2
          type: Opaque
          data:
            - key: ConnectionString_Logging_Database
              objectName: V7-ConnectionString-LoggingDatabase
      parameters:
        keyvaultName: my-keyvault-name
        resourceGroup: my-resource-group
        subscriptionId: my-subscription-id
        clientID: my-managed-identity-client-id
        tenantId: my-azure-tenant-id
        usePodIdentity: "false"
        useVMManagedIdentity: "false"
        useWorkloadIdentity: "true"
        syncSecret: "true"
        enable-secret-rotation: "true"
      objects:
        - objectName: "V7-ConnectionString-Operations"
          objectType: secret
    # ----------------------------------------------------
    # Example: AWS Secrets Manager with jmesPath extraction
    # ----------------------------------------------------
    # - name: redpoint-secret-class
    #   provider: aws
    #   objectsContent: |
    #     - objectName: "arn:aws:secretsmanager:us-east-1:123456789:secret/rpi-db-creds"
    #       objectType: secretsmanager
    #       jmesPath:
    #         - path: username
    #           objectAlias: db_username
    #         - path: password
    #           objectAlias: db_password
    #   secretObjects:
    #     - secretName: redpoint-rpi-secrets
    #       type: Opaque
    #       data:
    #         - key: db_username
    #           objectName: db_username
    #         - key: db_password
    #           objectName: db_password

# ==========================
# Storage
# ==========================
# Two provisioning modes:
#   Static:  Define PVs + PVCs under persistentVolumes[]. You control volume handles.
#   Dynamic: Define only PVCs + a StorageClass with provisioner parameters.
#            The CSI driver auto-provisions volumes. No persistentVolumes[] needed.
# See docs/storage.md for examples of both modes.
storage:
  # StorageClass (required for dynamic, optional for static)
  storageClass:
    enabled: false
    name: redpoint-rpi
    provisioner: ""             # e.g., efs.csi.aws.com
    reclaimPolicy: Delete       # Delete | Retain
    volumeBindingMode: Immediate
    mountOptions: []
    # mountOptions:
    #   - iam
    parameters: {}
    # Example: AWS EFS
    # parameters:
    #   provisioningMode: efs-ap
    #   fileSystemId: fs-0123456789abcdef0
    #   directoryPerms: "755"
    #   uid: "7777"
    #   gid: "7777"
    #   basePath: /rpi
    #   subPathPattern: shared-data
    #   ensureUniqueDirectory: "false"
    #   reuseAccessPoint: "true"

  persistentVolumeClaims:
    FileOutputDirectory:
      enabled: false
      claimName: rpifileoutputdir
      mountPath: /rpifileoutputdir
    Plugins:
      enabled: false
      claimName: realtimeplugins
      mountPath: /app/plugins
    DataManagementUploadDirectory:
      enabled: false
      claimName: rpdmuploaddirectory
      mountPath: /rpdmuploaddirectory

  # Dynamic PVCs (no PV needed - the CSI driver auto-provisions storage)
  # Use with a StorageClass that supports dynamic provisioning (e.g., EFS with efs-ap mode).
  dynamicPVCs: []
  # dynamicPVCs:
  #   - claimName: rpi-claim
  #     storageClassName: redpoint-rpi
  #     accessModes: [ReadWriteMany]
  #     storage: 5Gi

  # Create PV + PVC pairs (for CSI-backed storage with static provisioning)
  persistentVolumes: []
  # persistentVolumes:
  #   - name: rpi-blob-storage
  #     capacity: 100Gi
  #     accessModes: [ReadWriteMany]
  #     storageClassName: blob-fuse
  #     reclaimPolicy: Retain
  #     mountOptions:
  #       - -o allow_other
  #       - --file-cache-timeout-in-seconds=120
  #     csi:
  #       driver: blob.csi.azure.com
  #       volumeHandle: unique-volume-handle
  #       volumeAttributes:
  #         containerName: rpi-data
  #         storageAccount: mystorageaccount
  #     pvc:
  #       claimName: rpi-blob-pvc

# ==========================
# Realtime API
# ==========================
realtimeapi:
  enabled: true
  replicas: 1
  rpiClientID: 00000000-0000-0000-0000-000000000000
  authentication:
    # Supported: basic, oauth
    type: basic
    basic:
      standard: false
      forms: true
      listenerQueue: true
      recommendations: true
    oauth:
      databaseName: RPIRealtimeCore
      accessTokenLifetimeSeconds: 360
      refreshTokenLifetimeSeconds: 360
  CORSOrigins: ["*"]

  # Real-Time Cache Provider
  cacheProvider:
    enabled: true
    # Supported: mongodb, azureredis, redis, inMemorySql, googlebigtable
    provider: ""
    mongodb:
      databaseName: <my-realtime-cache-db>
      collectionName: <my-realtime-cache-collection>
      # Authentication mechanism for MongoDB Atlas.
      #   default  - username/password in the connection string
      #   iamRole  - AWS IAM via MONGODB-AWS (passwordless auth on Amazon EKS)
      #             Requires roleArn below. The chart adds the eks.amazonaws.com/role-arn
      #             annotation to the Realtime API's ServiceAccount and injects AWS env vars
      #             (AWS_STS_REGIONAL_ENDPOINTS, AWS_DEFAULT_REGION) into the pod.
      #             The EKS Pod Identity Agent injects container credentials automatically.
      #             The MongoDB driver authenticates using the pod's IAM role.
      #             Prerequisites:
      #               1. Add the IAM role ARN as a database user in Atlas (Database Access → AWS IAM)
      #               2. The IAM role needs a trust policy for your EKS cluster's OIDC provider
      authMechanism: default
      # IAM role ARN for MONGODB-AWS authentication (only used when authMechanism: iamRole)
      roleArn: ""
      # AWS region for STS endpoint (only used when authMechanism: iamRole)
      region: us-east-1
    redis:
      # internal: chart-managed Redis | external: BYO Redis
      type: internal
      redisSettings:
        # Required if type=external
        connectionString: "my-redis-host:6379,password=<your-password>,abortConnect=False"
    inMemorySql:
      server_host: <my-cache-database-server-host>
      database_name: <my-cache-database-name>
      username: <my-cache-database-username>
      password: <my-cache-database-password>
    googlebigtable:
      projectId: <my-bigtable-project-id>
      instanceId: <my-bigtable-instance-id>

  # Real-Time Queue Provider
  queueProvider:
    enabled: true
    # Supported: amazonsqs, azureservicebus, googlepubsub, azureeventhubs, rabbitmq, azurestorage, amazonmsk
    provider: ""
    queueNames:
      formQueuePath: RPIWebFormSubmission
      eventsQueuePath: RPIWebEvents
      cacheOutputQueuePath: RPIWebCacheData
      recommendationsQueuePath: RPIWebRecommendations
      listenerQueuePath: RPIQueueListener
      callbackServiceQueuePath: RPICallbackApiQueue
    amazonsqs:
      # Supported: accessKey (configure keys under cloudIdentity.amazonSettings)
      credentialsType: accessKey
    azureservicebus:
      connectionstring: Endpoint=sb://<my-namespace>.servicebus.windows.net/;SharedAccessKeyName=<my-policy>;SharedAccessKey=<my-key>
    azurestorage:
      connectionString: DefaultEndpointsProtocol=https;AccountName=myAccoutName;AccountKey=myAccountAccessKey;EndpointSuffix=core.windows.net
      storageAccountName: myStorageAccountName
      useAzureIdentityAuthentication: false
    googlepubsub:
      projectId: <my-google-project-id>
    azureeventhubs:
      connectionstring: Endpoint=sb://<my-namespace>.servicebus.windows.net/;SharedAccessKeyName=<my-policy>;SharedAccessKey=<my-key>;EntityPath=<my-hub>
      eventHubName: RPIQueueListener
      NamespaceName: my_eventhub_namespace_name
      PartitionIds:
        - "0"
    rabbitmq:
      # internal: chart-managed RabbitMQ | external: BYO RabbitMQ
      type: internal
    amazonmsk:
      region: <my-aws-region>
      accessKeyId: <my-aws-iam-access-key>
      secretAccessKey: <my-aws-iam-secret-access-key>
      bootstrapServers: <my-server1.c2.kafka.us-east-1.amazonaws.com:9198>

  # Custom Realtime plugins (see docs/plugins.md for examples)
  customPlugins:
    enabled: false
    # list: []

  autoscaling:
    enabled: false

  # === Per-service overridable defaults (from _defaults.tpl) ===
  # Uncomment and modify any of the lines below to override the
  # chart's per-service default.
  # podAnnotations: {}
  # podLabels: {}
  # multitenant: false
  # name: rpi-realtimeapi
  # type: deployment
  # rollout:
  #   autoPromotionEnabled: true
  #   revisionHistoryLimit: 3
  # serviceAccount:
  #   enabled: true
  # authentication:
  #   type: basic
  #   basic:
  #     standard: false
  #     forms: true
  #     listenerQueue: true
  #     recommendations: true
  # enableHelpPages: true
  # enableEventListening: true
  # realtimeProcessingEnabled: true
  # ThresholdBetweenSiteVisitsMinutes: 120
  # ThresholdBetweenPageVisitsMinutes: 1
  # CacheWebFormData: false
  # decisionCacheDuration: 60
  # enableAuditMetricsInHeaders: true
  # cacheOutputQueueEnabled: true
  # RealtimeServerCookieEnabled: false
  # RealtimeServerCookieName: rg-visitor
  # RealtimeServerCookieExpires: 60
  # RealtimeServerCookieDomain: ""
  # RealtimeServerCookieHttpOnly: false
  # CacheOutputCollectIPAddress: true
  # HashVisitorID: false
  # EventListeningLocalCacheDuration: 60
  # dataMaps:
  #   visitorProfile:
  #     DaysToPersist: 365
  #     CompressData: true
  #   visitorHistory:
  #     DaysToPersist: 365
  #     CompressData: true
  #   nonVisitorData:
  #     DaysToPersist: 365
  #     CompressData: true
  #   productRecommendation:
  #     DaysToPersist: 365
  #     CompressData: true
  #   offerHistory:
  #     DaysToPersist: 365
  #     CompressData: true
  #   messageHistory:
  #     DaysToPersist: 365
  #     CompressData: true
  # idValidation:
  #   enableVisitorIDValidation: true
  #   visitorID:
  #     minimumLength: 1
  #     maximumLength: 36
  #     enableLetters: true
  #     enableNumbers: true
  #     permittedCharacters:
  #       - "-"
  #       - "_"
  #       - "/"
  #       - "."
  #       - "@"
  #       - "#"
  #       - "&"
  #       - "?"
  #   enableDeviceIDValidation: true
  #   deviceID:
  #     minimumLength: 1
  #     maximumLength: 36
  #     enableLetters: true
  #     enableNumbers: true
  #     permittedCharacters:
  #       - "-"
  #       - "_"
  #       - "/"
