# Queue Reader service configuration — processes messages from the realtime queue
queuereader:
  # Horizontal Pod Autoscaler configuration
  autoscaling:
    enabled: false
    maxReplicas: 5
    minReplicas: 2
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
    type: hpa
  customMetrics:
    enabled: false
    prometheus_scrape: true
  # Enable the Queue Reader service
  enabled: true
  # Queue path for error messages
  errorQueuePath: listenerQueueError
  # Internal cache used by the queue reader.
  internalCache:
    # How often cache state is backed up to the operational DB (e.g., '00:00:20').
    backupToOpsDBInterval: '00:00:20'
    # Cache provider (e.g., redis).
    provider: redis
    redisSettings:
      # Redis connection string (required when type=external).
      connectionString: 'my-redis-host:6379,password=<your-password>,abortConnect=False'
      podDisruptionBudget:
        enabled: false
        minAvailable: 1
      replicas: 1
      resources:
        enabled: true
        limits:
          memory: 3Gi
        requests:
          cpu: 100m
          memory: 256Mi
      volumeClaimTemplates:
        enabled: true
        storage: 100Gi
    # internal (chart-managed) or external (bring your own).
    type: internal
  # Internal message queue used by the queue reader.
  internalQueues:
    # Queue provider (e.g., rabbitmq).
    provider: rabbitmq
    rabbitmqSettings:
      # RabbitMQ hostname.
      hostname: rpi-queuereader-rabbitmq
      # RabbitMQ password.
      password: my_Super_Strong_Pwd
      resources:
        enabled: true
        limits:
          memory: 3Gi
        requests:
          cpu: 100m
          memory: 256Mi
      # RabbitMQ username.
      username: redpointrpi
      virtualhost: /
      volumeClaimTemplates:
        enabled: true
        storage: 100Gi
      volumes:
        claimName: rpi-queuereader-rabbitmq-data
        enabled: false
    # RPI client IDs (GUIDs) served by these queues.
    tenantIds:
    - 00000000-0000-0000-0000-000000000000
    # internal (chart-managed) or external (bring your own).
    type: internal
  isCacheProcessingEnabled: true
  isCallbackServiceProcessingEnabled: true
  isEventProcessingEnabled: true
  isFormProcessingEnabled: true
  listenerQueueErrorTTLDays: 14
  listenerQueueNonActiveTTLDays: 14
  logging:
    Console: Error
    database: Error
    default: Error
    rpiError: Error
    rpiTrace: Error
  maintenanceModeBufferTime: '00:01:00'
  maxBatchSize: 50
  # Queue path for non-active messages
  nonActiveQueuePath: listenerQueueNonActive
  partitionHandler:
    deduplicationCacheTTL: '01:00:00'
    offsetPositionTTL: '23:59:59'
    partitionLockDuration: '00:02:00'
  podAnnotations: {}
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  podLabels: {}
  queueListenerEnabled: true
  # Realtime processing configuration
  realtimeConfiguration:
    # Enable distributed processing for high-volume transactions
    isDistributed: false
    # RPI client IDs (GUIDs) this queue reader processes.
    tenantIds: []
  # Number of Queue Reader pod replicas
  replicas: 1
  # CPU and memory resource requests and limits
  resources:
    enabled: true
    limits:
      memory: 3Gi
    requests:
      cpu: 50m
      memory: 256Mi
  rollout:
    autoPromotionEnabled: true
    revisionHistoryLimit: 3
  seedService:
    maxNumberRetries: '100'
    maxRetryDelay: '00:01:00'
    memoryCacheSize: '10'
  service:
    port: 80
  serviceAccount:
    enabled: true
  terminationGracePeriodSeconds: 120
  threadPoolSize: 10
  timeoutMinutes: 60
  type: deployment
  useMessageLocks: true

# Realtime API service configuration — handles real-time decisioning, caching, and queue
# processing
realtimeapi:
  # Allowed CORS origins for the Realtime API
  CORSOrigins:
  - '*'
  CacheOutputCollectIPAddress: true
  CacheWebFormData: false
  EventListeningLocalCacheDuration: 60
  HashVisitorID: false
  RealtimeServerCookieDomain: ''
  RealtimeServerCookieEnabled: false
  RealtimeServerCookieExpires: 60
  RealtimeServerCookieHttpOnly: false
  RealtimeServerCookieName: rg-visitor
  ThresholdBetweenPageVisitsMinutes: 1
  ThresholdBetweenSiteVisitsMinutes: 120
  # Realtime API authentication configuration
  authentication:
    # Basic authentication settings
    basic:
      # Enable forms basic auth
      forms: true
      # Enable listener queue basic auth
      listenerQueue: true
      # Enable recommendations basic auth
      recommendations: true
      # Enable standard basic auth
      standard: false
    # OAuth authentication settings
    oauth:
      # Access token lifetime in seconds
      accessTokenLifetimeSeconds: 360
      # OAuth database name
      databaseName: RPIRealtimeCore
      # Refresh token lifetime in seconds
      refreshTokenLifetimeSeconds: 360
    # Authentication type for the Realtime API
    type: basic
  # Horizontal Pod Autoscaler configuration
  autoscaling:
    enabled: false
    maxReplicas: 5
    minReplicas: 2
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
    type: hpa
  cacheOutputQueueEnabled: true
  # Real-time cache provider configuration
  cacheProvider:
    # Enable the real-time cache provider
    enabled: true
    # Google Bigtable cache provider settings
    googlebigtable:
      # Bigtable instance ID
      instanceId: <my-bigtable-instance-id>
      # Google Cloud project ID
      projectId: <my-bigtable-project-id>
    # In-memory SQL cache provider settings
    inMemorySql:
      # Cache database name
      database_name: <my-cache-database-name>
      # Cache database password
      password: <my-cache-database-password>
      # Cache database server host
      server_host: <my-cache-database-server-host>
      # Cache database username
      username: <my-cache-database-username>
    # MongoDB cache provider settings
    mongodb:
      authMechanism: default
      # MongoDB collection name
      collectionName: <my-realtime-cache-collection>
      # MongoDB database name
      databaseName: <my-realtime-cache-db>
      region: us-east-1
      roleArn: ''
      # MongoDB connection string
      connectionString: ''
    # Cache provider type
    provider: ''
    # Redis cache provider settings
    redis:
      # Redis connection settings
      redisSettings:
        # Redis connection string (required if type=external)
        connectionString: 'my-redis-host:6379,password=<your-password>,abortConnect=False'
        podDisruptionBudget:
          enabled: false
          minAvailable: 1
        resources:
          enabled: true
          limits:
            memory: 3Gi
          requests:
            cpu: 100m
            memory: 256Mi
        volumeClaimTemplates:
          enabled: true
          storage: 50Gi
      # Redis deployment type: internal (chart-managed) or external (BYO)
      type: internal
  customMetrics:
    enabled: false
    prometheus_scrape: true
  # Custom Realtime plugins configuration
  customPlugins:
    # Enable custom realtime plugins
    enabled: false
    # List of custom plugin configurations
    list: []
  dataMaps:
    messageHistory:
      CompressData: true
      DaysToPersist: 365
    nonVisitorData:
      CompressData: true
      DaysToPersist: 365
    offerHistory:
      CompressData: true
      DaysToPersist: 365
    productRecommendation:
      CompressData: true
      DaysToPersist: 365
    visitorHistory:
      CompressData: true
      DaysToPersist: 365
    visitorProfile:
      CompressData: true
      DaysToPersist: 365
  decisionCacheDuration: 60
  enableAuditMetricsInHeaders: true
  enableEventListening: true
  enableHelpPages: true
  # Enable the Realtime API service
  enabled: true
  # Realtime geolocation settings (weather / location enrichment). Defaults use the native
  # Azure provider; a custom provider can be supplied via the plugin fields. The provider
  # APIKey is not set here - it is supplied via the shared RPI Secret key
  # RealtimeAPI_Geolocation_APIKey (kubernetes/csi) or the cloud vault (sdk).
  geolocation:
    # Minutes to cache resolved coordinates
    coordsCacheTimespanMinutes: 10
    # Optional IP-address-based geolocation lookup
    ipLookup:
      # Minutes to cache coordinates resolved via IP lookup
      coordsCacheTimespanMinutesIPLookup: 30
      # Enable IP-based geolocation lookup
      enableGeoIPLookup: false
      # Assembly name of a custom IP-lookup plugin
      pluginAssembly: ''
      # Key/value settings passed to the custom IP-lookup plugin
      pluginSettings: []
      # Fully qualified type of the custom IP-lookup plugin
      pluginType: ''
    # Assembly name of a custom geolocation provider plugin (blank uses the native provider)
    pluginAssembly: ''
    # Key/value settings passed to the custom geolocation provider plugin
    pluginSettings: []
    # Fully qualified type of the custom geolocation provider plugin
    pluginType: ''
    # Geolocation provider. Native value is Azure; any other value denotes a custom provider
    # configured via the plugin fields.
    provider: Azure
    # Units for weather enrichment
    weatherUnits: imperial
  idValidation:
    deviceID:
      enableLetters: true
      enableNumbers: true
      maximumLength: 36
      minimumLength: 1
      permittedCharacters:
      - '-'
      - _
      - /
      - .
      - '@'
      - '#'
      - '&'
      - '?'
    enableDeviceIDValidation: true
    enableVisitorIDValidation: true
    visitorID:
      enableLetters: true
      enableNumbers: true
      maximumLength: 36
      minimumLength: 1
      permittedCharacters:
      - '-'
      - _
      - /
      - .
      - '@'
      - '#'
      - '&'
      - '?'
  logging:
    realtimeagent:
      console: Error
      database: Error
      default: Error
      rpiError: Error
      rpiTrace: Error
    realtimeapi:
      console: 'false'
      default: Error
      endpoint: Error
      other: Error
      plugins: Error
      shared: Error
  multitenant: false
  name: rpi-realtimeapi
  podAnnotations: {}
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  podLabels: {}
  # Real-time queue provider configuration
  queueProvider:
    # Amazon MSK queue provider settings
    amazonmsk:
      Acks: None
      BatchSize: '1000000'
      CompressionType: Snappy
      LingerTime: 0
      MaxRetryAttempt: 10
      UseAwsMsk: 'True'
      # AWS IAM access key
      accessKeyId: <my-aws-iam-access-key>
      # MSK bootstrap servers
      bootstrapServers: '<my-server1.c2.kafka.us-east-1.amazonaws.com:9198>'
      # AWS region
      region: <my-aws-region>
      # AWS IAM secret access key
      secretAccessKey: <my-aws-iam-secret-access-key>
    # Amazon SQS queue provider settings
    amazonsqs:
      # SQS credentials type
      credentialsType: accessKey
      visibilityTimeout: '301'
    # Azure Event Hubs queue provider settings
    azureeventhubs:
      # Event Hubs namespace name
      NamespaceName: my_eventhub_namespace_name
      # Partition IDs
      PartitionIds:
      - '0'
      ReceiveMessageBatchSize: 200
      SendMessageBatchSize: 200
      # Azure Event Hubs connection string
      connectionstring: 'Endpoint=sb://<my-namespace>.servicebus.windows.net/;SharedAccessKeyName=<my-policy>;SharedAccessKey=<my-key>;EntityPath=<my-hub>'
      # Event Hub name
      eventHubName: RPIQueueListener
    # Azure Service Bus queue provider settings
    azureservicebus:
      # Azure Service Bus connection string
      connectionstring: 'Endpoint=sb://<my-namespace>.servicebus.windows.net/;SharedAccessKeyName=<my-policy>;SharedAccessKey=<my-key>'
    # Azure Storage queue provider settings
    azurestorage:
      # Azure Storage connection string
      connectionString: DefaultEndpointsProtocol=https;AccountName=myAccoutName;AccountKey=myAccountAccessKey;EndpointSuffix=core.windows.net
      receiveVisibilityTimeout: 1
      sendVisibilityTimeout: 1
      # Azure Storage account name
      storageAccountName: myStorageAccountName
      # Use Azure Identity for authentication
      useAzureIdentityAuthentication: false
    # Enable the real-time queue provider
    enabled: true
    # Google Pub/Sub queue provider settings
    googlepubsub:
      # Google Cloud project ID
      projectId: <my-google-project-id>
    # Queue provider type
    provider: ''
    # Queue name configuration for each message type
    queueNames:
      # Cache data output queue name
      cacheOutputQueuePath: RPIWebCacheData
      # Callback API queue name
      callbackServiceQueuePath: RPICallbackApiQueue
      # Web events queue name
      eventsQueuePath: RPIWebEvents
      # Web form submission queue name
      formQueuePath: RPIWebFormSubmission
      # Queue listener queue name
      listenerQueuePath: RPIQueueListener
      # Recommendations queue name
      recommendationsQueuePath: RPIWebRecommendations
    # RabbitMQ queue provider settings
    rabbitmq:
      rabbitmqSettings:
        hostname: rpi-realtimeapi-rabbitmq
        podDisruptionBudget:
          enabled: false
          minAvailable: 1
        resources:
          enabled: true
          limits:
            cpu: 1
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 256Mi
        username: redpointrpi
        virtualhost: /
        volumeClaimTemplates:
          enabled: true
          storage: 100Gi
        volumes:
          claimName: rpi-realtimeapi-rabbitmq-data
          enabled: false
      # RabbitMQ deployment type: internal (chart-managed) or external (BYO)
      type: internal
  realtimeProcessingEnabled: true
  # Number of Realtime API pod replicas
  replicas: 1
  # CPU and memory resource requests and limits
  resources:
    enabled: true
    limits:
      memory: 3Gi
    requests:
      cpu: 50m
      memory: 256Mi
  rollout:
    autoPromotionEnabled: true
    revisionHistoryLimit: 3
  # RPI Client ID (GUID) for this realtime instance
  rpiClientID: 00000000-0000-0000-0000-000000000000
  service:
    port: 80
  serviceAccount:
    enabled: true
  terminationGracePeriodSeconds: 120
  type: deployment

