      useAzureIdentityAuthentication: false
    googlepubsub:
      projectId: <my-google-project-id>
    azureeventhubs:
      connectionstring: Endpoint=sb://<my-namespace>.servicebus.windows.net/;SharedAccessKeyName=<my-policy>;SharedAccessKey=<my-key>;EntityPath=<my-hub>  # → K8s Secret: RealtimeAPI_EventHub_ConnectionString (prompt-only)
