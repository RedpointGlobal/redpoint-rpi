# NOTE on credentials in this section:
#   The Rebrandly API key is NOT read from this file. `rpihelmcli secrets`
#   prompts for it interactively and writes it to the K8s Secret as
#   `Rebrandly_ApiKey`; the chart reads that Secret key at deploy time.
#   The internal Redis password is chart-auto-generated and stored as
#   `Rebrandly_RedisPassword` in the K8s Secret -- operator never touches it.
#   See docs/secrets-management.md for the full list of Secret keys.
rebrandly:
  enabled: false
  # apiKey: <DEPRECATED; ignored. Value lives in K8s Secret key Rebrandly_ApiKey>
  # secretName: <DEPRECATED; ignored. Chart uses the shared Secret via rpi.secrets.secretName>
  redisSettings:
    # internal: chart-managed Redis | external: BYO Redis
    type: internal
    # External Redis settings (used only when type=external)
    hostname: rpi-rebrandly-cache
    # username / password for an external Redis are NOT read from this
    # file. When type=external, `rpihelmcli secrets` prompts for the
    # password and writes it to the K8s Secret as `Rebrandly_RedisPassword`.
    useAzureCredentials: false
    port: 6379

  # === Per-service overridable defaults (from _defaults.tpl) ===
  # Uncomment and modify any of the lines below to override the
  # chart's per-service default.
  # podAnnotations: {}
  # podLabels: {}
  # baseUrl: https://api.rebrandly.com
  # enterpriseBaseUrl: https://enterprise-api.rebrandly.com
  # type: deployment
  # rollout:
  #   autoPromotionEnabled: true
  #   revisionHistoryLimit: 3
  # replicas: 1
  # serviceAccount:
  #   enabled: true
  # redisSettings:
  #   resources:
  #     requests:
  #       cpu: 50m
  #       memory: 256Mi
  #     limits:
  #       memory: 3Gi
  #       cpu: 3000m
  #   volumeClaimTemplates:
  #     enabled: false
  #     type: dynamic
  #     size: 50Gi
  #     storageClassName: default
  #     accessModes: ReadWriteOnce
  # service:
  #   port: 80
  # customMetrics:
  #   enabled: false
  #   prometheus_scrape: false
  # terminationGracePeriodSeconds: 120
  # logging:
  #   default: Error
  #   aspNetCore: Error
  # resources:
  #   enabled: true


# ==========================
# Diagnostics Mode
# ==========================
diagnosticsMode:
  copytoAzureBlob:
    enabled: false
    accountName: <yourstorageaccount>
    # accessKey is NOT read from this file -- it lives in the K8s Secret
    # as CopyToAzureBlobAccessKey. Populate it via `rpihelmcli secrets`
    # (or directly in the chart Secret for non-CLI deployments).
    accessKey: <yourstorageaccount-access-key>  # → K8s Secret: CopyToAzureBlobAccessKey
    containerName: <yourstorageaccount-container-name>
    blobServiceEndpoint: https://yourstorage.blob.core.windows.net
    enableCdn: false
    UseDataLakeStorageGen2: false
  copytoSftp:
    enabled: false
    sftpHost: <your-sftp-host>
    sftpUsername: <your-sftp-username>
    # sftpPassword is NOT read from this file -- it lives in the K8s
    # Secret as CopyToSFTPSecureFTPPassword. Populate it via
    # `rpihelmcli secrets` (or directly in the chart Secret).
    sftpPassword: <your-sftp-password>  # → K8s Secret: CopyToSFTPSecureFTPPassword
    sftpPort: "22"

  # === Per-service overridable defaults (from _defaults.tpl) ===
  # Uncomment and modify any of the lines below to override the
  # chart's per-service default.
  # dotNetTools:
  #   enabled: false
  #   useGcDump: false
  #   useCounters: false
  #   path: /app/dotnet-tools
  #   extractionBaseDir: /tmp
  # netutils:
  #   enabled: false
  #   securityContext:
  #     runAsNonRoot: true
  #     runAsUser: 7777
  #     runAsGroup: 7777
  #     readOnlyRootFilesystem: true
  #     allowPrivilegeEscalation: false
  #     privileged: false
  #     appArmorProfile: ""
  #     capabilities:
  #       drop:
  #         - ALL
  #       add: ["NET_ADMIN", "NET_RAW"]


# ==========================
# Microsoft Entra ID Authentication
# ==========================
MicrosoftEntraID:
  enabled: false
  interaction_client_id: 00000000-0000-0000-0000-000000000000
  interaction_api_id: 00000000-0000-0000-0000-000000000000
  tenant_id: 00000000-0000-0000-0000-000000000000

# ==========================
# OpenID Connect Providers
# ==========================
OpenIdProviders:
  enabled: false
  # Supported: keycloak, Okta
  name: Keycloak
  authorizationHost: https://login.microsoftonline.com/00000000-0000-0000-0000-000000000000/v2.0
  clientID: 00000000-0000-0000-0000-000000000000
  audience: api://00000000-0000-0000-0000-000000000000
  redirectURL: https://rpi-interactionapi.example.com
  enableRefreshTokens: true
  validateIssuer: false
  validateAudience: true
  logoutIdTokenParameter: id_token_hint
  # customScopes:
  #   - api://00000000-0000-0000-0000-000000000000/Interaction.Clients
  supportsUserManagement: false

# ==========================
# SMTP Settings
# ==========================
SMTPSettings:
  SMTP_SenderAddress: noreply-rpi@example.com
  SMTP_SenderName: "Redpoint Global"
  SMTP_Address: your_smtp_host
  SMTP_Port: 587
  EnableSSL: true
  UseCredentials: true
  SMTP_Username: your_smtp_server_username
  # SMTP_Password is stored in the K8s Secret, not here.
  # See Required Secret Keys in secrets-management.md: SMTP_Password

# ============================================================
#  INGRESS
# ============================================================

ingress:
  controller:
    enabled: false
  mode: public                            # public | private
  certificateSource: kubernetes           # kubernetes | acm
  # TLS entries (rendered when certificateSource=kubernetes)
  # Add entries with explicit hosts lists for multi-cert setups
  tls:
    - secretName: ingress-tls
    # - secretName: certsecrets             # additional cert for FQDN hosts
    #   hosts:
    #     - mpulse.example.com
  domain: example.com
  subnetName: <my-ingress-vpc-subnet-name>  # required if mode=private
  certificateArn: your_acm_certificate_arn  # required if certificateSource=acm
  privateLink:
    azure:
      enabled: false
  # Service hostnames - subdomains are prepended to domain,
  # values containing a dot are used as FQDNs (e.g., mpulse.example.com)
  hosts:
    config: rpi-deploymentapi
    client: rpi-interactionapi
    integration: rpi-integrationapi
    realtime: rpi-realtimeapi
    callbackapi: rpi-callbackapi            # or: mpulse.example.com (FQDN)
    queuereader: rpi-queuereader
    rabbitmqconsole: rpi-rabbitmq-console
    smartactivation: rpi-smartActivation
    observability: rpi-observability            # only used when observability.enabled=true

  # === Per-service overridable defaults (from _defaults.tpl) ===
  # Uncomment and modify any of the lines below to override the
  # chart's per-service default.
  # className: {{ .Release.Namespace }}
  # internalImageOverride:
  #   enabled: false
  #   image: registry.k8s.io/ingress-nginx/controller:v1.14.3@sha256:82917be97c0939f6ada1717bb39aa7e66c229d6cfb10dcfc8f1bd42f9efe0f81
  # service:
  #   port: 80
  # tls:
  #   - secretName: ingress-tls


# ==========================
# Network Policy
# ==========================
networkPolicy:
  enabled: false

  # === Per-service overridable defaults (from _defaults.tpl) ===
  # Uncomment and modify any of the lines below to override the
  # chart's per-service default.
  # allowDNS: true


# ==========================
# Service Mesh
# ==========================
serviceMesh:
  enabled: false
  # Supported: linkerd
  provider: linkerd
  # Pod annotations added to all RPI deployments when service mesh is enabled.
  # Defaults: inject=enabled, skip-outbound-ports=443, proxy-outbound-connect-timeout=240000ms
  # Override or add annotations here; these merge with (and override) the defaults.
  # To disable injection for a specific service, set podAnnotations on that service:
  #   deploymentapi:
  #     podAnnotations:
  #       linkerd.io/inject: disabled
  podAnnotations: {}
  # podAnnotations:
  #   linkerd.io/inject: enabled
  #   config.linkerd.io/skip-outbound-ports: "443,587"
  #   config.linkerd.io/proxy-outbound-connect-timeout: "300000ms"
  #   config.linkerd.io/proxy-cpu-request: "100m"
  # Shared defaults for all servers. Per-server values override these.
  serverDefaults: {}
  # serverDefaults:
  #   port: 8080
  #   proxyProtocol: HTTP/1
  #   allowUnauthenticated: true
  #   networks:
  #     - cidr: 10.0.0.0/8
  #
  # Linkerd Server CRDs for L7 traffic policy.
  # Each server creates a Server + AuthorizationPolicy + NetworkAuthentication.
  # podSelector is auto-derived from the name if not set (e.g., name "aks-rpi-realtimeapi"
  # produces podSelector app.kubernetes.io/name: rpi-realtimeapi).
  # Per-server values override serverDefaults.
  servers: []
  # Minimal example (using serverDefaults for shared settings):
  # servers:
  #   - name: aks-rpi-interactionapi
  #   - name: aks-rpi-executionservice
  #     allowUnauthenticated: false
  #   - name: aks-rpi-nodemanager
  #     allowUnauthenticated: false
  #   - name: aks-rpi-realtimeapi
  #   - name: aks-rpi-callbackapi
  #   - name: aks-rpi-integrationapi
  #   - name: aks-rpi-deploymentapi
  #   - name: aks-rpi-queuereader
  #
  # Full example (explicit per-server settings):
  # servers:
  #   - name: aks-rpi-realtimeapi
  #     podSelector:
  #       app.kubernetes.io/name: rpi-realtimeapi
  #     port: 8080
  #     proxyProtocol: HTTP/1
  #     allowUnauthenticated: true
  #     networks:
  #       - cidr: 10.0.0.0/8

# ==========================
# Node Scheduling
# ==========================
nodeSelector:
  enabled: false
  key: app
  value: redpoint-rpi

tolerations:
  enabled: false
  effect: NoSchedule
  key: app
  operator: Equal
  value: redpoint-rpi

# ==========================
# Node Provisioning
# ==========================
# Optional: create a Karpenter NodePool for dedicated RPI nodes.
# Useful on EKS when you want RPI pods on specific instance types with taints.
nodeProvisioning:
  enabled: false
  provider: karpenter           # karpenter
  karpenter:
    nodePool:
      name: redpoint-nodepool
      labels: {}
      # labels:
      #   workload: redpoint-api
      taints: []
      # taints:
      #   - key: workload
      #     value: redpoint-api
      #     effect: NoSchedule
      startupTaints: []
      # startupTaints:
      #   - key: efs.csi.aws.com/agent-not-ready
      #     value: "true"
      #     effect: NoSchedule
      requirements: []
      # requirements:
      #   - key: karpenter.k8s.aws/instance-family
      #     operator: In
      #     values: ["m7i"]
      #   - key: karpenter.k8s.aws/instance-size
      #     operator: In
      #     values: ["4xlarge"]
      #   - key: kubernetes.io/arch
      #     operator: In
      #     values: ["amd64"]
      #   - key: karpenter.sh/capacity-type
      #     operator: In
      #     values: ["on-demand"]
      expireAfter: 360h
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      disruption:
        consolidationPolicy: WhenEmpty
        consolidateAfter: 15m
      limits:
        cpu: "1000"
        memory: 1000Gi
      weight: 10

# ==========================
# Redpoint AI
# ==========================
redpointAI:
  enabled: false
  # Sensitive values (ApiKey, SearchKey, ConnectionString) are stored in the K8s Secret,
  # not here. See Required Secret Keys in secrets-management.md:
  #   RPI_NLP_API_KEY, RPI_NLP_SEARCH_KEY, RPI_NLP_MODEL_CONNECTION_STRING
  naturalLanguage:
    ApiBase: https://example.openai.azure.com/
    ApiVersion: 2023-07-01-preview
    ChatGptEngine: gpt-5.2
    ChatGptTemp: 0.5
  cognitiveSearch:
    SearchEndpoint: https://example.search.windows.net
    VectorSearchProfile: vector-profile-000000000000
    VectorSearchConfig: vector-config-000000000000
  modelStorage:
    EmbeddingsModel: text-embedding-ada-002
    ModelDimensions: 1536
    ContainerName: my_blob_container_name
    BlobFolder: my_blob_container_folder_name

