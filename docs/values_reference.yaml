# ============================================================
# REDPOINT INTERACTION (RPI) - Values Reference
# ============================================================
# COMPLETE catalog of every configurable value and its default.
#
# GENERATED from the chart's effective defaults - do not edit by hand.
# Regenerate with: python3 docs/gen_values_reference.py
#
# Browse this file to see what you can configure, then copy only the
# keys you want to change into your own overrides file. You do not need
# to set everything here; the chart applies these defaults automatically.
# ============================================================

# Global settings shared across all chart components
global:
  # Core deployment configuration
  deployment:
    # Container image settings for all RPI services
    images:
      # Kubernetes image pull policy
      imagePullPolicy: Always
      # Image pull secret for private registries
      imagePullSecret:
        # Enable image pull secret
        enabled: true
        # Name of the Kubernetes image pull secret
        name: redpoint-rpi
      # Container image registry and repository path
      registry: rg1acrpub.azurecr.io/docker/redpointglobal/releases
      # RPI version tag in format: <major.minor>.<year>-<MMDD>-<HHMM>
      tag: 7.7.20260414.1238
      # Per-service image overrides. When set, the value is used verbatim instead of
      # {registry}/{service-name}:{tag}. Useful for flat registries (e.g., ECR with all images
      # in a single repo).
      overrides: {}
    # Deployment mode: standard (production deployment) or demo (embedded MSSQL + MongoDB for
    # local dev/evaluation).
    mode: standard
    # Cloud environment: azure, amazon, google, or selfhosted
    platform: amazon
    # Set the pod timezone (e.g., 'America/New_York'); leave empty for default UTC
    podTimezone: ''

# Override the chart name used in resource names
nameOverride: ''

# Override the fully qualified app name used in resource names
fullnameOverride: ''

# Annotations applied to all resource types (ServiceAccounts, Services, Deployments, Pods)
commonAnnotations: {}

# Custom annotations applied to all chart resources
customAnnotations: {}

# Custom labels applied to all chart resources
customLabels: {}

# Labels applied to pod templates only (not Deployment metadata)
podLabels: {}

# Additional annotations for Services (merged with commonAnnotations)
serviceAnnotations: {}

# Additional annotations for ServiceAccounts (merged with commonAnnotations)
serviceAccountAnnotations: {}

# Database configuration for operational and data warehouse connections
databases:
  # Data warehouse provider configurations
  datawarehouse:
    # Google BigQuery data warehouse configuration
    bigquery:
      # List of BigQuery connection configurations
      connections:
      - ConfigMapFilePath: /app/google-creds
        OAuthMechanism: 0
        allowLargeResults: 0
        configMapName: gbq-tenant1
        credentialsType: serviceAccount
        keyName: gbq-tenant1.json
        largeResultsDataSetId: _bqodbc_temp_tables
        largeResultsTempTableExpirationTime: '3600000'
        name: gbq-tenant1
        projectId: gbq-tenant1
        serviceAccountEmail: gbq-tenant1@my-project.iam.gserviceaccount.com
        sqlDialect: 1
      # Enable BigQuery data warehouse provider
      enabled: false
    # Snowflake data warehouse configuration
    snowflake:
      # Credentials type (e.g., snowflake_jwt)
      credentialsType: snowflake_jwt
      # Enable Snowflake data warehouse provider
      enabled: false
      # Snowflake private key files. Each entry has keyName and optional secretName.
      keys:
      - keyName: my-snowflake-rsakey.p8
        secretName: snowflake-rsa-private-key
      # Mount path for Snowflake key files (default: /app/snowflake-creds)
      mountPath: /app/snowflake-creds
      # CSI SecretProviderClass name for mounting keys from vault
      secretProviderClassName: ''
  # Operational database connection settings
  operational:
    # Google Cloud SQL Auth Proxy sidecar (GKE only; activates when platform=google,
    # provider=postgresql, and enabled=true)
    cloudSqlProxy:
      additionalArgs: []
      # Use IAM database authentication instead of password auth
      autoIamAuthn: false
      # Cloud SQL instance connection name in the form 'project:region:instance'
      connectionName: ''
      # Enable the Cloud SQL Auth Proxy sidecar
      enabled: false
      # Cloud SQL Auth Proxy container image (verbatim URI)
      image: 'gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.2'
      # Connect to the Cloud SQL private IP (requires VPC peering)
      privateIp: true
      resources:
        limits:
          cpu: 200m
          memory: 256Mi
        requests:
          cpu: 50m
          memory: 64Mi
      # Graceful shutdown window (e.g. '30s')
      terminationGracePeriod: 30s
      # Local port the proxy listens on; used as ConnectionSettings__Port
      port: null
    # Enable TLS encryption for database connections
    encrypt: true
    # Database provider type
    provider: sqlserver
    # Name of the Pulse operational database
    pulse_database_name: <my-pulse-database-name>
    # Name of the Pulse logging database
    pulse_logging_database_name: <my-logging-database-name>
    # Database server hostname or IP address
    server_host: <my-database-server-host>
    # Database server password
    server_password: <my-database-server-password>
    # Database server username
    server_username: <my-database-server-username>

# How secrets are provided to pods: kubernetes (K8s Secret), sdk (cloud vault at runtime), or
# csi (CSI driver syncs vault to K8s Secret)
secretsManagement:
  # CSI driver settings — syncs cloud vault to K8s Secret (provider: csi)
  csi:
    # K8s secret name created by the CSI driver
    secretName: redpoint-rpi-secrets
    # SecretProviderClass definitions for CSI driver
    secretProviderClasses:
    - name: my-secret-class-1
      objects:
        - objectName: my-tls-certificate
          objectType: secret
      parameters:
        clientID: my-managed-identity-client-id
        keyvaultName: my-keyvault-name
        resourceGroup: my-resource-group
        subscriptionId: my-subscription-id
        tenantId: my-azure-tenant-id
        usePodIdentity: 'false'
        useVMManagedIdentity: 'false'
        useWorkloadIdentity: 'true'
      provider: azure
      secretObjects:
        - data:
            - key: tls.key
              objectName: my-tls-certificate
          secretName: secret1
          type: kubernetes.io/tls
    - name: my-secret-class-2
      objects:
        - objectName: V7-ConnectionString-Operations
          objectType: secret
      parameters:
        clientID: my-managed-identity-client-id
        enable-secret-rotation: 'true'
        keyvaultName: my-keyvault-name
        resourceGroup: my-resource-group
        subscriptionId: my-subscription-id
        syncSecret: 'true'
        tenantId: my-azure-tenant-id
        usePodIdentity: 'false'
        useVMManagedIdentity: 'false'
        useWorkloadIdentity: 'true'
      provider: azure
      secretObjects:
        - data:
            - key: ConnectionString_Logging_Database
              objectName: V7-ConnectionString-LoggingDatabase
          secretName: secret2
          type: Opaque
    syncService: none
  # Kubernetes secrets settings (provider: kubernetes)
  kubernetes:
    # Name of the pre-created Kubernetes secret containing application credentials
    secretName: redpoint-rpi-secrets
  # Secrets management provider
  provider: kubernetes
  # SDK settings — app reads from cloud vault directly (provider: sdk)
  sdk:
    # AWS Secrets Manager SDK settings
    amazon:
      # Tag key used to filter secrets in AWS Secrets Manager
      secretTagKey: ''
    # Azure Key Vault SDK settings
    azure:
      # Interval in seconds to reload configuration from vault
      configurationReloadIntervalSeconds: 30
      # Use Azure AD token for database connections
      useADTokenForDatabaseConnection: true
      # Azure Key Vault URI
      vaultUri: 'https://myvault.vault.azure.net/'
    # Google Secret Manager SDK settings
    google:
      # Google Cloud project ID for Secret Manager
      projectId: ''

# Pod-to-cloud authentication. Required for sdk and csi secrets modes. Authentication
# mechanism derived from global.deployment.platform.
cloudIdentity:
  # Amazon IRSA / Access Keys settings
  amazon:
    # AWS region (e.g., us-east-1)
    region: us-east-1
    # IAM Role ARN for IRSA (IAM Roles for Service Accounts)
    roleArn: 'arn:aws:iam::my-aws-account-id:role/my-role-name'
    # Inject AWS access keys from the main K8s Secret (AWS_Access_Key_ID,
    # AWS_Secret_Access_Key)
    useAccessKeys: false
  # Azure Workload Identity settings
  azure:
    # Azure Managed Identity Client ID for Workload Identity
    managedIdentityClientId: your-workload-identity-client-id
    # Azure Active Directory Tenant ID
    tenantId: your-azure-tenant-id
  # Enable cloud identity for pod authentication to cloud services
  enabled: false
  # Google Cloud Workload Identity settings
  google:
    # Mount path for the ConfigMap
    configMapFilePath: /app/google-creds
    # ConfigMap containing the service account JSON credentials
    configMapName: my-google-svs-account
    # Key file name within the ConfigMap
    keyName: my-google-svs-account.json
    # Google Cloud project ID
    projectId: your_google_project_id
    # Google Cloud service account email
    serviceAccountEmail: my-google-svs-account@my-project.iam.gserviceaccount.com
  # ServiceAccount configuration. shared=one SA for all pods; per-service=each service gets
  # its own SA.
  serviceAccount:
    # shared: one SA for all pods. per-service: each service gets its own SA.
    mode: per-service
    # Name of the ServiceAccount
    name: redpoint-rpi

# Mount custom CA certificates into all pods
customCACerts:
  # Enable custom CA certificate mounting
  enabled: false
  # Mount path for CA certificates inside the container
  mountPath: /usr/local/share/ca-certificates/custom
  # Name of the ConfigMap or Secret containing CA certificates
  name: ''
  # Source type for CA certificates
  source: ''
  # Optional: specific CA bundle filename. When set, SSL_CERT_FILE env var is set to
  # mountPath/certFile
  certFile: ''

# SMTP email settings for notifications
SMTPSettings:
  # Enable SSL/TLS for SMTP connection
  EnableSSL: true
  # SMTP server hostname
  SMTP_Address: your_smtp_host
  # SMTP server port
  SMTP_Port: 587
  # Sender email address
  SMTP_SenderAddress: noreply-rpi@example.com
  # Sender display name
  SMTP_SenderName: Redpoint Global
  # SMTP authentication username
  SMTP_Username: your_smtp_server_username
  # Use authentication credentials for SMTP
  UseCredentials: true
  # SMTP authentication password
  SMTP_Password: ''

# OpenID Connect provider configuration for SSO
OpenIdProviders:
  # OpenID audience identifier
  audience: 'api://00000000-0000-0000-0000-000000000000'
  # OpenID authorization endpoint URL
  authorizationHost: 'https://login.microsoftonline.com/00000000-0000-0000-0000-000000000000/v2.0'
  # OpenID client ID
  clientID: 00000000-0000-0000-0000-000000000000
  # Enable refresh token support
  enableRefreshTokens: true
  # Enable OpenID Connect authentication
  enabled: false
  # Parameter name for ID token on logout
  logoutIdTokenParameter: id_token_hint
  # OpenID provider name
  name: Keycloak
  # Redirect URL after authentication
  redirectURL: 'https://rpi-interactionapi.example.com'
  # Whether the provider supports user management
  supportsUserManagement: false
  # Validate the token audience
  validateAudience: true
  # Validate the token issuer
  validateIssuer: false
  # Custom OAuth scopes to request
  customScopes: []

# Microsoft Entra ID (formerly Azure AD) authentication configuration
MicrosoftEntraID:
  # Enable Microsoft Entra ID authentication
  enabled: false
  # Entra ID API application ID
  interaction_api_id: 00000000-0000-0000-0000-000000000000
  # Entra ID application (client) ID for Interaction
  interaction_client_id: 00000000-0000-0000-0000-000000000000
  # Entra ID tenant (directory) ID
  tenant_id: 00000000-0000-0000-0000-000000000000

# Ingress configuration for external access to RPI services
ingress:
  # ACM certificate ARN (required if certificateSource=acm)
  certificateArn: your_acm_certificate_arn
  # TLS certificate source: kubernetes (K8s Secret) or acm (AWS Certificate Manager)
  certificateSource: kubernetes
  # Ingress class name override (defaults to release namespace)
  className: qa-d9a0b5
  # Ingress controller configuration
  controller:
    # Deploy a chart-managed ingress controller (false if supplying your own)
    enabled: false
  # Base domain for ingress hostnames
  domain: example.com
  # Service hostnames — subdomains are prepended to domain; values with a dot are used as
  # FQDNs
  hosts:
    # Callback API hostname or subdomain (or FQDN)
    callbackapi: rpi-callbackapi
    # Interaction API hostname or subdomain
    client: rpi-interactionapi
    # Deployment API hostname or subdomain
    config: rpi-deploymentapi
    # Integration API hostname or subdomain
    integration: rpi-integrationapi
    observability: rpi-observability
    # Queue Reader hostname or subdomain
    queuereader: rpi-queuereader
    # RabbitMQ console hostname or subdomain
    rabbitmqconsole: rpi-rabbitmq-console
    # Realtime API hostname or subdomain
    realtime: rpi-realtimeapi
    # Smart Activation hostname or subdomain
    smartactivation: rpi-smartActivation
  internalImageOverride:
    enabled: false
    image: 'registry.k8s.io/ingress-nginx/controller:v1.14.3@sha256:82917be97c0939f6ada1717bb39aa7e66c229d6cfb10dcfc8f1bd42f9efe0f81'
  # Ingress mode: public (internet-facing) or private (internal only)
  mode: public
  # Private link configuration
  privateLink:
    # Azure Private Link settings
    azure:
      # Enable Azure Private Link
      enabled: false
  service:
    port: 80
  # VPC subnet name (required if mode=private)
  subnetName: <my-ingress-vpc-subnet-name>
  # TLS configuration entries (rendered when certificateSource=kubernetes)
  tls:
  - secretName: ingress-tls
  # Custom ingress annotations (replaces defaults when set)
  annotations: {}

# Kubernetes Network Policy configuration
networkPolicy:
  allowDNS: true
  # Enable Kubernetes network policies
  enabled: false

# Service mesh configuration
serviceMesh:
  # Enable service mesh integration
  enabled: false
  podAnnotations: {}
  # Service mesh provider
  provider: linkerd
  serverDefaults: {}
  # Linkerd Server CRDs for L7 traffic policy
  servers: []

# Storage configuration for persistent volume claims and volumes
storage:
  dynamicPVCs: []
  # Persistent volume claim configurations
  persistentVolumeClaims:
    # PVC for data management upload directory
    DataManagementUploadDirectory:
      # PVC claim name
      claimName: rpdmuploaddirectory
      # Enable this PVC
      enabled: false
      # Mount path in the container
      mountPath: /rpdmuploaddirectory
    # PVC for file output directory
    FileOutputDirectory:
      # PVC claim name
      claimName: rpifileoutputdir
      # Enable this PVC
      enabled: false
      # Mount path in the container
      mountPath: /rpifileoutputdir
    # PVC for realtime plugins
    Plugins:
      # PVC claim name
      claimName: realtimeplugins
      # Enable this PVC
      enabled: false
      # Mount path in the container
      mountPath: /app/plugins
  # Create PV + PVC pairs (for CSI-backed storage)
  persistentVolumes: []
  # Optional StorageClass for CSI-backed storage (EFS, Azure File, etc.)
  storageClass:
    # Create a StorageClass resource
    enabled: false
    mountOptions: []
    # Name of the StorageClass
    name: redpoint-rpi
    # Provisioner-specific parameters
    parameters: {}
    # CSI provisioner (e.g., efs.csi.aws.com)
    provisioner: ''
    # Reclaim policy
    reclaimPolicy: Delete
    volumeBindingMode: Immediate

# Kubernetes node selector for pod scheduling
nodeSelector:
  # Enable node selector
  enabled: false
  # Node label key
  key: app
  # Node label value
  value: redpoint-rpi

# Kubernetes tolerations for pod scheduling on tainted nodes
tolerations:
  # Toleration effect (e.g., NoSchedule)
  effect: NoSchedule
  # Enable tolerations
  enabled: false
  # Toleration key
  key: app
  # Toleration operator (e.g., Equal, Exists)
  operator: Equal
  # Toleration value
  value: redpoint-rpi

# Pod anti-affinity settings applied to all services
podAntiAffinity:
  # Enable pod anti-affinity
  enabled: true
  # Topology key for anti-affinity spreading
  topologyKey: kubernetes.io/hostname
  # Anti-affinity type: preferred (soft) or required (hard)
  type: preferred
  # Weight for preferred anti-affinity (1-100, ignored for required)
  weight: 100

# Global topology spread constraints overrides (merged with defaults from _defaults.tpl)
topologySpreadConstraints:
  enabled: true
  maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: ScheduleAnyway

# Node provisioning for dedicated RPI nodes (Karpenter NodePool)
nodeProvisioning:
  # Enable node provisioning
  enabled: false
  # Karpenter NodePool configuration
  karpenter:
    nodePool:
      disruption:
        consolidateAfter: 15m
        consolidationPolicy: WhenEmpty
      expireAfter: 360h
      labels: {}
      limits:
        cpu: '1000'
        memory: 1000Gi
      name: redpoint-nodepool
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements: []
      startupTaints: []
      taints: []
      weight: 10
  # Node provisioner
  provider: karpenter

# Global resource defaults applied to all services. Per-service overrides take priority.
resources:
  limits:
    memory: 3Gi
  requests:
    cpu: 50m
    memory: 256Mi

# Global pod security context overrides (merged with defaults from _defaults.tpl)
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  enabled: true
  fsGroup: 7777
  privileged: false
  readOnlyRootFilesystem: true
  runAsGroup: 7777
  runAsNonRoot: true
  runAsUser: 7777
  supplementalGroups:
  - 1000
  - 4000
  - 5000

# Global liveness probe overrides (merged with defaults from _defaults.tpl)
livenessProbe:
  enabled: true
  failureThreshold: 5
  httpGet:
    path: /health/live
    port: 8080
    scheme: HTTP
  initialDelaySeconds: 60
  periodSeconds: 15
  successThreshold: 1
  timeoutSeconds: 5

# Global readiness probe overrides (merged with defaults from _defaults.tpl)
readinessProbe:
  enabled: true
  failureThreshold: 5
  httpGet:
    path: /health/ready
    port: 8080
    scheme: HTTP
  initialDelaySeconds: 20
  periodSeconds: 30
  successThreshold: 1
  timeoutSeconds: 5

# Global startup probe overrides (merged with defaults from _defaults.tpl)
startupProbe:
  enabled: true
  failureThreshold: 60
  httpGet:
    path: /health/live
    port: 8080
    scheme: HTTP
  initialDelaySeconds: 10
  periodSeconds: 10
  successThreshold: 1
  timeoutSeconds: 5

# Enable Prometheus scrape annotations on all RPI service pods
customMetrics:
  # Enable Prometheus metrics annotations on all services
  enabled: false

# Diagnostics mode configuration for troubleshooting and monitoring
diagnosticsMode:
  # Copy diagnostics to Azure Blob Storage
  copytoAzureBlob:
    # Use Azure Data Lake Storage Gen2
    UseDataLakeStorageGen2: false
    # Azure Storage access key
    accessKey: <yourstorageaccount-access-key>
    # Azure Storage account name
    accountName: <yourstorageaccount>
    # Azure Blob service endpoint URL
    blobServiceEndpoint: 'https://yourstorage.blob.core.windows.net'
    # Azure Blob container name
    containerName: <yourstorageaccount-container-name>
    # Enable CDN for blob access
    enableCdn: false
    # Enable copying to Azure Blob
    enabled: false
  # Copy diagnostics to SFTP server
  copytoSftp:
    # Enable copying to SFTP
    enabled: false
    # SFTP server hostname
    sftpHost: <your-sftp-host>
    # SFTP password
    sftpPassword: <your-sftp-password>
    # SFTP port
    sftpPort: '22'
    # SFTP username
    sftpUsername: <your-sftp-username>
  # .NET diagnostic tools settings
  dotNetTools:
    # Enable .NET diagnostic tools
    enabled: false
    extractionBaseDir: /tmp
    path: /app/dotnet-tools
    useCounters: false
    useGcDump: false
  netutils:
    enabled: false
    securityContext:
      allowPrivilegeEscalation: false
      appArmorProfile: ''
      capabilities:
        add:
        - NET_ADMIN
        - NET_RAW
        drop:
        - ALL
      privileged: false
      readOnlyRootFilesystem: true
      runAsGroup: 7777
      runAsNonRoot: true
      runAsUser: 7777

# Pre-flight validation: checks DNS, DB connectivity, cloud identity, and secrets management
# before deployment
preflight:
  # Enable pre-flight validation
  enabled: false
  # Preflight mode: test (runs with helm test) or preInstall (blocks install on failure)
  mode: test

# Post-install automation: license activation, cluster DB install, and optional tenant
# creation. Runs as a Helm post-install hook.
postInstall:
  # RPI license activation key
  activationKey: ''
  # Initial admin email
  adminEmail: ''
  # Initial admin password
  adminPassword: ''
  # Initial admin username
  adminUsername: coreuser
  # Number of retries before considering the job failed
  backoffLimit: 3
  deploymentapiHost: rpi-deploymentapi
  deploymentapiPort: '80'
  # Enable post-install automation
  enabled: false
  # Use an existing K8s secret instead of inline values (keys: activation-key, admin-password,
  # admin-username, admin-email)
  existingSecret: ''
  maxReadyWaitSeconds: '600'
  pollIntervalSeconds: '15'
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  # System name for license activation
  systemName: ''
  # Automatic tenant creation configuration
  tenant:
    # Data warehouse configuration for the tenant
    dataWarehouse:
      # DW database name
      database: ''
      # DW password
      password: ''
      # Data warehouse provider (e.g., SQLServer)
      provider: SQLServer
      # DW server hostname
      server: ''
      # DW username
      username: ''
    # Enable automatic tenant creation
    enabled: false
    # Existing secret for DW credentials
    existingSecret: ''
    # Tenant name
    name: ''
  # Timeout in seconds to wait for services to be ready
  waitTimeout: 360

# Validation pods that verify storage mounts and CSI secret mounts are working
validationPods:
  # Enable validation pod deployments
  enabled: false
  # List of validation pod deployment definitions
  deployments: []

# Automatic database upgrade job - calls the upgrade endpoint after an image tag change. The
# net-utils image resolves through the canonical rpi.image helper; override via
# global.deployment.images.overrides.net-utils or global.deployment.images.nameOverrides.net-
# utils.
databaseUpgrade:
  activeDeadlineSeconds: 900
  backoffLimit: 3
  deploymentapiHost: rpi-deploymentapi
  deploymentapiPort: '80'
  # Enable automatic database upgrade
  enabled: false
  healthPath: /health/ready
  maxReadyWaitSeconds: '600'
  # Email notification settings for upgrade completion
  notification:
    # Enable upgrade notification emails
    enabled: false
    # Recipient email for upgrade notifications
    recipientEmail: ''
  pollIntervalSeconds: '15'
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  ttlSecondsAfterFinished: 3600
  upgradePath: /api/deployment/upgrade
  waitTimeoutSeconds: '360'

# Interaction API service configuration — main API for client/UI interactions
interactionapi:
  allowSavingLoginDetails: true
  alwaysShowClientsAtLogin: true
  authMetaHttpEnabled: true
  # Horizontal Pod Autoscaler configuration
  autoscaling:
    enabled: false
    maxReplicas: 5
    minReplicas: 2
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
    type: hpa
  customMetrics:
    enabled: false
    prometheus_scrape: false
  # Enable RPI authentication for this service
  enableRPIAuthentication: true
  enableSwagger: true
  # Enable the Interaction API service
  enabled: true
  logging:
    Console: Error
    database: Error
    default: Error
    rpiError: Error
    rpiTrace: Error
  podAnnotations: {}
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  podLabels: {}
  productUpdateFeed:
    enabled: true
    url: 'https://www.redpointglobal.com/feed/productfeed'
  # Number of Interaction API pod replicas
  replicas: 1
  # CPU and memory resource requests and limits
  resources:
    enabled: true
    limits:
      memory: 3Gi
    requests:
      cpu: 50m
      memory: 256Mi
  rollout:
    autoPromotionEnabled: true
    revisionHistoryLimit: 3
  service:
    port: 80
  serviceAccount:
    enabled: true
  terminationGracePeriodSeconds: 120
  type: deployment
  useExternalUserManagement: false

# Integration API service configuration — handles external system integrations and Smart
# Activation communication
integrationapi:
  authMetaHttpEnabled: false
  # Horizontal Pod Autoscaler configuration
  autoscaling:
    enabled: false
    maxReplicas: 5
    minReplicas: 2
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
    type: hpa
  customMetrics:
    enabled: false
    prometheus_scrape: true
  # Enable RPI authentication for this service
  enableRPIAuthentication: true
  enableSwagger: true
  # Enable the Integration API service
  enabled: true
  logging:
    Console: Error
    database: Error
    default: Error
    rpiError: Error
    rpiTrace: Error
  # Integration API credentials password
  password: my_Super_Strong_Pwd
  podAnnotations: {}
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  podLabels: {}
  read_timeout: '300000'
  # Number of Integration API pod replicas
  replicas: 1
  # CPU and memory resource requests and limits
  resources:
    enabled: true
    limits:
      memory: 3Gi
    requests:
      cpu: 50m
      memory: 256Mi
  rollout:
    autoPromotionEnabled: true
    revisionHistoryLimit: 3
  service:
    port: 80
  serviceAccount:
    enabled: true
  terminationGracePeriodSeconds: 120
  type: deployment
  # Integration API credentials username (required if Smart Activation is enabled)
  username: admin@noemail.com

# Execution Service configuration — handles selection rule execution and job processing
executionservice:
  # Horizontal Pod Autoscaler configuration
  autoscaling:
    enabled: false
    kedaScaledObject:
      authenticationRef: rpi-executionservice
      behavior:
        scaleDown:
          policies:
            periodSeconds: 60
            type: Percent
            value: 50
          stabilizationWindowSeconds: 300
        scaleUp:
          policies:
            periodSeconds: 60
            type: Percent
            value: 100
          stabilizationWindowSeconds: 300
      fallback:
        failureThreshold: 3
        replicas: 2
      identityId: ''
      maxReplicaCount: 10
      metricName: execution_max_thread_count
      minReplicaCount: 2
      pollingInterval: 30
      query: ''
      serverAddress: ''
      terminationGracePeriodSeconds: 120
      threshold: '80'
      useTriggerAuthentication: true
    maxReplicas: 5
    minReplicas: 2
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
    type: hpa
  customMetrics:
    enabled: false
    prometheus_scrape: false
  # Enable RPI authentication for this service
  enableRPIAuthentication: true
  # Enable the Execution Service
  enabled: true
  extraEnvs:
  - enabled: false
    name: Plugins__LuxSci__IsSandboxMode
    value: 'true'
  - enabled: false
    name: Plugins__SendGrid__EnableSandBoxMode
    value: 'true'
  - enabled: false
    name: Plugins__Twilio__DisableSendSMSCampaign
    value: 'true'
  - enabled: false
    name: RPI_MPULSE_UPSERT_CONTACT_DEBUG
    value: '1'
  - enabled: false
    name: RPI_MPULSE_EVENT_UPLOAD_DEBUG
    value: '1'
  - enabled: false
    name: LC_ALL
    value: en_US.UTF-8
  - enabled: false
    name: LANG
    value: en_US.UTF-8
  - enabled: false
    name: LANGUAGE
    value: en_US.UTF-8
  - enabled: false
    name: RPI_MPULSE_EVENT_UPLOAD_FAIL_DEBUG
    value: '0'
  - enabled: false
    name: RPI_MPULSE_EVENT_UPLOAD_SCENARIO
    value: '1,5,2,3,5,7'
  - enabled: false
    name: RPI_MPULSE_SAVE_MPULSE_EVENT_CONTENT_DEBUG
    value: '1'
  - enabled: false
    name: RPI_MPULSE_UPSERT_CONTACT_IMPORT_PATH_DEBUG
    value: /rpifileoutputdir/mpulse-debug-path
  # Internal cache for execution state
  internalCache:
    # Azure Blob storage settings (when provider=azureblob)
    azureStorageSettings:
      # Azure Storage account name
      accountName: my_storage_account_name
      # Azure Storage connection string
      connectionString: DefaultEndpointsProtocol=https;AccountName=<myAccoutName;AccountKey=<myAccountAccessKey;EndpointSuffix=core.windows.net
      # Azure Blob container name
      containerName: rpi
      # Use cloud identity for authentication
      useCloudIdentity: false
    backupToOpsDBInterval: '00:00:20'
    # Enable internal cache
    enabled: true
    failOnCacheConnectionError: true
    failOnPrimaryDataLoss: true
    maxNumberRetries: '100'
    maxRetryDelay: '00:01:00'
    # Cache provider type
    provider: filesystem
    # Redis settings for state caching
    redisSettings:
      # Redis connection string (required if type=external)
      connectionString: 'my-redis-host:6379,password=<your-password>,abortConnect=False'
      podDisruptionBudget:
        enabled: false
        minAvailable: 1
      replicas: 1
      resources:
        enabled: true
        limits:
          memory: 3Gi
        requests:
          cpu: 100m
          memory: 256Mi
      # Redis deployment type: internal (chart-managed) or external (BYO)
      type: internal
      volumeClaimTemplates:
        enabled: true
        storage: 100Gi
  jobExecution:
    auditTaskEvents: true
    defaultMaintenanceModeBufferTime: '00:05:00'
    executionShutdownWaitForActivity: '00:08:00'
    internalAddress: ''
    luxScisendRequestCount: 5
    maxSmartAssetInstancesForOfferCodes: '100000'
    maxThreadsPerExecutionService: 100
    overrideCustomSQLReservedWords: false
    rpdmOApiPrefixUri: /v1/
    rpdmOApiRequestTimeout: '200'
    taskTimeout: 60
    triggerCheckCriteriaInterval: 60
    triggersMaxDaysInactive: 180
    workflowPrioritization:
      enabled: true
      maxConcurrentWorkflowActivities: 100
      maximumQueueTime: '24:00:00'
  logging:
    Console: Error
    database: Error
    default: Error
    rpiError: Error
    rpiTrace: Error
  podAnnotations: {}
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  podLabels: {}
  # Number of Execution Service pod replicas
  replicas: 1
  # CPU and memory resource requests and limits
  resources:
    enabled: true
    limits:
      memory: 3Gi
    requests:
      cpu: 50m
      memory: 256Mi
  rollout:
    autoPromotionEnabled: true
    revisionHistoryLimit: 3
  seedService:
    maxNumberRetries: '100'
    maxRetryDelay: '00:01:00'
    memoryCacheSize: '10'
  service:
    port: 80
  serviceAccount:
    enabled: true
  terminationGracePeriodSeconds: 120
  type: deployment

