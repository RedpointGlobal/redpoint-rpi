# Rebrandly URL shortener service configuration
rebrandly:
  # Rebrandly API key
  apiKey: my_rebrandly_api_key
  baseUrl: 'https://api.rebrandly.com'
  customMetrics:
    enabled: false
    prometheus_scrape: false
  # Enable the Rebrandly URL shortener service
  enabled: false
  enterpriseBaseUrl: 'https://enterprise-api.rebrandly.com'
  logging:
    aspNetCore: Error
    default: Error
  podAnnotations: {}
  podLabels: {}
  # Redis settings for Rebrandly caching
  redisSettings:
    # Redis hostname (if type=external)
    hostname: rpi-rebrandly-cache
