# Custom Labels and Annotations
# ==========================
# customLabels:
#   environment: "prod"
#   team: "marketing"
customLabels: {}

# Pod-only labels (applied to pod template only, not Deployment metadata).
# Use this for labels that should only be on pods, e.g., workload identity.
# podLabels:
#   azure.workload.identity/use: "true"
podLabels: {}

# customAnnotations:
#   my-custom-annotation: "my-value"
customAnnotations: {}

# ==========================
# Custom Metrics
# ==========================
# Enable Prometheus scrape annotations on all RPI service pods.
# When enabled, each pod gets prometheus.io/scrape, /port, and /path annotations.
customMetrics:
  enabled: false

# ==========================
# RPI Observability (AI-driven Pulse_Logging summarizer; opt-in)
# ==========================
# Standalone in-cluster service that periodically reads the Pulse_Logging
# database (READ-ONLY), clusters errors/traces, and asks an LLM to produce
# human-readable summaries plus chart/values recommendations. Reports are
# stored in a local SQLite file (PVC-backed) and served via a built-in UI
# at https://<ingress.hosts.observability>.<ingress.domain>.
#
# All in-cluster: nothing leaves the customer's perimeter except outbound
# calls to the configured LLM provider's endpoint. Pulse_Logging access is
# via a dedicated read-only DB user the customer creates and stores in the
# cloud vault as `Observability-LoggingDatabaseConnectionString` (full
# connection string, including the host -- 127.0.0.1 if cloudSqlProxy is on).
observability:
  enabled: false
  replicas: 1
  serviceAccount:
    enabled: true                    # creates rpi-observability SA in per-service mode

  # ---- AI deployment posture ---------------------------------------------
  # The RPI Observability treats AI inference as a deployment-posture decision:
  # where inference runs, who operates it, and where log data lives. The
  # operator UX is identical across postures; only the deployment
  # architecture and privacy boundary differ.
  #
  #   helmAssistant  (default, turnkey)
  #     Redpoint-hosted control plane. Redacted, clustered error data
  #     leaves the cluster over HTTPS; structured AI summaries come back.
  #     Zero customer AI infrastructure required.
  #
  #   localLlm  (private, packaged)
  #     In-cluster Ollama deployment (see observability.localLlm). Nothing
  #     leaves the customer network. Designed for highly regulated envs.
  #
  #   byo  (customer-managed AI platform)
  #     Customer-managed inference platform you choose under
  #     `byo.platform` (anthropic | azureFoundry | bedrock | vertex). Auth
  #     piggybacks on the chart's existing cloudIdentity helpers.
  model:
    provider: helmAssistant          # helmAssistant | localLlm | byo

    # Model identifier for the active posture. Ignored when
    # provider=helmAssistant (the control plane selects the model)
    # and when byo.platform=azureFoundry (the deployment name comes
    # from redpointAI.naturalLanguage.ChatGptEngine).
    #   localLlm           -> any tag from https://ollama.com/library
    #                         (e.g., phi3:mini, gemma2:2b)
    #   byo + anthropic    -> claude-sonnet-4-6, claude-opus-4-7, etc.
    #   byo + bedrock      -> e.g., anthropic.claude-sonnet-4-20250514-v1:0
    #   byo + vertex       -> e.g., claude-sonnet-4@20250514
    llmName: ""

    # ---- Posture: helmAssistant (managed control plane) -----------------
    # API key from the redpoint-rpi-secrets Secret under the fixed key
    # Observability_HelmAssistant_ApiKey (mirrors RPI_NLP_API_KEY pattern).
    # Egress to this URL on 443 is required.
    helmAssistant:
      url: https://rpi-helm-assistant.redpointcdp.com

    # ---- Posture: byo (customer-managed AI platform) --------------------
    # Active only when provider=byo.
    byo:
      platform: anthropic            # anthropic | azureFoundry | bedrock | vertex

      # Direct Anthropic API. Egress to api.anthropic.com:443 required.
      # The chart wires ANTHROPIC_API_KEY from this Key Vault entry.
      anthropic:
        apiKeyVaultEntry: Observability-AnthropicApiKey
        baseUrl: ""                  # optional egress proxy

      # Azure AI Foundry / Azure OpenAI. Rides the chart-wide
      # `redpointAI.naturalLanguage` block (ApiBase, ApiVersion,
      # ChatGptEngine). Set redpointAI.enabled=true and configure that
      # block; the chart fails fast if byo.platform=azureFoundry is
      # selected without it. Auth: WI by default (reuses
      # cloudIdentity.azure). In non-SDK mode AZURE_OPENAI_API_KEY binds
      # from the standard RPI_NLP_API_KEY secret entry; in SDK mode the
      # analyzer fetches the same entry from the cloud vault directly.

      # AWS Bedrock. Auth reuses cloudIdentity.amazon (IRSA / Pod
      # Identity). Customer grants the analyzer's IAM role
      # `bedrock:InvokeModel` on the target model. No separate API key.
      bedrock:
        region: ""                   # e.g., us-east-1

      # GCP Vertex AI. Auth reuses cloudIdentity.google (Workload
      # Identity or SA key file). Customer grants
      # `aiplatform.endpoints.predict`. No separate API key.
      vertex:
        projectId: ""
        region: ""                   # e.g., us-central1

  # ---- Token + request budget --------------------------------------------
  # Hard caps enforced inside the analyzer (token-bucket). When exceeded,
  # the next analysis cycle is skipped and the budget event is logged.
  budget:
    maxTokensPerHour: 200000
    maxRequestsPerHour: 60

  # ---- Analysis cadence --------------------------------------------------
  schedule:
    intervalMinutes: 30              # batch cycle period
    lookbackMinutes: 60              # how far back to query each cycle
    onDemandEnabled: true            # exposes POST /analyze endpoint

  # ---- Operational DB names (Diagnostics tab) ----------------------------
  # clientServer is informational only -- Pulse_Logging connection still
  # comes from the chart secret. sqlTrace + audit drive the Diagnostics
  # tab. When empty, the corresponding section renders a "not configured"
  # caption.
  logSources:
    clientServer: ""    # e.g. Pulse_qarc_a400ca_Logging
    sqlTrace: ""        # e.g. InteractionAudit_qarc_a400ca
    audit: ""           # e.g. InteractionAudit_qarc_a400ca

  # ---- Email digest (opt-in) ---------------------------------------------
  # When enabled, the analyzer posts a short HTML summary of each cycle's
  # report to the configured recipients. SMTP transport reuses the
  # chart-wide SMTPSettings block (same SMTP server, sender, credentials
  # the .NET services already use); only the recipient list and the
  # "send when..." rule are analyzer-specific.
  #
  # The email is intentionally minimal: total errors, top types, and a
  # link back to the dashboard for the full breakdown / log downloads.
  email:
    enabled: false
    recipients: []                   # ["support@example.com", ...]
    onlyOnNewErrors: true            # only send when first-seen errors exist
                                     # (set false to email every cycle)

  # Pulse_Logging access: the analyzer reads the same 4 connection
  # components the deploymentapi reads (host / username / password /
  # logging-db-name). No extra knobs here -- the chart's existing secrets
  # wiring takes care of everything.

  # ---- Local report store (SQLite) ---------------------------------------
  # The component keeps its SQLite report store at /data/reports.db. The
  # chart mounts a persistent volume (StatefulSet volumeClaimTemplates,
  # or an existingClaim you provide) at /data; the path is canonical and
  # is not environment-dependent. Reports survive pod restarts.

  # ---- HTTP service ------------------------------------------------------
  # The container runs two processes (same pattern as the Helm Assistant):
  #   - Streamlit UI on uiPort (8501) -- this is what the ingress routes to
  #   - FastAPI API on apiPort (8080) -- internal-only, used by Streamlit and kubelet probes
  service:
    port: 80
    uiPort: 8501
    apiPort: 8080

  # ---- Resources ---------------------------------------------------------
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# ==========================
# Post-Install Automation
# ==========================
# Automates license activation, cluster DB install, and optional tenant creation.
# Runs as a Helm post-install hook (and ArgoCD PostSync).
postInstall:
  enabled: false
  # Use an existing K8s secret instead of inline values
  # Keys: activation-key, admin-password, admin-username, admin-email
  # existingSecret: ""
  activationKey: ""
  systemName: ""
  adminUsername: "coreuser"
  adminPassword: ""
  adminEmail: ""
  tenant:
    enabled: false
    name: ""
    # existingSecret: ""  # Keys: dw-server, dw-database, dw-username, dw-password
    dataWarehouse:
      provider: SQLServer
      server: ""
      database: ""
      username: ""
      password: ""
  waitTimeout: 360
  backoffLimit: 3

  # === Per-service overridable defaults (from _defaults.tpl) ===
  # Uncomment and modify any of the lines below to override the
  # chart's per-service default.
  # enabled: false
  # existingSecret: ""
  # activationKey: ""
  # systemName: ""
  # adminUsername: coreuser
  # adminPassword: ""
  # adminEmail: ""
  # deploymentapiHost: rpi-deploymentapi
  # deploymentapiPort: "80"
  # waitTimeout: "360"
  # maxReadyWaitSeconds: "600"
  # pollIntervalSeconds: "15"
  # backoffLimit: 3
  # tenant:
  #   enabled: false
  #   name: ""
  #   existingSecret: ""
  #   dataWarehouse:
  #     provider: SQLServer
  #     server: ""
  #     database: ""
  #     username: ""
  #     password: ""
  # resources:
  #   requests:
  #     cpu: 50m
  #     memory: 64Mi
  #   limits:
  #     cpu: 200m
  #     memory: 128Mi


# ==========================
# Pre-flight Validation
# ==========================
# Validates configuration before deployment:
#   DNS resolution, DB connectivity, cloud identity, secrets management.
# mode: test     -> runs with `helm test rpi`
# mode: preInstall -> blocks install on failure
preflight:
  enabled: false
  mode: test
