    port: 6379
    resources:
      limits:
        cpu: 3000m
        memory: 3Gi
      requests:
        cpu: 50m
        memory: 256Mi
    # Redis deployment type: internal or external
    type: internal
    # Use Azure credentials for Redis
    useAzureCredentials: false
    # Redis username
    username: my_redis_username
    volumeClaimTemplates:
      accessModes: ReadWriteOnce
      enabled: false
      size: 50Gi
      storageClassName: default
      type: dynamic
  replicas: 1
  # CPU and memory resource requests and limits
  resources:
    enabled: true
    limits:
      memory: 3Gi
    requests:
      cpu: 50m
      memory: 256Mi
  rollout:
    autoPromotionEnabled: true
    revisionHistoryLimit: 3
  # Kubernetes secret name for Rebrandly credentials
  secretName: rpi-rebrandly
  service:
    port: 80
  serviceAccount:
    enabled: true
  terminationGracePeriodSeconds: 120
  type: deployment

# Standalone in-cluster service that periodically reads Pulse_Logging (read-only), clusters
# errors, and asks an LLM (Anthropic / Azure Foundry / Bedrock / Vertex) to produce summaries
# plus chart recommendations. Reports stored locally in SQLite. Opt-in.
observability:
  # Authentication for the observability UI/API. Selects a single auth model and authorizes
  # users through RPI's normalized user/group model.
  auth:
    # Per-process authorization cache TTL in seconds. Set 0 to disable. Default 60.
    authorizationCacheTtlSeconds: 60
    # Optional overlay mapping CUSTOM RPI group names to observability capabilities (e.g.
    # diagnostics.view). Canonical groups map via built-in defaults; observability.admin
    # cannot appear as a key and canonical group names cannot appear as values.
    capabilityMap: {}
    # Set the Secure attribute on session cookies. Set false only for local development
    # without TLS.
    cookieSecure: true
    # Hostname the observability service is reached at; used to build the Entra OIDC redirect
    # URI. Auto-derived from ingress.hosts.observability + ingress.domain when empty; override
    # only for custom CNAME / external LB scenarios.
    ingressHost: ''
    # Used only when mode=entra. Defaults to the chart-wide MicrosoftEntraID block; override
    # only when Observability needs different Entra config.
    microsoft:
      apiApplicationId: ''
      clientApplicationId: ''
      tenantId: ''
    # Authentication model. public: no authentication (anonymous UI). native: RPI native auth
    # (rpi-interactionapi / OpenIddict). entra: Microsoft Entra ID. Exactly one; hybrid is
    # rejected at chart-render time.
    mode: public
    # Used only when mode=native. Defaults derive from the RPI ingress block.
    native:
      # Optional separate auth-metadata host; most deployments leave empty.
      authMetaHttpHost: ''
      # rpi-interactionapi public host. Auto-derived from ingress.hosts.client +
      # ingress.domain when empty.
      authorizationHost: ''
      # OpenIddict client ID Observability uses. Pre-register a confidential client with this
      # ID and populate Observability_NativeAuth_ClientSecret.
      clientId: rpi-observability
    # Session lifetime in seconds. Default 28800 (8 hours).
    sessionLifetimeSeconds: 28800
  budget:
    maxRequestsPerHour: 60
    maxTokensPerHour: 200000
  clientId: ''
  diagnostics:
    fileOutput:
      # Mount the chart-managed FileOutputDirectory PVC read-only on the observability service
      # StatefulSet so bundle downloads include the workflow's output files. No-op unless
      # storage.persistentVolumeClaims.FileOutputDirectory.enabled is also true; the mount
      # tracks that block's claimName + mountPath.
      enabled: true
  enabled: false
  # Intelligence Runtime topology. Part of the observability solution -- no solution-level
  # enabled flag (observability.enabled controls the whole solution). The `provider` selector
  # activates one of: local (in-cluster, served by rpi-observability-llm) | helmAssistant
  # (Redpoint-managed AI service) | azure (AI Foundry / Azure OpenAI) | aws (Bedrock). Only
  # the active provider's sub-block is consumed.
  intelligence:
    # Consumed only when provider=aws.
    aws:
      modelId: ''
      region: ''
    # Consumed only when provider=azure.
    azure:
      # Optional. When set in non-SDK mode, binds AZURE_INTELLIGENCE_API_KEY from this Secret
      # key. Blank uses managed identity.
      apiKeySecretKey: ''
      apiVersion: ''
      deployment: ''
      endpoint: ''
      service: foundry
    # Consumed only when provider=helmAssistant. The Redpoint-managed AI service -- the
    # customer provisions no cloud AI infrastructure. Auth is the customer-populated Secret
    # key Observability_HelmAssistant_ApiKey (issued by Redpoint).
    helmAssistant:
      # Helm Assistant base URL. Blank uses the Redpoint-hosted endpoint (https://rpi-helm-
      # assistant.redpointcdp.com).
      url: ''
    # Consumed only when provider=local. The bundled model is the only model under this
    # provider and is not customer-configurable. To use a different model, switch
    # intelligence.provider to helmAssistant | azure | aws.
    local:
      # Override the default in-cluster Service URL. Blank = http://rpi-observability-
      # llm.<ns>.svc.cluster.local:8000/v1.
      baseUrl: ''
      # Serving-layer StatefulSet. The chart deploys the self-contained rpi-observability-llm
      # image (model + tokenizer + runtime baked in) deployable on standard worker nodes.
      # Disable when the operator self-hosts the serving layer elsewhere.
      deployment:
        enabled: true
        # Backend CLI args appended to the image's entrypoint. The image already wires the
        # essential flags (model path, host, port, threads, context size). Use this for
        # operator-specific tuning (KV cache size, custom sampling parameters).
        extraArgs: []
        # Container image override. Blank = chart resolves the canonical Redpoint-built rpi-
        # observability-llm image via rpi.image. Set to an internal registry mirror or
        # regulated-registry path; the image must be a rpi-observability-llm build serving the
        # canonical baked-in model. Overriding to a different model variant is NOT supported
        # under provider=local.
        image: ''
        imagePullPolicy: ''
        # Container resource requests + limits. Blank = chart picks sensible defaults sized
        # for the 7B Q4 model on standard worker nodes.
        resources: {}
        service:
          port: 8000
        serviceAccount:
          annotations: {}
          enabled: true
    # Active provider. Drives which provider the runtime registers and whether the chart
    # renders the in-cluster serving StatefulSet (only when provider=local). helmAssistant
    # calls the Redpoint-managed Helm Assistant service and requires no customer cloud AI
    # configuration (only the Observability_HelmAssistant_ApiKey Secret key). When set to
    # azure/aws, the chart fails at render time if that provider's required fields
    # (endpoint+deployment / region+modelId) are missing.
    provider: local
    # Per-inference hard timeout. Bounds the observability cycle's exposure to slow inference.
    # Applies to whichever provider is active.
    timeoutSeconds: 240
  metrics:
    bufferSize: 240
    enabled: true
    scrapeIntervalSeconds: 15
    services:
    - dnsName: rpi-executionservice
      name: Execution Service
      path: /metrics
      port: 80
    - dnsName: rpi-nodemanager
      name: Node Manager
      path: /metrics
      port: 80
    - dnsName: rpi-queuereader
      name: Queue Reader
      path: /metrics
      port: 80
    - dnsName: rpi-interactionapi
      name: Interaction API
      path: /metrics
      port: 80
    - dnsName: rpi-integrationapi
      name: Integration API
      path: /metrics
      port: 80
    - dnsName: rpi-callbackapi
      name: Callback API
      path: /metrics
      port: 80
    - dnsName: rpi-realtimeapi
      name: Realtime API
      path: /metrics
      port: 80
    timeoutSeconds: 5
  nodeHealth:
    # Enable the Node Health panel on the System Health tab. Binds a ClusterRole to the
    # observability service's ServiceAccount granting get/list on nodes (core) and nodes
    # (metrics.k8s.io). Disable in clusters where cluster-scoped RBAC requires separate
    # approval.
    enabled: true
  # Incident-intelligence email notifications. Delivery is deterministic (lifecycle-driven),
  # never AI-gated.
  notifications:
    dailyBrief:
      # HH:MM UTC; one send per day.
      atUtc: '13:00'
      enabled: true
      recipients: []
    defaultRecipients: []
    email:
      enabled: false
    enabled: false
    escalation:
      cooldownMinutes: 240
      enabled: true
      minBand: medium
      recipients: []
      scoreDelta: 15
      sustainCycles: 2
      tenantDelta: 2
    newIncident:
      cooldownMinutes: 0
      enabled: true
      recipients: []
      significanceThreshold: 60
    resolution:
      absentCycles: 12
      enabled: true
      recipients: []
    teams:
      enabled: false
      # Secret key holding the Teams incoming-webhook URL.
      webhookSecretKey: Observability_Teams_Webhook
    weeklySummary:
      atUtc: '13:00'
      # Mon=0 .. Sun=6 (UTC).
      dayOfWeek: 0
      enabled: false
      recipients: []
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 50m
      memory: 256Mi
  schedule:
    dailyAtUtc: ''
    intervalMinutes: 30
    lookbackMinutes: ''
  service:
    apiPort: 8080
  serviceAccount:
    # Create the rpi-observability ServiceAccount.
    enabled: true
  storage:
    # BYO PVC name. When set, volumeClaimTemplates is ignored.
    existingClaim: ''
    volumeClaimTemplates:
      accessModes: ReadWriteOnce
      enabled: true
      # PVC size, e.g. 5Gi.
      storage: 5Gi
      # Empty string => use the cluster's default StorageClass.
      storageClassName: ''
  # Telemetry source mode contract. Selects the IAPI metric source: native scrape (default) or
  # zero-code OTel auto-instrumentation with a Collector sidecar. Modes are mutually
  # exclusive; no fallback.
  telemetry:
    # scrape (default): rpi-observability scrapes the IAPI's native
    # Microsoft.AspNetCore.Hosting Meter exposition on port 80. otel: an init container
    # injects the OTel .NET auto-instrumentation runtime; the IAPI exports OTLP gRPC to a
    # Collector sidecar in the same pod; the Collector re-exposes Prometheus on port 8889,
    # which rpi-observability scrapes. Flipping the value re-rolls the IAPI deployment.
    mode: scrape
    # RPI service DNS names whose container image is musl-based (Alpine). These get the linux-
    # musl-x64 OTel native profiler path instead of linux-x64; a musl image pointed at the
    # glibc profiler emits no telemetry. Default: [rpi-integrationapi, rpi-callbackapi].
    muslServices:
    - rpi-integrationapi
    - rpi-callbackapi
    - rpi-deploymentapi
    # Configuration applied only when mode=otel.
    otel:
      # OpenTelemetry Collector sidecar configuration.
      collector:
        # Resource shape for the Collector sidecar. Defaults sized for the metrics-only
        # pipeline with memory_limiter at 100Mi soft cap.
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
  replicas: null

