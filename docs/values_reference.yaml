  # timeoutMinutes: 60
  # maxBatchSize: 50
  # useMessageLocks: true
  # partitionHandler:
  #   partitionLockDuration: "00:02:00"
  #   offsetPositionTTL: "23:59:59"
  #   deduplicationCacheTTL: "01:00:00"
