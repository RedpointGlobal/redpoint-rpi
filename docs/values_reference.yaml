# ==========================
# Queue Reader
# ==========================
queuereader:
  enabled: true
  replicas: 1
  realtimeConfiguration:
    # Enable distributed processing for high-volume transactions
    isDistributed: false
  # Internal cache for distributed processing (top-level, not nested under realtimeConfiguration).
  # NOTE on credentials:
  #   For internal Redis, the chart auto-generates the password and
  #   stores it as QueueService_RedisCache_Password in the K8s Secret.
  #   For external Redis, `rpihelmcli secrets` prompts for the
  #   connection string and writes it to QueueService_RedisCache_ConnectionString.
  internalCache:
    provider: redis
    # internal: chart-managed Redis | external: BYO Redis
    type: internal
    redisSettings:
      # Required if type=external. NOT read from this file.
      connectionString: "my-redis-host:6379,password=<your-password>,abortConnect=False"  # → K8s Secret: QueueService_RedisCache_ConnectionString (prompt-only)
  # Internal queue for distributed processing.
  # NOTE on credentials:
  #   For internal RabbitMQ, the chart auto-generates the password
  #   and stores it as QueueService_RabbitMQ_Password in the K8s
  #   Secret. For external RabbitMQ, `rpihelmcli secrets` prompts
  #   for the password.
  internalQueues:
    provider: rabbitmq
    # internal: chart-managed RabbitMQ | external: BYO RabbitMQ
    type: internal
    rabbitmqSettings:
      hostname: "rpi-queuereader-rabbitmq"
      username: redpointrpi
      password: my_Super_Strong_Pwd  # → K8s Secret: QueueService_RabbitMQ_Password (chart-auto for internal; prompt-only for external)
    # RPI client IDs for this cluster
    tenantIds:
      - 00000000-0000-0000-0000-000000000000
  errorQueuePath: listenerQueueError 
  nonActiveQueuePath: listenerQueueNonActive
  autoscaling:
    enabled: false

  # === Per-service overridable defaults (from _defaults.tpl) ===
  # Uncomment and modify any of the lines below to override the
  # chart's per-service default.
  # podAnnotations: {}
  # podLabels: {}
  # type: deployment
