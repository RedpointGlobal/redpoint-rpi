  # Full example (explicit per-server settings):
  # servers:
  #   - name: aks-rpi-realtimeapi
  #     podSelector:
  #       app.kubernetes.io/name: rpi-realtimeapi
  #     port: 8080
  #     proxyProtocol: HTTP/1
  #     allowUnauthenticated: true
