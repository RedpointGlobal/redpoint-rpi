# ==========================
# Execution Service
# ==========================
executionservice:
  enabled: true
  replicas: 1
  enableRPIAuthentication: true
  # Internal cache for execution state
  internalCache:
    enabled: true
    # Supported: filesystem, azureblob.
    # NOTE: the "default" / Redis provider for executionservice
    # internalCache is NOT wired in the current chart. The
    # `redisSettings` sub-block below is documentation-only and is
    # not consumed.
    provider: filesystem
    # redisSettings: documented for parity with other services but
    # NOT consumed by deploy-executionservice.yaml (no Redis provider
    # is wired). Leave defaults; no operator action needed.
    redisSettings:
      type: internal
      connectionString: "my-redis-host:6379,password=<your-password>,abortConnect=False"  # (unused — dead value)
    # Azure Blob settings (when provider=azureblob).
    # NOTE on credentials:
    #   accountName + containerName are read by the chart from this file.
    #   connectionString is NOT read from this file -- `rpihelmcli secrets`
    #   prompts for it and writes it to the K8s Secret as
    #   ExecutionService_AzureBlob_ConnectionString; the chart reads
    #   it via secretKeyRef. Prefer `useCloudIdentity: true` for
    #   production -- the pod then authenticates via Workload Identity
    #   and no connection-string secret is needed at all.
    azureStorageSettings:
      accountName: my_storage_account_name
      containerName: rpi
      connectionString: DefaultEndpointsProtocol=https;AccountName=<myAccoutName;AccountKey=<myAccountAccessKey;EndpointSuffix=core.windows.net  # → K8s Secret: ExecutionService_AzureBlob_ConnectionString (prompt-only; only when useCloudIdentity=false)
