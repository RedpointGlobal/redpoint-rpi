# ==========================
# Custom Labels and Annotations
# ==========================
# customLabels:
#   environment: "prod"
#   team: "marketing"
customLabels: {}

# Pod-only labels (applied to pod template only, not Deployment metadata).
# Use this for labels that should only be on pods, e.g., workload identity.
# podLabels:
#   azure.workload.identity/use: "true"
podLabels: {}

# customAnnotations:
#   my-custom-annotation: "my-value"
customAnnotations: {}

# ==========================
# Custom Metrics
# ==========================
# Enable Prometheus scrape annotations on all RPI service pods.
# When enabled, RPI service pods advertise Prometheus scrape annotations so an
# external Prometheus can discover and scrape them.
customMetrics:
  enabled: false

# ==========================
# RPI Observability (AI-driven Pulse_Logging summarizer; opt-in)
# ==========================
# Standalone in-cluster service that periodically reads the Pulse_Logging
# database (READ-ONLY), clusters errors/traces, and asks an LLM to produce
# human-readable summaries plus chart/values recommendations. Reports are
# stored in a local SQLite file (PVC-backed) and served via a built-in UI
# at https://<ingress.hosts.observability>.<ingress.domain>.
#
# All in-cluster: nothing leaves the customer's perimeter except outbound
# calls to the configured LLM provider's endpoint. Pulse_Logging access is
# via a dedicated read-only DB user the customer creates and stores in the
# cloud vault as `Observability-LoggingDatabaseConnectionString` (full
# connection string, including the host -- 127.0.0.1 if cloudSqlProxy is on).
# ---- Single-instance service -------------------------------------------
# RPI Observability runs as a single instance. Setting observability.replicas
# (or any value implying more than one instance) is rejected at chart-render
# time.
observability:
  enabled: false
  serviceAccount:
    enabled: true                    # creates rpi-observability SA in per-service mode

  # ---- RPI ClientID (REQUIRED) ------------------------------------------
  # The RPI tenant identifier (a GUID) that this observability instance serves,
  # used to resolve the tenant's databases.
  #
  # REQUIRED whenever observability.enabled=true; an empty value fails
  # `helm template` and `helm install`. There is no fallback, inference, or
  # auto-detection - set it explicitly.
  #
  # Find the value: SELECT ClientID FROM Pulse_<env>.dbo.rpi_Clients
  # (uppercase GUID, e.g. 9A39D66C-111C-408E-AE5B-D97880BAC496).
  clientId: ""

  # ---- Node health panel -------------------------------------------------
  # Powers the Node Health section on the System Health tab. Reads node
  # state + per-node CPU/memory from the Kubernetes API and metrics-server.
  # This grants cluster-scoped RBAC (read on nodes). When disabled, no
  # cluster-scoped RBAC is created and the Node Health panel is hidden.
  # Some security teams require approval for cluster-scoped RBAC; leave this
  # off in those clusters.
  nodeHealth:
    enabled: true

  # ---- Intelligence (AI surface) -----------------------------------------
  # The observability AI features (incident summarization, failure
  # explanation, RCA) turn on with observability.enabled. intelligence.provider
  # selects one backend:
  #
  #   local         in-cluster inference (default; no external dependency)
  #   helmAssistant Redpoint-managed AI (no cloud AI infrastructure to run)
  #   azure         Azure OpenAI / Azure AI Foundry
  #   aws           Bedrock
  #
  # Only provider=local runs an in-cluster serving component; the others call
  # the provider's API directly, using managed identity where Workload
  # Identity / IRSA is configured (no static keys required).
  intelligence:
    # Active AI backend. Only provider=local runs an in-cluster serving
    # component; configure the matching sub-block below.
    provider: local                          # local | helmAssistant | azure | aws

    # Per-inference timeout. When exceeded, the analysis cycle proceeds
    # without an AI summary. Sized for CPU inference of ~1000-token briefings
    # on a standard worker with the default local model; lower it on GPU
    # profiles or smaller workloads.
    timeoutSeconds: 240

    # ---- Local (in-cluster serving) ------------------------------------
    # Consumed only when provider=local. Runs a self-contained model image
    # (no runtime downloads; deployable in air-gapped clusters). The bundled
    # model is fixed; switch provider to helmAssistant | azure | aws for a
    # different model.
    local:
      # Default points at the in-cluster Service. Override only if the
      # operator self-hosts the serving layer elsewhere on the cluster.
      baseUrl: ""                            # blank = http://rpi-observability-llm.<ns>.svc.cluster.local:8000/v1

      # When enabled, the chart deploys the in-cluster serving layer. Disable
      # when you self-host it elsewhere - then set local.baseUrl to your endpoint.
      deployment:
        enabled: true

        # Container image override. Blank uses the default Redpoint serving
        # image. Set to an internal-registry mirror; the image must serve the
        # same bundled model. A different model variant is not supported under
        # provider=local - switch provider to helmAssistant | azure | aws.
        image: ""
        imagePullPolicy: ""                  # blank = global.deployment.images.imagePullPolicy

        # Container resources. Blank requests sensible defaults
        # sized for the 7B Q4 model on standard worker nodes.
        resources: {}

        service:
          port: 8000

        serviceAccount:
          enabled: true
          annotations: {}

        # Backend CLI args appended to the image's entrypoint. The
        # image already wires the essential flags (model path, host,
        # port, threads, context size). Use this for operator-
        # specific tuning (KV cache size, sampling parameters, etc.).
        extraArgs: []

    # ---- helmAssistant (Redpoint-managed AI) ---------------------------
    # Consumed only when provider=helmAssistant. Redpoint-managed AI: no cloud
    # AI infrastructure to provision. Populate the Secret key
    # Observability_HelmAssistant_ApiKey (issued by Redpoint; fetched from the
    # vault in SDK mode).
    helmAssistant:
      # Helm Assistant base URL. Blank = the Redpoint-hosted endpoint.
      url: ""                                # blank = https://rpi-helm-assistant.redpointcdp.com

    # ---- Azure (AI Foundry or Azure OpenAI) -----------------------------
    # Consumed only when provider=azure. Endpoint + deployment are
    # required; the chart fails fast at render time if either is
    # missing.
    azure:
      service: foundry                       # foundry | openai
      endpoint: ""                           # e.g. https://<resource>.openai.azure.com
      deployment: ""                         # the deployed model name
      apiVersion: ""                         # only for service=openai
      # Optional Secret key holding the Azure API key (non-SDK mode). Leave
      # blank to use managed identity (preferred).
      apiKeySecretKey: ""

    # ---- AWS (Bedrock) -------------------------------------------------
    # Consumed only when provider=aws. Region + modelId are required;
    # the chart fails fast at render time if either is missing. Auth:
    # IRSA + Pod Identity (reuses cloudIdentity.amazon).
    aws:
      region: ""                             # e.g. us-east-1
      modelId: ""                            # e.g. anthropic.claude-3-5-sonnet-20241022-v2:0

  # ---- Token + request budget --------------------------------------------
  # Hard caps on AI usage. When exceeded, the next analysis cycle is skipped
  # and logged.
  budget:
    maxTokensPerHour: 200000
    maxRequestsPerHour: 60

  # ---- Analysis cadence --------------------------------------------------
  # Two scheduling modes:
  #   - interval: runs every `intervalMinutes` after pod startup (default).
  #   - daily:    set `dailyAtUtc` to "HH:MM" (UTC). Overrides intervalMinutes
  #               and fires once per day at that wall-clock time.
  # `lookbackMinutes` defaults to `intervalMinutes` in interval mode (so
  # each cycle's data window matches its cadence with no gap or overlap),
  # or 1440 (24h) in daily mode. Set it explicitly here to override either
  # default.
  schedule:
    intervalMinutes: 30              # batch cycle period (interval mode)
    dailyAtUtc: ""                   # "HH:MM" UTC -- e.g. "00:00" for midnight
    lookbackMinutes: ""              # leave empty for auto: matches intervalMinutes (interval mode) or 1440 (daily mode). Override with an int.

  # ---- Diagnostics tab ---------------------------------------------------
  # Per-Interaction lookup + diagnostic bundle download. To include a
  # workflow's output files in the bundle, enable this AND
  # storage.persistentVolumeClaims.FileOutputDirectory (chart-wide);
  # otherwise the bundle omits output files.
  diagnostics:
    fileOutput:
      enabled: true

  # ---- Custom Metrics ----------------------------------------------------
  # Reads the Prometheus /metrics endpoints exposed by RPI services
  # in-cluster and renders the Custom Metrics tab. No external Prometheus
  # stack is required. The defaults cover the standard RPI deployment;
  # set enabled: false to disable.
  metrics:
    enabled: true
    scrapeIntervalSeconds: 15
    timeoutSeconds: 5
    bufferSize: 240               # ~60 min of 15s samples per series
    # Curated list of RPI services that expose a Prometheus /metrics
    # endpoint. Two filters apply at chart-render time:
    #   1. Capability (this list): a service is included here ONLY
    #      if it actually exposes /metrics. Listing a service that
    #      doesn't will produce phantom "X unreachable" incidents
    #      on the System Health surface.
    #   2. Entries for a disabled top-level service (e.g.
    #      realtimeapi.enabled=false) are dropped automatically.
    # Convention: dnsName matches the K8s Service name; the
    # service's values key is dnsName minus the "rpi-" prefix.
    #
    # NOT listed (and why):
    #   - rpi-rebrandly: does not expose /metrics. Adding it here
    #     causes a phantom "Rebrandly unreachable" active incident.
    #   - rpi-deploymentapi, rpi-rabbitmq-console, rpi-smartActivation:
    #     no /metrics today. Add when the service ships an endpoint.
    #
    # K8s Service port is 80 (targetPort 8080 inside the container).
    # Service-to-service traffic in the cluster always uses port 80;
    # 8080 only works from INSIDE the pod (localhost:8080) and is NOT
    # the cross-pod path.
    services:
      - name: "Execution Service"
        dnsName: "rpi-executionservice"
        port: 80
        path: "/metrics"
      - name: "Node Manager"
        dnsName: "rpi-nodemanager"
        port: 80
        path: "/metrics"
      - name: "Queue Reader"
        dnsName: "rpi-queuereader"
        port: 80
        path: "/metrics"
      - name: "Interaction API"
        dnsName: "rpi-interactionapi"
        port: 80
        path: "/metrics"
      - name: "Integration API"
        dnsName: "rpi-integrationapi"
        port: 80
        path: "/metrics"
      - name: "Callback API"
        dnsName: "rpi-callbackapi"
        port: 80
        path: "/metrics"
      - name: "Realtime API"
        dnsName: "rpi-realtimeapi"
        port: 80
        path: "/metrics"

  # ---- Telemetry mode (opt-in advanced) ----------------------------------
  # Telemetry source. One of: scrape | otel
  #
  # scrape (default): the observability service scrapes each RPI service's
  #   native /metrics endpoint. Minimal footprint; production-safe baseline.
  #
  # otel: participating RPI services are auto-instrumented and report to a
  #   shared OpenTelemetry Collector, which re-exposes Prometheus for the
  #   observability service to scrape. Adds per-service database-call metrics
  #   (calls / latency / errors) on top of HTTP and runtime metrics.
  #
  # The two modes are mutually exclusive; flipping the value re-rolls the
  # affected deployments.
  #
  # otel mode pulls two extra images. Mirror them for a private registry via
  # global.deployment.images.overrides.<name> (full URI) or
  # global.deployment.images.nameOverrides.<name> (alternate name):
  #   rpi-observability-otel            (open-telemetry autoinstrumentation-dotnet)
  #   rpi-observability-otel-collector  (opentelemetry-collector, core)
  telemetry:
    # scrape (default) | otel. See the mode description above. Participating
    # services under otel: interactionapi, executionservice, nodemanager,
    # queuereader, realtimeapi, integrationapi, callbackapi, deploymentapi.
    mode: scrape

    # RPI service images built on musl (Alpine). The .NET OTel profiler is
    # libc-specific, so musl images need different instrumentation than glibc;
    # a mismatch emits no telemetry. Override if a service image's base libc
    # changes between releases.
    muslServices:
      - rpi-integrationapi
      - rpi-callbackapi
      - rpi-deploymentapi

    otel:
      collector:
        # Shared Collector resource shape (it aggregates OTLP from all
        # participating services).
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

  # ---- Incident-intelligence notifications (opt-in) ---------------------
  # Lifecycle-driven email notifications over the analyzer's ranked incidents
  # (NEW / ESCALATED / RESOLVED). Reuses the SMTPSettings transport above; no
  # new SMTP or secret config.
  #
  # When false (default), all notifications are off. Set the per-type blocks
  # below only to change a documented default.
  notifications:
    enabled: false
    # Fallback recipients when a per-type list is empty.
    defaultRecipients: []            # ["platform-leads@example.com", ...]

    # ---- Delivery channels -------------------------------------------
    # email transport reuses the chart-wide SMTPSettings block (same SMTP
    # server / sender / credentials the .NET services use); only the
    # channel toggle is observability-specific. Recipients live above
    # (defaultRecipients) or per-type below - NOT here.
    email:
      enabled: false
    # Microsoft Teams channel. The webhook URL is credential-grade and
    # MUST live in the chart's standard RPI Secret (default:
    # redpoint-rpi-secrets) under webhookSecretKey - NEVER inline here.
    # Pod startup fails fast when enabled=true and the key is empty.
    teams:
      enabled: false
      webhookSecretKey: Observability_Teams_Webhook

    # Daily Operations Brief (awareness, leadership-oriented). One send
    # per UTC day at atUtc; summarizes platform posture + error activity +
    # tenant impact + primary concerns.
    dailyBrief:
      enabled: true
      atUtc: "13:00"                 # HH:MM UTC
      recipients: []

    # Weekly Executive Summary (strategic). Recurring incidents, categories,
    # resolved-this-week. Off by default.
    weeklySummary:
      enabled: false
      dayOfWeek: 0                   # Mon=0 .. Sun=6 (UTC)
      atUtc: "13:00"
      recipients: []

    # New Critical Incident alert. Fires when a NEW-lifecycle incident
    # (first appearance, or reappearance after resolution) reaches the
    # significance threshold.
    newIncident:
      enabled: true
      significanceThreshold: 60
      cooldownMinutes: 0
      recipients: []

    # Incident Escalation alert. Fires when an active incident materially
    # worsens for >= sustainCycles consecutive cycles (significance jump,
    # band upgrade, tenant-breadth jump, or growth turning to spiking),
    # subject to cooldownMinutes.
    escalation:
      enabled: true
      minBand: medium                # low | medium | high (current band must be >= this)
      scoreDelta: 15                 # significance jump vs the stable baseline
      tenantDelta: 2                 # tenant-breadth jump vs the baseline
      sustainCycles: 2               # worsening must persist >= N consecutive cycles
      cooldownMinutes: 240           # suppress repeat escalations within this window
      recipients: []

    # Incident Resolution notice. Fires after an incident is absent for
    # absentCycles consecutive analysis cycles (~6h at a 30-min cadence).
    resolution:
      enabled: true
      absentCycles: 12
      recipients: []

  # ---- Authentication and authorization ---------------------------------
  # When enabled, the observability service participates in the RPI trust domain:
  # identity is delegated to whichever IDP RPI is configured against
  # (native rpi-interactionapi, Microsoft Entra, Keycloak, or Okta);
  # authorization is resolved through RPI's normalized user/group/
  # permission model in the operational database. Disabled by default
  # so existing deployments preserve the legacy unauthenticated path
  # until the operator explicitly opts in.
  auth:
    # Single-provider deployment model. Each deployment resolves to
    # exactly ONE of:
    #   public  -- no authentication; UI is fully anonymous
    #   native  -- RPI native auth (rpi-interactionapi / OpenIddict)
    #   entra   -- Microsoft Entra ID
    # Hybrid configurations are rejected at chart-render time.
    # Switching modes is a deployment-time decision, not a runtime
    # negotiation. Authentication mode and auth-provider configuration
    # use the standard RPI Authentication__* env-var contract.
    mode: public

    # Tenant scope comes from observability.clientId; there is no separate
    # auth-side tenant field.

    # Cookie security. Set false only for local development without TLS.
    cookieSecure: true

    # Session lifetime in seconds. Default 8 hours.
    sessionLifetimeSeconds: 28800

    # Per-process AuthorizationProvider cache TTL in seconds. Set 0 to
    # disable. Group membership changes in RPI take effect at most
    # this many seconds after assignment.
    authorizationCacheTtlSeconds: 60

    # Hostname the observability service is reachable at; used to build the OIDC
    # redirect URI advertised to the IDP for Entra mode. AUTO-DERIVED
    # from ingress.hosts.observability + ingress.domain when left empty.
    # Override only if the observability service is fronted by a different external
    # hostname (custom CNAME, external load balancer, etc.).
    ingressHost: ""

    # ---- Native posture overrides --------------------------------------
    # Used only when mode=native. Defaults are derived from the
    # canonical RPI ingress block.
    native:
      # AUTO-DERIVED from ingress.hosts.client + ingress.domain (the
      # rpi-interactionapi public host) when left empty.
      authorizationHost: ""
      # Optional separate metadata host (auth-meta endpoints). RPI
      # services that use a different metadata host set this; most
      # deployments leave it empty.
      authMetaHttpHost: ""
      # The OpenIddict client ID Observability uses. The customer (RPI
      # platform / DBA / identity admin) pre-registers a confidential
      # OpenIddict client with this ClientId and populates the chart's
      # standard RPI Secret (default: redpoint-rpi-secrets) under the
      # key Observability_NativeAuth_ClientSecret with the matching
      # ClientSecret.
      clientId: rpi-observability

    # ---- Entra posture overrides ---------------------------------------
    # Used only when mode=entra. Defaults to the chart-wide
    # MicrosoftEntraID block. Override here only if Observability
    # needs different Entra config than the rest of the RPI deployment.
    microsoft:
      tenantId: ""              # default: MicrosoftEntraID.tenant_id
      clientApplicationId: ""   # default: MicrosoftEntraID.interaction_client_id
      apiApplicationId: ""      # default: MicrosoftEntraID.interaction_api_id

    # Capability map: optional overlay for CUSTOM RPI groups only.
    #
    # RPI is the authorization authority. The canonical groups
    # (System Administrators / Everyone / IntegrationAPI) map to
    # capabilities via built-in defaults inside the observability
    # service. Use this block ONLY when an enterprise deployment has
    # a custom non-canonical group (e.g. DataOps, SRE) that needs
    # observability access.
    #
    # Two prohibitions enforced at startup; violations fail the pod
    # CrashLoopBackOff with a clear error:
    #   * observability.admin cannot appear as a key. Administrative
    #     access flows from membership in the System Administrators
    #     RPI group only.
    #   * Canonical group names (System Administrators / Everyone /
    #     IntegrationAPI) cannot appear as values. Their capability
    #     sets are owned by the built-in defaults.
    #
    # Example -- grant the custom "DataOps" group diagnostics access:
    #   capabilityMap:
    #     diagnostics.view: ["DataOps"]
    #     diagnostics.viewSql: ["DataOps"]
    capabilityMap: {}

  # Pulse_Logging access: the observability service reads the same 4 connection
  # components the deploymentapi reads (host / username / password /
  # logging-db-name). No extra knobs here -- the chart's existing secrets
  # wiring takes care of everything.

  # ---- Local report store (SQLite) ---------------------------------------
  # The observability service keeps its report history in a small SQLite file at
  # /data/reports.db. SQLite needs a filesystem that honors POSIX byte-range
  # locks, so /data must be backed by block storage (Azure Disk, AWS EBS,
  # GCP PD) -- NOT Azure Files / NFS, which silently break SQLite locking.
  # Dynamic provisioning by default; BYO via existingClaim.
  storage:
    # BYO: name of a PVC you've already created. If set, volumeClaimTemplates
    # is ignored. The PVC must support RWO and POSIX locks (see above).
    existingClaim: ""
    volumeClaimTemplates:
      enabled: true                  # false + no existingClaim => emptyDir (data is lost on pod restart)
      accessModes: ReadWriteOnce
      storageClassName: ""           # empty = use cluster default storage class
      storage: 5Gi

  # ---- HTTP service ------------------------------------------------------
  # Port the observability HTTP service listens on. Ingress routes all
  # observability traffic to it.
  service:
    apiPort: 8080

  # ---- Resources ---------------------------------------------------------
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# ==========================
# Post-Install Automation
# ==========================
# Automates license activation, cluster DB install, and optional tenant creation.
# Runs as a Helm post-install hook (and ArgoCD PostSync).
postInstall:
  enabled: false
  # Use an existing K8s secret instead of inline values
  # Keys: activation-key, admin-password, admin-username, admin-email
  # existingSecret: ""
  activationKey: ""
  systemName: ""
  adminUsername: "coreuser"
  adminPassword: ""
  adminEmail: ""
  tenant:
    enabled: false
    name: ""
    # existingSecret: ""  # Keys: dw-server, dw-database, dw-username, dw-password
    dataWarehouse:
      provider: SQLServer
      server: ""
      database: ""
      username: ""
      password: ""
  waitTimeout: 360
  backoffLimit: 3

# ==========================
# Pre-flight Validation
# ==========================
# Validates configuration before deployment:
#   DNS resolution, DB connectivity, cloud identity, secrets management.
# mode: test     -> runs with `helm test rpi`
# mode: preInstall -> blocks install on failure
preflight:
  enabled: false
  mode: test
