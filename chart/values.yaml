# ============================================================
# REDPOINT INTERACTION (RPI) - User Configuration
# ============================================================
# Only set the values you need to customize. All internal
# defaults (health probes, security contexts, logging levels,
# service ports, rollout strategies, etc.) are managed by the
# chart via _defaults.tpl.
# ============================================================

# ==========================
# Global Settings
# ==========================
global:
  deployment:
    # Deployment mode: standard | demo
    # standard: production deployment
    # demo: deploys embedded MSSQL + MongoDB containers for local dev/evaluation
    mode: standard
    # Cloud environment: azure, amazon, google, selfhosted
    platform: amazon

    images:
      registry: rg1acrpub.azurecr.io/docker/redpointglobal/releases
      # RPI version: <major.minor>.<year>-<MMDD>-<HHMM>
      tag: "7.7.20260414.1238"
      imagePullPolicy: Always
      imagePullSecret:
        enabled: true
        name: redpoint-rpi
      # net-utils image (used by the database-upgrade job). Default
      # {registry}/net-utils:{tag}. Override via overrides or nameOverrides below.
      # Image resolution priority: overrides > nameOverrides > default ({registry}/{service-name}:{tag})
      #
      # overrides: Full URI per service, used verbatim (no registry/tag appended).
      #   Use when images are in different registries or have custom tags.
      # overrides:
      #   rpi-interactionapi: 123456789.dkr.ecr.us-east-1.amazonaws.com/rpi:interactionapi-7.7.20260220.1524
      #   rpi-redis: 123456789.dkr.ecr.us-east-1.amazonaws.com/rpi:rediscache-7.7.20260220.1524
      #
      # nameOverrides: Replaces just the image name, keeps global registry and tag.
      #   Use when images are in the same registry with the same tag but different names.
      #   Result: {registry}/{nameOverride}:{tag}
      # nameOverrides:
      #   rpi-deploymentapi: redpoint-interaction-configuration-editor
      #   rpi-interactionapi: redpoint-interaction-client
    # Optional: set the pod's timezone (e.g., "America/New_York"); leave empty to use default UTC
    podTimezone: "" #

# ==========================
# Global Resource Defaults
# ==========================
# Applied to all services unless overridden per-service.
# Per-service overrides (e.g. interactionapi.resources) take priority.
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    memory: 3Gi

# ==========================
# Per-Service Overridable Settings
# ==========================
# These settings are defined in _defaults.tpl and can be overridden per service.
# Example: deploymentapi.enableProbes, executionservice.replicas, etc.
#
# Common per-service settings:
#   enableProbes: true          # Set to false to disable all probes (liveness, readiness, startup)
#   replicas: 1                 # Number of pod replicas
#   enableRPIAuthentication: true
#   enableSwagger: true
#   serviceMesh: true/false     # Per-service Linkerd opt-out
#   cloudIdentity: true/false   # Per-service cloud identity opt-in (per-service mode only)
#   autoscaling:
#     enabled: false
#     type: hpa
#     minReplicas: 2
#     maxReplicas: 5
#   resources:
#     requests: { cpu: 50m, memory: 256Mi }
#     limits: { memory: 3Gi }
#   logging:
#     default: Error
#     database: Error

# ==========================
# Pod Anti-Affinity
# ==========================
# Controls pod anti-affinity for all services.
# Default: soft (preferred) anti-affinity spreading pods across nodes.
# Set type to "required" for hard anti-affinity, or enabled to false to disable.
podAntiAffinity:
  enabled: true
  type: preferred               # preferred | required
  weight: 100                   # weight for preferred (1-100, ignored for required)
  topologyKey: kubernetes.io/hostname

# ==========================
# Custom CA Certificates
# ==========================
# Mount custom CA certificates into all pods.
# Useful when connecting to databases or services using internal/private CAs.
customCACerts:
  enabled: false
  name: ""                      # name of the Kubernetes Secret containing the CA bundle
  mountPath: /usr/local/share/ca-certificates/custom
  # Optional: set SSL_CERT_FILE env var to a specific file in the mount
  # certFile: ""                # e.g., "internal-ca.pem"
  # SDK provider: mount cert directly from vault via CSI inline volume
  # secretProviderClassName: "" # name of the SecretProviderClass to mount

# ==========================
# Common Annotations
# ==========================
# Annotations applied to all resource types: ServiceAccounts, Services, Deployments, and Pods.
# Use this for org-wide annotations (cost center, support email, alert routing, etc.).
commonAnnotations: {}
# commonAnnotations:
#   myorg.com/cost-center: "1234"
#   myorg.com/support-email: "team@example.com"
#   myorg.com/alert-channel: "email,pagerduty"

# Per-resource-type overrides (merged with commonAnnotations)
serviceAccountAnnotations: {}
serviceAnnotations: {}

# ==========================
# Operational Database
# ==========================
databases:
  operational:
    # Supported: sqlserver, postgresql, sqlserveronvm
    provider: sqlserver
    server_host: <my-database-server-host>
    server_username: <my-database-server-username>
    server_password: <my-database-server-password>
    pulse_database_name: <my-pulse-database-name>
    pulse_logging_database_name: <my-logging-database-name>
    encrypt: true

    # Google Cloud SQL Auth Proxy (GKE only; PostgreSQL or SQL Server).
    # When enabled, pods reach the operational database through a co-located
    # Cloud SQL Auth Proxy instead of connecting to the instance directly.
    #
    # Enable only when global.deployment.platform=google, provider is postgresql
    # or sqlserver, and secretsManagement.provider=sdk (the render fails otherwise).
    #
    # All connection values come from your vault. Set the operational database
    # host to 127.0.0.1 and the port to cloudSqlProxy.port (default 5432 for
    # postgresql, 1433 for sqlserver).
    #
    # SQL Server gotchas (apply if provider=sqlserver):
    #   * Set `databases.operational.encrypt: false` in your overrides. The default
    #     is `true`, which makes Microsoft.Data.SqlClient negotiate TLS during
    #     pre-login. The loopback proxy is plaintext and SqlClient bails with
    #     "an error occurred during the pre-login handshake". Encryption on the
    #     wire is still handled by the proxy → Cloud SQL leg via mTLS.
    #   * Use comma-port syntax: `Server=tcp:127.0.0.1,1433` (NOT `:1433`). The
    #     colon form fails to parse and the proxy log will show zero connections.
    #   * Cloud SQL for SQL Server does NOT support IAM DB auth via the proxy.
    #     Leave `autoIamAuthn: false` and put a real SQL login/password in the vault.
    #   * Vault `ConnectionStrings--*` entries should include
    #     `Encrypt=False;TrustServerCertificate=True;` for the same reason as #1.
    cloudSqlProxy:
      enabled: false
      # Required when enabled: "<project>:<region>:<instance>"
      connectionName: ""
      image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.2
      # Local port the proxy listens on. Defaults per engine: 5432 for
      # postgresql, 1433 for sqlserver. Override here if needed.
      # port: 5432
      # Use the Cloud SQL instance's private IP (requires VPC peering between GKE and Cloud SQL).
      privateIp: true
      # Use IAM database authentication instead of password auth. PostgreSQL only;
      # ignored for SQL Server (Cloud SQL for SQL Server has no IAM DB auth via the
      # proxy). When true, connections authenticate as
      # cloudIdentity.google.serviceAccountEmail with no password. The service
      # account must be registered as a Cloud SQL IAM user:
      #   gcloud sql users create <sa-email> --type=cloud_iam_service_account ...
      autoIamAuthn: false
      # Graceful shutdown window; proxy drains connections before exiting.
      terminationGracePeriod: "30s"
      # Authentication mode is auto-detected:
      # - Workload Identity (default): the pod's service account must be bound to
      #   a GCP service account with roles/cloudsql.client. No key file.
      # - Service-account key file: used when cloudIdentity.google.configMapName is
      #   set, reusing the platform-wide Google service account key.
      resources:
        requests: { cpu: 50m, memory: 64Mi }
        limits:   { cpu: 200m, memory: 256Mi }
      # Extra CLI args appended to the proxy command (e.g., ["--structured-logs", "--debug"]).
      additionalArgs: []

  # ==========================
  # Data Warehouse Providers
  # ==========================
  datawarehouse:

    # BigQuery
    bigquery:
      enabled: false
      # One entry per BigQuery connection. Choose how each connection
      # authenticates with credentialsType:
      #
      #   serviceAccount  - authenticate with a Google service account key.
      #     Provide serviceAccountEmail and the key file (configMapName,
      #     keyName, ConfigMapFilePath). Choose this when the pods cannot use
      #     Workload Identity, for example when RPI runs on Azure and connects
      #     to BigQuery on Google Cloud.
      #
      #   workloadIdentity - authenticate with Workload Identity, no key file.
      #     Choose this when running on GKE with Workload Identity configured
      #     (set cloudIdentity.google.serviceAccountEmail and leave
      #     cloudIdentity.google.configMapName empty). Omit serviceAccountEmail,
      #     configMapName and keyName on the connection.
      #
      # OAuthMechanism is the BigQuery ODBC driver's authentication mode: use 0
      # for a service account key, and your driver's Application Default
      # Credentials value (typically 3) for Workload Identity.
      connections:
        - name: gbq-tenant1
          projectId: gbq-tenant1
          sqlDialect: 1
          OAuthMechanism: 0
          credentialsType: serviceAccount
          serviceAccountEmail: gbq-tenant1@my-project.iam.gserviceaccount.com
          configMapName: gbq-tenant1
          keyName: gbq-tenant1.json
          ConfigMapFilePath: /app/google-creds
          allowLargeResults: 0
          largeResultsDataSetId: _bqodbc_temp_tables
          largeResultsTempTableExpirationTime: "3600000"
        # Workload Identity (keyless) connection:
        # - name: gbq-tenant1
        #   projectId: gbq-tenant1
        #   sqlDialect: 1
        #   OAuthMechanism: 3
        #   credentialsType: workloadIdentity
        #   allowLargeResults: 0

    # Snowflake
    snowflake:
      enabled: false
      # Supported: snowflake_jwt
      credentialsType: snowflake_jwt
      mountPath: /app/snowflake-creds
      # For csi/sdk: set this to the SecretProviderClass name that mounts
      # the private key(s) via CSI inline volume.
      # secretProviderClassName: ""
      # Key files - one entry per tenant. Each needs its own secretName
      # (the K8s Secret containing the .p8 file) and keyName (the filename).
      # Connection string references: PRIVATE_KEY_FILE=/app/snowflake-creds/<keyName>
      keys:
        - keyName: my-snowflake-rsakey.p8
          secretName: snowflake-rsa-private-key
      # Multi-tenant example:
      # keys:
      #   - keyName: tenant1-private-key.p8
      #     secretName: snowflake-tenant1-key
      #   - keyName: tenant2-private-key.p8
      #     secretName: snowflake-tenant2-key


# ============================================================
# Cloud Identity
# ============================================================
# Pod-to-cloud authentication. Required for sdk and csi secrets modes.
# The authentication mechanism is derived from global.deployment.platform:
#   azure  -> Azure Workload Identity (ServiceAccount annotation + pod label)
#   google -> GCP Workload Identity (ServiceAccount annotation)
#   amazon -> IRSA (ServiceAccount annotation + env vars)
# ============================================================
cloudIdentity:
  enabled: false
  # ServiceAccount mode:
  #   shared      -> one shared SA used by all services (simplest for workload identity)
  #   per-service -> each service creates its own SA (for per-service IAM roles)
  serviceAccount:
    mode: per-service
    name: redpoint-rpi
  # --- Azure Workload Identity ---
  azure:
    managedIdentityClientId: your-workload-identity-client-id
    tenantId: your-azure-tenant-id
  # --- Google Cloud Workload Identity ---
  google:
    serviceAccountEmail: my-google-svs-account@my-project.iam.gserviceaccount.com
    projectId: your_google_project_id
    # Name of the ConfigMap containing a Google service account key file.
    #
    # Leave empty ("") to authenticate to Google Cloud services (Cloud SQL,
    # BigQuery, Pub/Sub, Bigtable) with Workload Identity - no key file
    # required (recommended on GKE).
    # Set this to your ConfigMap name only if your deployment authenticates
    # with a mounted service account key instead of Workload Identity; the
    # default value below keeps that key-file behaviour.
    configMapName: my-google-svs-account
    # Filename of the key inside the ConfigMap. Used only when configMapName is set.
    keyName: my-google-svs-account.json
    # Directory the key file is mounted into. Used only when configMapName is set.
    configMapFilePath: /app/google-creds
  # --- Amazon IRSA / Access Keys ---
  amazon:
    roleArn: arn:aws:iam::my-aws-account-id:role/my-role-name
    region: us-east-1
    # Set to true to inject AWS access keys from the secrets K8s Secret
    # The keys AWS_Access_Key_ID and AWS_Secret_Access_Key must exist in the secret
    useAccessKeys: false

# ============================================================
#  SECRETS MANAGEMENT
# ============================================================
# How secrets are provided to pods:
#   kubernetes -> Chart creates K8s Secret from values (or user pre-creates)
#   sdk        -> App reads directly from cloud vault at runtime (requires cloudIdentity)
#   csi        -> CSI driver syncs cloud vault to K8s Secret (requires cloudIdentity)
# ============================================================
secretsManagement:
  # kubernetes | sdk | csi
  provider: kubernetes
  # --------------------------------------------------------
  # Kubernetes secrets (provider: kubernetes)
  # --------------------------------------------------------
  kubernetes:
    # The chart does NOT create this secret. Create it before deploying using:
    #   rpihelmcli secrets -f overrides.yaml -n <namespace>
    # Then: kubectl apply -f secrets.yaml -n <namespace>
    secretName: redpoint-rpi-secrets
  # --------------------------------------------------------
  # SDK - App reads from cloud vault directly (provider: sdk)
  # --------------------------------------------------------
  sdk:
    # Whether the app reads settings/credentials from the cloud vault (both
    # default true, all clouds). Keep useForAppSettings true so the app reads
    # its settings, including the database connection, from the vault. Set
    # useForConfigPasswords to false to keep RPI config passwords in the
    # operational database instead of the vault (some vaults reject empty
    # secret values, which can fail provisioning when a credential is unset).
    useForAppSettings: true
    useForConfigPasswords: true
    azure:
      vaultUri: https://myvault.vault.azure.net/
      configurationReloadIntervalSeconds: 30
      useADTokenForDatabaseConnection: true
    amazon:
      secretTagKey: ""
    google:
      projectId: ""
  # --------------------------------------------------------
  # CSI - CSI driver syncs vault to K8s Secret (provider: csi)
  # Pods consume secrets via secretKeyRef (same as kubernetes mode)
  # --------------------------------------------------------
  csi:
    # The K8s secret name created by the CSI driver
    secretName: redpoint-rpi-secrets
    # How the CSI sync is triggered. Options:
    #   none          - use dedicated validation pods (default)
    #   deploymentapi - mount CSI volume on the Deployment API pod to trigger sync
    # When set to deploymentapi, the Deployment API pod mounts the CSI volume on
    # startup, which triggers the CSI driver to sync secrets from the vault into
    # the K8s Secret. No validation pods needed. All other service pods read from
    # the K8s Secret as usual.
    syncService: none
    # SecretProviderClass definitions
    secretProviderClasses:
    # ----------------------------------------------------
    # Example: TLS Certificate from Azure Key Vault
    # ----------------------------------------------------
    - name: my-secret-class-1
      provider: azure
      secretObjects:
        - secretName: secret1
          type: kubernetes.io/tls
          data:
            - key: tls.key
              objectName: my-tls-certificate
      parameters:
        keyvaultName: my-keyvault-name
        resourceGroup: my-resource-group
        subscriptionId: my-subscription-id
        clientID: my-managed-identity-client-id
        tenantId: my-azure-tenant-id
        usePodIdentity: "false"
        useVMManagedIdentity: "false"
        useWorkloadIdentity: "true"
      objects:
        - objectName: "my-tls-certificate"
          objectType: secret
    # ----------------------------------------------------
    # Example: Database Connection String
    # ----------------------------------------------------
    - name: my-secret-class-2
      provider: azure
      secretObjects:
        - secretName: secret2
          type: Opaque
          data:
            - key: ConnectionString_Logging_Database
              objectName: V7-ConnectionString-LoggingDatabase
      parameters:
        keyvaultName: my-keyvault-name
        resourceGroup: my-resource-group
        subscriptionId: my-subscription-id
        clientID: my-managed-identity-client-id
        tenantId: my-azure-tenant-id
        usePodIdentity: "false"
        useVMManagedIdentity: "false"
        useWorkloadIdentity: "true"
        syncSecret: "true"
        enable-secret-rotation: "true"
      objects:
        - objectName: "V7-ConnectionString-Operations"
          objectType: secret
    # ----------------------------------------------------
    # Example: AWS Secrets Manager with jmesPath extraction
    # ----------------------------------------------------
    # - name: redpoint-secret-class
    #   provider: aws
    #   objectsContent: |
    #     - objectName: "arn:aws:secretsmanager:us-east-1:123456789:secret/rpi-db-creds"
    #       objectType: secretsmanager
    #       jmesPath:
    #         - path: username
    #           objectAlias: db_username
    #         - path: password
    #           objectAlias: db_password
    #   secretObjects:
    #     - secretName: redpoint-rpi-secrets
    #       type: Opaque
    #       data:
    #         - key: db_username
    #           objectName: db_username
    #         - key: db_password
    #           objectName: db_password

# ==========================
# Storage
# ==========================
# Two provisioning modes:
#   Static:  Define PVs + PVCs under persistentVolumes[]. You control volume handles.
#   Dynamic: Define only PVCs + a StorageClass with provisioner parameters.
#            The CSI driver auto-provisions volumes. No persistentVolumes[] needed.
# See docs/storage.md for examples of both modes.
storage:
  # StorageClass (required for dynamic, optional for static)
  storageClass:
    enabled: false
    name: redpoint-rpi
    provisioner: ""             # e.g., efs.csi.aws.com
    reclaimPolicy: Delete       # Delete | Retain
    volumeBindingMode: Immediate
    mountOptions: []
    # mountOptions:
    #   - iam
    parameters: {}
    # Example: AWS EFS
    # parameters:
    #   provisioningMode: efs-ap
    #   fileSystemId: fs-0123456789abcdef0
    #   directoryPerms: "755"
    #   uid: "7777"
    #   gid: "7777"
    #   basePath: /rpi
    #   subPathPattern: shared-data
    #   ensureUniqueDirectory: "false"
    #   reuseAccessPoint: "true"

  persistentVolumeClaims:
    FileOutputDirectory:
      enabled: false
      claimName: rpifileoutputdir
      mountPath: /rpifileoutputdir
    Plugins:
      enabled: false
      claimName: realtimeplugins
      mountPath: /app/plugins
    DataManagementUploadDirectory:
      enabled: false
      claimName: rpdmuploaddirectory
      mountPath: /rpdmuploaddirectory

  # Dynamic PVCs (no PV needed - the CSI driver auto-provisions storage)
  # Use with a StorageClass that supports dynamic provisioning (e.g., EFS with efs-ap mode).
  dynamicPVCs: []
  # dynamicPVCs:
  #   - claimName: rpi-claim
  #     storageClassName: redpoint-rpi
  #     accessModes: [ReadWriteMany]
  #     storage: 5Gi

  # Create PV + PVC pairs (for CSI-backed storage with static provisioning)
  persistentVolumes: []
  # persistentVolumes:
  #   - name: rpi-blob-storage
  #     capacity: 100Gi
  #     accessModes: [ReadWriteMany]
  #     storageClassName: blob-fuse
  #     reclaimPolicy: Retain
  #     mountOptions:
  #       - -o allow_other
  #       - --file-cache-timeout-in-seconds=120
  #     csi:
  #       driver: blob.csi.azure.com
  #       volumeHandle: unique-volume-handle
  #       volumeAttributes:
  #         containerName: rpi-data
  #         storageAccount: mystorageaccount
  #     pvc:
  #       claimName: rpi-blob-pvc

# ==========================
# Realtime API
# ==========================
realtimeapi:
  enabled: true
  replicas: 1
  rpiClientID: 00000000-0000-0000-0000-000000000000
  authentication:
    # Supported: basic, oauth
    type: basic
    basic:
      standard: false
      forms: true
      listenerQueue: true
      recommendations: true
    oauth:
      databaseName: RPIRealtimeCore
      accessTokenLifetimeSeconds: 360
      refreshTokenLifetimeSeconds: 360
  CORSOrigins: ["*"]

  # Geolocation settings for real-time weather / location enrichment.
  # Disabled by default. When enabled, the settings below are applied AND the
  # provider APIKey becomes required: supply it via the shared RPI Secret key
  # `RealtimeAPI_Geolocation_APIKey` (kubernetes/csi) or the cloud vault (sdk).
  # Enabling the feature without that key makes the Realtime API pod fail fast
  # (by design). To use your own provider instead of native Azure, author a
  # plugin and set pluginAssembly / pluginType / pluginSettings (and the ipLookup
  # equivalents).
  geolocation:
    enabled: false
    # Supported: Azure (native), or a custom provider via the plugin fields below
    provider: Azure
    # Supported: imperial, metric
    weatherUnits: imperial
    coordsCacheTimespanMinutes: 10
    # Custom geolocation provider plugin (leave blank to use the native provider)
    pluginAssembly: ""
    pluginType: ""
    # Plugin settings as a list of key/value pairs, e.g.:
    #   pluginSettings:
    #     - key: Endpoint
    #       value: "https://..."
    pluginSettings: []
    # Optional IP-address-based geolocation lookup
    ipLookup:
      enableGeoIPLookup: false
      coordsCacheTimespanMinutesIPLookup: 30
      pluginAssembly: ""
      pluginType: ""
      pluginSettings: []

  # Identity settings: how a known visitor's profile is keyed once they identify
  # themselves (via querystring, a cached attribute list, or a Realtime cache offer).
  identitySettings:
    # Principal key used to identify a known visitor's profile. e.g. with
    # masterKeyName "CustomerKey", ?CustomerKey=12345 keys the profile on
    # CustomerKey=12345. Blank leaves the visitor keyed on the RPI-assigned GUID.
    masterKeyName: ""
    # Alternative names the master key may appear under (e.g. "CK" for "CustomerKey").
    masterKeyAliases: []
    # Additional keys that can also identify a visitor. Linked to the master key
    # via a querystring carrying both, or a populated Realtime cache.
    alternativeKeys: []
    # Merge querystring parameters / cached-attribute-list attributes into the profile.
    mergeParameters: true
    mergeCALAttributes: true
    # Parameter / CAL attribute names to exclude from the merge, e.g.:
    #   parameterMergeExclusions:
    #     - utm_source
    parameterMergeExclusions: []
    calMergeExclusions: []

  # Real-Time Cache Provider
  cacheProvider:
    enabled: true
    # Supported: mongodb, azureredis, redis, inMemorySql, googlebigtable
    provider: ""
    mongodb:
      databaseName: <my-realtime-cache-db>
      collectionName: <my-realtime-cache-collection>
      # Authentication mechanism for MongoDB Atlas.
      #   default  - username/password in the connection string
      #   iamRole  - AWS IAM via MONGODB-AWS (passwordless auth on Amazon EKS)
      #             Requires roleArn below. The chart adds the eks.amazonaws.com/role-arn
      #             annotation to the Realtime API's ServiceAccount and injects AWS env vars
      #             (AWS_STS_REGIONAL_ENDPOINTS, AWS_DEFAULT_REGION) into the pod.
      #             The EKS Pod Identity Agent injects container credentials automatically.
      #             The MongoDB driver authenticates using the pod's IAM role.
      #             Prerequisites:
      #               1. Add the IAM role ARN as a database user in Atlas (Database Access → AWS IAM)
      #               2. The IAM role needs a trust policy for your EKS cluster's OIDC provider
      authMechanism: default
      # IAM role ARN for MONGODB-AWS authentication (only used when authMechanism: iamRole)
      roleArn: ""
      # AWS region for STS endpoint (only used when authMechanism: iamRole)
      region: us-east-1
    redis:
      # internal: chart-managed Redis | external: BYO Redis
      type: internal
      redisSettings:
        # Required if type=external
        connectionString: "my-redis-host:6379,password=<your-password>,abortConnect=False"
    inMemorySql:
      server_host: <my-cache-database-server-host>
      database_name: <my-cache-database-name>
      username: <my-cache-database-username>
      password: <my-cache-database-password>
    googlebigtable:
      projectId: <my-bigtable-project-id>
      instanceId: <my-bigtable-instance-id>

  # Real-Time Queue Provider
  queueProvider:
    enabled: true
    # Supported: amazonsqs, azureservicebus, googlepubsub, azureeventhubs, rabbitmq, azurestorage, amazonmsk
    provider: ""
    queueNames:
      formQueuePath: RPIWebFormSubmission
      eventsQueuePath: RPIWebEvents
      cacheOutputQueuePath: RPIWebCacheData
      recommendationsQueuePath: RPIWebRecommendations
      listenerQueuePath: RPIQueueListener
      callbackServiceQueuePath: RPICallbackApiQueue
    amazonsqs:
      # Supported: accessKey (configure keys under cloudIdentity.amazonSettings)
      credentialsType: accessKey
    azureservicebus:
      connectionstring: Endpoint=sb://<my-namespace>.servicebus.windows.net/;SharedAccessKeyName=<my-policy>;SharedAccessKey=<my-key>
    azurestorage:
      connectionString: DefaultEndpointsProtocol=https;AccountName=myAccoutName;AccountKey=myAccountAccessKey;EndpointSuffix=core.windows.net
      storageAccountName: myStorageAccountName
      useAzureIdentityAuthentication: false
    googlepubsub:
      projectId: <my-google-project-id>
    azureeventhubs:
      connectionstring: Endpoint=sb://<my-namespace>.servicebus.windows.net/;SharedAccessKeyName=<my-policy>;SharedAccessKey=<my-key>;EntityPath=<my-hub>
      eventHubName: RPIQueueListener
      NamespaceName: my_eventhub_namespace_name
      PartitionIds:
        - "0"
    rabbitmq:
      # internal: chart-managed RabbitMQ | external: BYO RabbitMQ
      type: internal
    amazonmsk:
      region: <my-aws-region>
      accessKeyId: <my-aws-iam-access-key>
      secretAccessKey: <my-aws-iam-secret-access-key>
      bootstrapServers: <my-server1.c2.kafka.us-east-1.amazonaws.com:9198>

  # Custom Realtime plugins (see docs/plugins.md for examples)
  customPlugins:
    enabled: false
    # list: []

  autoscaling:
    enabled: false

# ==========================
# Callback API
# ==========================
callbackapi:
  enabled: true
  replicas: 1
  channelLabel: SendGrid
  # Enable multitenancy for per-client instances
  multitenancy:
    enabled: false
  instances:
    - name: "tenant1"
      replicas: 1
  #  - name: "client2"
  #    replicas: 1
  autoscaling:
    enabled: false

# ==========================
# Execution Service
# ==========================
executionservice:
  enabled: true
  replicas: 1
  enableRPIAuthentication: true
  # Internal cache for execution state
  internalCache:
    enabled: true
    # Supported: filesystem, azureblob
    provider: filesystem
    # Azure Blob settings (when provider=azureblob)
    azureStorageSettings:
      accountName: my_storage_account_name
      containerName: rpi
      connectionString: DefaultEndpointsProtocol=https;AccountName=<myAccoutName;AccountKey=<myAccountAccessKey;EndpointSuffix=core.windows.net
      useCloudIdentity: false
  autoscaling:
    enabled: false
    # Supported: hpa, keda (KEDA is recommended for execution service)
    # type: hpa

# ==========================
# Interaction API
# ==========================
interactionapi:
  enabled: true
  replicas: 1
  enableRPIAuthentication: true
  autoscaling:
    enabled: false

# ==========================
# Integration API
# ==========================
integrationapi:
  enabled: true
  replicas: 1
  enableRPIAuthentication: true
  # Credentials (required if Smart Activation is enabled)
  username: admin@noemail.com
  password: my_Super_Strong_Pwd
  autoscaling:
    enabled: false

# ==========================
# Node Manager
# ==========================
nodemanager:
  enabled: true
  replicas: 1
  enableRPIAuthentication: true
  autoscaling:
    enabled: false

# ==========================
# Deployment API
# ==========================
deploymentapi:
  enabled: true
  replicas: 1
  # Use exported tenant template files for new tenant creation
  templateTenant:
    useTemplateFiles: false
    templateTenantFilesPath: "/tmp/templatetenantfiles"
    volumeClaimName: templatetenantfiles

# ==========================
# Queue Reader
# ==========================
queuereader:
  enabled: true
  replicas: 1
  realtimeConfiguration:
    # Enable distributed processing for high-volume transactions
    isDistributed: false
  # Internal cache for distributed processing (top-level, not nested under realtimeConfiguration)
  internalCache:
    provider: redis
    # internal: chart-managed Redis | external: BYO Redis
    type: internal
    redisSettings:
      # Required if type=external
      connectionString: "my-redis-host:6379,password=<your-password>,abortConnect=False"
  # Internal queue for distributed processing
  internalQueues:
    provider: rabbitmq
    # internal: chart-managed RabbitMQ | external: BYO RabbitMQ
    type: internal
    rabbitmqSettings:
      hostname: "rpi-queuereader-rabbitmq"
      username: redpointrpi
      password: my_Super_Strong_Pwd
    # RPI client IDs for this cluster
    tenantIds:
      - 00000000-0000-0000-0000-000000000000
  errorQueuePath: listenerQueueError 
  nonActiveQueuePath: listenerQueueNonActive
  autoscaling:
    enabled: false

# ==========================
# Rebrandly (URL Shortener)
# ==========================
rebrandly:
  enabled: false
  apiKey: my_rebrandly_api_key
  secretName: rpi-rebrandly
  redisSettings:
    # internal: chart-managed Redis | external: BYO Redis
    type: internal
    # External Redis settings (if type=external)
    hostname: rpi-rebrandly-cache
    username: my_redis_username
    password: my_redis_password
    useAzureCredentials: false
    port: 6379

# ==========================
# Twilio Messaging (opt-in)
# ==========================
# Outbound/inbound SMS via Twilio. Requires PostgreSQL (SQL Server is not supported).
# No secrets are set here: the Twilio auth token and the Basic-mode PostgreSQL
# password come from the shared RPI Secret (kubernetes/csi) or the cloud vault (sdk);
# the internal Redis password is auto-generated into rpi-internal-services.
twiliomessaging:
  enabled: false
  replicas: 1
  # Public ingress is restricted to the Twilio webhook paths only (secured by Twilio
  # signature validation). Send / status / messaging-service routes are never exposed;
  # they stay reachable only inside the cluster via the ClusterIP Service. Set to an empty
  # list to expose nothing publicly (fully cluster-internal).
  ingress:
    publicPaths:
      - /api/v1/webhook
  # Messaging transport: EventHub | SQS | PubSub
  messaging:
    provider: EventHub
  # Redis (distributed locks / dedup).
  # Auth follows the same rule as PostgreSQL: kubernetes/csi authenticate with the access key /
  # password from the shared Secret (TwilioMessaging_Redis_Password); sdk authenticates with the
  # cloud's managed identity (Azure / AWS / GCP by platform, via cloudIdentity) - no key.
  redisSettings:
    # internal: chart-managed Redis, password auto-generated into rpi-internal-services (nothing to set).
    # external: BYO cloud Redis (Azure Cache, ElastiCache, Memorystore) - supply the endpoint below.
    type: internal
    # External BYO Redis (only when type=external):
    # hostname: my-redis.redis.cache.windows.net
    # useTls: true
    #   AWS ElastiCache under sdk (IAM) additionally requires:
    # region: us-east-1
    # cacheName: my-elasticache
    # user: my-iam-user            # AWS IAM user id (or the Basic username under kubernetes/csi)
    # isServerless: false          # AWS serverless cache
  # PostgreSQL durable store (hard requirement; database twilio_messaging).
  # Auth follows secretsManagement.provider: kubernetes/csi authenticate with a password
  # from the shared Secret (TwilioMessaging_Postgres_Password, or the operational DB
  # password when reuseOperational=true); sdk authenticates with cloud managed identity
  # (Azure / AWS / GCP by global.deployment.platform) - no password.
  postgres:
    # reuse databases.operational when it is postgresql (same server, separate
    # twilio_messaging database). Set false to point Twilio at its own PostgreSQL
    # (required when databases.operational is SQL Server, and for sdk deployments).
    reuseOperational: true
    database: twilio_messaging
    sslMode: Require
    # Required when reuseOperational=false (operational DB is SQL Server, or sdk mode).
    # Render fails if these are missing while reuseOperational=false:
    # host: my-postgres-host
    # username: twilio_app
  # Twilio account. The auth token is a secret (shared Secret key TwilioMessaging_AuthToken).
  accountSid: ""
  # true only when the account SID/auth token are Twilio TEST credentials
  isTestCredentials: false
  # Event Hubs (messaging.provider=EventHub). Auth to Event Hubs + the checkpoint blob is Azure
  # Workload Identity, wired by cloudIdentity (cloudIdentity.enabled + cloudIdentity.azure.*) -
  # independent of secretsManagement.provider.
  # The hub names, consumer groups, and checkpoint container below MUST match the entities you
  # provision in the namespace (the SDK does not create them). Defaults are the twilio-messaging-*
  # names; override to match your Event Hubs namespace.
  eventHubs:
    fullyQualifiedNamespace: my-ehns.servicebus.windows.net
    inputHub:
      name: twilio-messaging-input
      consumerGroup: twilio-message-input-send
    outputHub:
      name: twilio-messaging-output
    outputInternalHub:
      name: twilio-messaging-output-internal
      deliveryStatusConsumerGroup: twilio-messaging-output-internal-delivery-status
      linkClickConsumerGroup: twilio-messaging-output-internal-link-click
      inboundMessageConsumerGroup: twilio-messaging-output-internal-inbound-reply
    checkpointing:
      blobServiceUri: https://mystorage.blob.core.windows.net
      blobContainerName: sms-send-checkpoints
  # SQS/SNS (messaging.provider=SQS; auth via AWS IRSA / Pod Identity)
  sqs:
    region: us-east-1
    inputQueueUrl: ""
    outputTopicArn: ""
    outputInternalTopicArn: ""
    outputDeliveryStatusQueueUrl: ""
    outputLinkClickQueueUrl: ""
    outputInboundMessageQueueUrl: ""
  # Pub/Sub (messaging.provider=PubSub; auth via GCP Workload Identity)
  pubsub:
    projectId: ""

# ==========================
# Diagnostics Mode
# ==========================
diagnosticsMode:
  copytoAzureBlob:
    enabled: false
    accountName: <yourstorageaccount>
    accessKey: <yourstorageaccount-access-key>
    containerName: <yourstorageaccount-container-name>
    blobServiceEndpoint: https://yourstorage.blob.core.windows.net
    enableCdn: false
    UseDataLakeStorageGen2: false
  copytoSftp:
    enabled: false
    sftpHost: <your-sftp-host>
    sftpUsername: <your-sftp-username>
    sftpPassword: <your-sftp-password>
    sftpPort: "22"

