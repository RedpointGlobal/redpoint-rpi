metadata:
  name: {{ $RealtimeapiMQ }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $RealtimeapiMQ  "component" "messaging") | nindent 4 }}
spec:
  serviceName: {{ $RealtimeapiMQ }}
  persistentVolumeClaimRetentionPolicy:
