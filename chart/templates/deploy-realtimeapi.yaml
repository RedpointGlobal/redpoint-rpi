---
{{- if $cfg.enabled }}
{{- if $cfg.cacheProvider.enabled }}
{{- if eq $cfg.cacheProvider.provider "redis" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $cacheName }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $cacheName "component" "cache") | nindent 4 }}
data:
  redis.conf: |
    # Memory (pod limit = 3048Mi ≈ 3.0Gi)
    maxmemory 2300mb
    maxmemory-policy allkeys-lfu
    maxmemory-samples 10

    appendonly yes
    appendfsync everysec
    aof-use-rdb-preamble yes
    aof-rewrite-incremental-fsync yes
    # disable RDB snapshots for a pure cache
    save ""                           

    # Safety / Ops
    stop-writes-on-bgsave-error no
    supervised no                    

    # Networking / timeouts
    bind 0.0.0.0
    port 6379
    {{- if not (eq .Values.secretsManagement.provider "sdk") }}
    protected-mode yes
    {{- end }}
    timeout 300
    tcp-keepalive 60
    tcp-backlog 511

    maxclients 2000

---
apiVersion: v1
kind: Service
metadata:
  name: {{ $cacheName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $cacheName "component" "cache") | nindent 4 }}
  {{- $svcAnnotations := include "rpi.mergedAnnotations" (dict "root" . "type" "service") | trim }}
  {{- if $svcAnnotations }}
  annotations:
    {{- $svcAnnotations | nindent 4 }}
  {{- end }}
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: {{ $cacheName }}
  ports:
    - name: redis
      port: 6379
      targetPort: 6379

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $cacheName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $cacheName "component" "cache") | nindent 4 }}

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $cacheName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $cacheName "component" "cache") | nindent 4 }}
    app.kubernetes.io/version: {{ .Values.global.deployment.images.tag | quote }}
spec:
  serviceName: {{ $cacheName }}
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $cacheName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $cacheName }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: rpi
        app.kubernetes.io/version: {{ .Values.global.deployment.images.tag | quote }}
    spec:
      {{- if .Values.global.deployment.images.imagePullSecret.enabled }}
      imagePullSecrets:
        - name: {{ .Values.global.deployment.images.imagePullSecret.name }}
      {{- end }}
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["rpi-realtimeapi"]
                topologyKey: "kubernetes.io/hostname"
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: {{ $cacheName }}
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ $cacheName }}
      {{- if .Values.nodeSelector.enabled }}
      nodeSelector:
        {{ .Values.nodeSelector.key }}: {{ .Values.nodeSelector.value }}
      {{- end }}
      {{- if .Values.tolerations.enabled }}
      tolerations:
        - effect: NoSchedule
          key: {{ .Values.nodeSelector.key }}
          operator: Equal
          value: {{ .Values.nodeSelector.value }}
      {{- end }}
      containers:
        - name: {{ $cacheName }}
          image: {{ include "rpi.image" (dict "root" . "name" "rpi-redis") }}
          imagePullPolicy: {{  .Values.global.deployment.images.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 6379
              name: redis
          {{- if not (eq .Values.secretsManagement.provider "sdk") }}
          command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--requirepass", "$(REDIS_PASSWORD)"]
          {{- end }}
          {{- if eq .Values.secretsManagement.provider "sdk" }}
          command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
          {{- end }}
          {{- if eq .Values.secretsManagement.provider "sdk" }}
          command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
          {{- end }}
          env:
          - name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ include "rpi.secrets.internalSecretName" . | quote }}
                key: RealtimeAPI_RedisCache_Password
          volumeMounts:
            {{- if $cfg.cacheProvider.redis.redisSettings.volumeClaimTemplates.enabled }}
            - name: {{ $cacheName }}-data
              mountPath: /data
            {{- end }}
            {{- if not $cfg.cacheProvider.redis.redisSettings.volumeClaimTemplates.enabled }}
            - name: {{ $cacheName }}-data
              mountPath: /data
            {{- end }}
            - name: {{ $cacheName }}-config
              mountPath: /usr/local/etc/redis
          {{- if $cfg.cacheProvider.redis.redisSettings.resources.enabled }}
          resources:
            {{- if $cfg.cacheProvider.redis.redisSettings.resources.limits }}
            limits:
              {{- if $cfg.cacheProvider.redis.redisSettings.resources.limits.cpu }}
              cpu: {{ $cfg.cacheProvider.redis.redisSettings.resources.limits.cpu | quote }}
              {{- end }}
              {{- if $cfg.cacheProvider.redis.redisSettings.resources.limits.memory }}
              memory: {{ $cfg.cacheProvider.redis.redisSettings.resources.limits.memory }}
              {{- end }}
            {{- end }}
            {{- if $cfg.cacheProvider.redis.redisSettings.resources.requests }}
            requests:
              {{- if $cfg.cacheProvider.redis.redisSettings.resources.requests.cpu | quote }}
              cpu: {{ $cfg.cacheProvider.redis.redisSettings.resources.requests.cpu }}
              {{- end }}
              {{- if $cfg.cacheProvider.redis.redisSettings.resources.requests.memory }}
              memory: {{ $cfg.cacheProvider.redis.redisSettings.resources.requests.memory }}
              {{- end }}
            {{- end }}
          {{- end }}
          readinessProbe:
            exec:
              {{- if not (eq .Values.secretsManagement.provider "sdk") }}
              command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG"]
              {{- end }}
              {{- if eq .Values.secretsManagement.provider "sdk" }}
              command: ["sh", "-c", "redis-cli ping | grep PONG"]
              {{- end }}
              {{- if eq .Values.secretsManagement.provider "sdk" }}
              command: ["sh", "-c", "redis-cli ping | grep PONG"]
              {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            exec:
              {{- if not (eq .Values.secretsManagement.provider "sdk") }}
              command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG"]
              {{- end }}
              {{- if eq .Values.secretsManagement.provider "sdk" }}
              command: ["sh", "-c", "redis-cli ping | grep PONG"]
              {{- end }}
              {{- if eq .Values.secretsManagement.provider "sdk" }}
              command: ["sh", "-c", "redis-cli ping | grep PONG"]
              {{- end }}
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          {{- include "rpi.container.securityContext" (dict "sc" $secCtx) | nindent 10 }}
      {{- include "rpi.pod.securityContext" (dict "sc" $secCtx) | nindent 6 }}
      volumes:
        - name: {{ $cacheName }}-config
          secret:
            name: {{ $cacheName }}-config
        {{- if not $cfg.cacheProvider.redis.redisSettings.volumeClaimTemplates.enabled }}
        - name: {{ $cacheName }}-data
          emptyDir: {}
        {{- end }}
  {{- if $cfg.cacheProvider.redis.redisSettings.volumeClaimTemplates.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: {{ $cacheName }}-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
