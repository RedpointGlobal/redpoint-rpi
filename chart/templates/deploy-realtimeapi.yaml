{{- $cfg := fromYaml (include "rpi.merged.service" (dict "root" . "name" "realtimeapi")) -}}
{{- $secCtx := fromYaml (include "rpi.merged.securityContext" .) -}}
{{- $liveness := fromYaml (include "rpi.merged.livenessProbe" .) -}}
{{- $readiness := fromYaml (include "rpi.merged.readinessProbe" .) -}}
{{- $startup := fromYaml (include "rpi.merged.startupProbe" .) -}}
{{- $topo := fromYaml (include "rpi.merged.topologySpreadConstraints" .) -}}
{{- $diag := fromYaml (include "rpi.merged.diagnosticsMode" .) -}}
{{- $ingCfg := fromYaml (include "rpi.merged.ingress" .) -}}
{{- $name := $cfg.name -}}
{{- $cacheName := "rpi-realtimeapi-cache" -}}
{{- $geo := $cfg.geolocation | default dict -}}
{{- $geoip := $geo.ipLookup | default dict -}}

{{- $dwEnabled := (include "redpoint.DatawarehouseProviders" .) | eq "true" -}}
{{- $dw := .Values.databases.datawarehouse | default dict -}}
{{- if $cfg.serviceAccount.enabled }}
{{- if $cfg.enabled }}
{{- if ne (.Values.cloudIdentity.serviceAccount.mode | default "per-service") "shared" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "api") | nindent 4 }}
  {{- $saAnnotations := include "rpi.mergedAnnotations" (dict "root" . "type" "serviceAccount") | trim }}
  {{- $ciAnnotations := include "rpi.cloudidentity.saAnnotations" (dict "root" .) | trim }}
  {{- $mongoIamArn := "" }}
  {{- if and (not .Values.cloudIdentity.enabled) (eq (($cfg.cacheProvider).mongodb.authMechanism | default "default") "iamRole") }}
  {{- $mongoIamArn = ($cfg.cacheProvider).mongodb.roleArn | default "" }}
  {{- end }}
  {{- if or $saAnnotations $ciAnnotations $mongoIamArn }}
  annotations:
    {{- if $mongoIamArn }}
    eks.amazonaws.com/role-arn: {{ $mongoIamArn | quote }}
    {{- end }}
    {{- if $saAnnotations }}
    {{- $saAnnotations | nindent 4 }}
    {{- end }}
    {{- if $ciAnnotations }}
    {{- $ciAnnotations | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}

---
{{- if $cfg.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "api") | nindent 4 }}
spec:
  maxUnavailable: {{ $cfg.podDisruptionBudget.maxUnavailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
{{- end }}

---
{{- if $cfg.enabled }}
{{- if eq $cfg.type "rollout" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-preview
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "api") | nindent 4 }}
  {{- $svcAnnotations := include "rpi.mergedAnnotations" (dict "root" . "type" "service") | trim }}
  {{- if $svcAnnotations }}
  annotations:
    {{- $svcAnnotations | nindent 4 }}
  {{- end }}
spec:
  ports:
  - name: http
    port: {{ $cfg.service.port }}
    protocol: TCP
    targetPort: 8080
  selector:
    app.kubernetes.io/name: {{ $name }}
{{- end }}
{{- end }}

---
{{- if $cfg.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "api") | nindent 4 }}
  {{- $svcAnnotations := include "rpi.mergedAnnotations" (dict "root" . "type" "service") | trim }}
  {{- if $svcAnnotations }}
  annotations:
    {{- $svcAnnotations | nindent 4 }}
  {{- end }}
spec:
  ports:
  - name: http
    port: {{ $cfg.service.port }}
    protocol: TCP
    targetPort: 8080
  selector:
    app.kubernetes.io/name: {{ $name }}

---
{{- if eq $cfg.type "rollout" }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
{{- end }}
{{- if eq $cfg.type "deployment" }}
apiVersion: apps/v1
kind: Deployment
{{- end }}
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "api") | nindent 4 }}
    app.kubernetes.io/version: {{ .Values.global.deployment.images.tag | quote }}
    {{- with .Values.customLabels }}
    {{- toYaml . | nindent 4 }} 
    {{- end }}
  {{- with .Values.customAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not $cfg.autoscaling.enabled }}
  replicas: {{ $cfg.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  {{- if eq $cfg.type "rollout" }}
  strategy:
    blueGreen:
      activeService: {{ $name }}
      previewService: {{ $name }}-preview
      autoPromotionEnabled: {{ $cfg.rollout.autoPromotionEnabled }}
  revisionHistoryLimit: {{ $cfg.rollout.revisionHistoryLimit }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "api") | nindent 8 }}
        app.kubernetes.io/version: {{ .Values.global.deployment.images.tag | quote }}
        {{- with .Values.customLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $cfg.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with (include "rpi.cloudidentity.podLabels" (dict "root" . "svcCloudIdentity" (hasKey $cfg "cloudIdentity" | ternary $cfg.cloudIdentity false)) | trim) }}{{- . | nindent 8 }}{{- end }}
      {{- if or .Values.commonAnnotations $cfg.podAnnotations (or .Values.customMetrics.enabled $cfg.customMetrics.enabled) .Values.serviceMesh.enabled }}
      annotations:
        {{- with .Values.commonAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $cfg.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if (or .Values.customMetrics.enabled $cfg.customMetrics.enabled) }}
        prometheus.io/scrape: {{ or .Values.customMetrics.enabled $cfg.customMetrics.prometheus_scrape | quote }}
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
        {{- end }}
        {{- include "rpi.serviceMesh.podAnnotations" (dict "root" . "svcServiceMesh" (hasKey $cfg "serviceMesh" | ternary $cfg.serviceMesh true)) | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.global.deployment.images.imagePullSecret.enabled }}
      imagePullSecrets:
      - name: {{ .Values.global.deployment.images.imagePullSecret.name }}
      {{- end }}
      terminationGracePeriodSeconds: {{ $cfg.terminationGracePeriodSeconds }}
      serviceAccountName: {{ include "rpi.serviceAccountName" (dict "root" . "name" $name "cfg" $cfg) }}
      {{- include "rpi.pod.securityContext" (dict "sc" $secCtx) | nindent 6 }}
      {{- include "rpi.podAntiAffinity" (dict "root" . "name" $name) | nindent 6 }}
      {{- if $topo.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ $topo.maxSkew }}
          topologyKey: {{ $topo.topologyKey }}
          whenUnsatisfiable: {{ $topo.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ $name }}
      {{- end }}
      {{- if or (eq (include "rpi.cloudSqlProxy.enabled" .) "true") (eq (include "rpi.telemetry.mode.otel" .) "true") }}
      initContainers:
        {{- if eq (include "rpi.cloudSqlProxy.enabled" .) "true" }}
        {{- include "rpi.block.cloudSqlProxy.sidecar" . | nindent 8 }}
        {{- end }}
        {{- if eq (include "rpi.telemetry.mode.otel" .) "true" }}
        {{- include "rpi.otel.initContainer" . | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ $name }}
                    {{- include "rpi.block.probes" (dict "liveness" $liveness "readiness" $readiness "startup" $startup "enabled" $cfg.enableProbes) | nindent 10 }}
          image: {{ include "rpi.image" (dict "root" . "name" $name) }}
          imagePullPolicy: {{  .Values.global.deployment.images.imagePullPolicy | default "IfNotPresent" }}
          ports:
          - containerPort: 8080
            name: web-port
            protocol: TCP
          {{- include "rpi.container.securityContext" (dict "sc" $secCtx) | nindent 10 }}
          {{- if (($dw.bigquery | default dict).enabled | default false) }}
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - cat /app/odbc-config/odbc2.ini > /odbc-config/odbc.ini
          {{- end }}
          {{- if $cfg.resources.enabled }}
          resources:
            {{- if and $cfg.resources.limits (ne $cfg.resources.limits.enabled false) }}
            limits:
              {{- with $cfg.resources.limits.cpu }}
              cpu: {{ . }}
              {{- end }}
              {{- with $cfg.resources.limits.memory }}
              memory: {{ . }}
              {{- end }}
            {{- end }}
            {{- if and $cfg.resources.requests (ne $cfg.resources.requests.enabled false) }}
            requests:
              {{- with $cfg.resources.requests.cpu }}
              cpu: {{ . }}
              {{- end }}
              {{- with $cfg.resources.requests.memory }}
              memory: {{ . }}
              {{- end }}
          {{- end }}
          {{- end }}
          env:
          {{- if eq (include "rpi.telemetry.mode.otel" .) "true" }}
          {{- include "rpi.otel.envvars.shared" (dict "root" . "svc" $name) | nindent 10 }}
          {{- end }}
          {{- if .Values.global.deployment.podTimezone }}
          - name: TZ
            value: {{ .Values.global.deployment.podTimezone | quote }}
          {{- end }}
          - name: Logging__LogLevel__Default
            value: {{ $cfg.logging.realtimeagent.default | quote }}
          - name: Logging__Database__LogLevel__Default
            value: {{ $cfg.logging.realtimeagent.database | quote }}
          - name: Logging__Database__RPITrace
            value: {{ $cfg.logging.realtimeagent.rpiTrace | quote }}
          - name: Logging__Database__RPIError
            value: {{ $cfg.logging.realtimeagent.rpiError | quote }}
          - name: Logging__Console__LogLevel__Default
            value: {{ $cfg.logging.realtimeagent.console | quote }}
          - name: Logging__RPIRealtime__EndpointLogLevel
            value: {{ $cfg.logging.realtimeapi.endpoint | quote }}
          - name: Logging__RPIRealtime__SharedLogLevel
            value: {{ $cfg.logging.realtimeapi.shared | quote }}
          - name: Logging__RPIRealtime__PluginLogLevel
            value: {{ $cfg.logging.realtimeapi.plugins | quote }}
          - name: Logging__RPIRealtime__OtherLogLevel
            value: {{ $cfg.logging.realtimeapi.other | quote }}
          - name: Logging__RPIRealtime__LogLevel__Default
            value: {{ $cfg.logging.realtimeapi.default | quote }}
          - name: Logging__RPIRealtime__ConsoleLogging
            value: {{ $cfg.logging.realtimeapi.console | quote }}
          - name: RPI__DateTimeSource
            value: {{ .Values.databases.operational.dateTimeSource | default "OperatingSystem" | quote }}
          {{- if $diag.copytoAzureBlob.enabled }}
          - name: RPI__Diagnostics__CopyToAzure__IsEnabled
            value: "true"
          - name: RPI__Diagnostics__CopyToAzure__StorageAccount
            value: {{ $diag.copytoAzureBlob.accountName | quote }}
          - name: RPI__Diagnostics__CopyToAzure__AccessKey
            valueFrom:
              secretKeyRef:
                name: {{ include "rpi.secrets.secretName" . | quote }}
                key: CopyToAzureBlobAccessKey
          - name: RPI__Diagnostics__CopyToAzure__ContainerName
            value: {{ $diag.copytoAzureBlob.containerName | quote }}
          - name: RPI__Diagnostics__CopyToAzure__BlobServiceEndpoint
            value: {{ $diag.copytoAzureBlob.blobServiceEndpoint | quote }}
          - name: RPI__Diagnostics__CopyToAzure__EnableCdn
            value: {{ $diag.copytoAzureBlob.enableCdn | quote }}
          - name: RPI__Diagnostics__CopyToAzure__AzureUseDataLakeStorageGen2
            value: {{ $diag.copytoAzureBlob.UseDataLakeStorageGen2 | quote }}
          {{- end }}
          {{- if $diag.copytoSftp.enabled }}
          - name: RPI__Diagnostics__CopyToSFTP__SecureFTPHost
            value: {{ $diag.copytoSftp.sftpHost | quote }}
          - name: RPI__Diagnostics__CopyToSFTP__SecureFTPUsername
            value: {{ $diag.copytoSftp.sftpUsername | quote }}
          - name: RPI__Diagnostics__CopyToSFTP__SecureFTPPassword
            valueFrom:
              secretKeyRef:
                name: {{ include "rpi.secrets.secretName" . | quote }}
                key: CopyToSFTPSecureFTPPassword
          - name: RPI__Diagnostics__CopyToSFTP__PortNumberNumber
            value: {{ $diag.copytoSftp.sftpPort | quote }}
          - name: RPI__Diagnostics__UseSFTP
            value: "true"
          - name: RPI__Diagnostics__CopyToSFTP__IsEnabled
            value: "true"
          {{- end }}
          {{- if $diag.dotNetTools.enabled }}
          - name: DOTNET_BUNDLE_EXTRACT_BASE_DIR
            value: {{ $diag.dotNetTools.extractionBaseDir | quote }} 
          - name: RPI__Diagnostics__UseDotNetTools__Path
            value: {{  $diag.dotNetTools.path  | quote }}
          - name: RPI__Diagnostics__UseDotNetTools__UseCounters
            value: {{ $diag.dotNetTools.useCounters | quote }}
          - name: RPI__Diagnostics__UseDotNetTools__CounterProviderList
            value: '["System.Runtime", "Microsoft.Extensions.Diagnostics.ResourceMonitoring"]'
          - name: RPI__Diagnostics__UseDotNetTools__UseGcDump
            value: {{ $diag.dotNetTools.useGcDump | quote }}
          {{- end }}
          {{- with (include "rpi.secrets.sdk.envvars" . | trim) }}{{- . | nindent 10 }}{{- end }}
          {{- with (include "rpi.cloudidentity.envvars" . | trim) }}{{- . | nindent 10 }}{{- end }}
          {{- with (include "rpi.cloudidentity.awsAccessKeyEnvvars" . | trim) }}{{- . | nindent 10 }}{{- end }}
          {{- if and (not .Values.cloudIdentity.enabled) (eq ($cfg.cacheProvider.mongodb.authMechanism | default "default") "iamRole") }}
          - name: AWS_STS_REGIONAL_ENDPOINTS
            value: "regional"
          - name: AWS_DEFAULT_REGION
            value: {{ $cfg.cacheProvider.mongodb.region | default "us-east-1" | quote }}
          {{- end }}
          {{- include "rpi.customCACerts.envVar" . | nindent 10 }}
          {{- if eq .Values.global.deployment.platform "azure" }}
          {{- if (($dw.bigquery | default dict).enabled | default false) }}
          - name: GOOGLE_APPLICATION_CREDENTIALS
            value: "{{ .Values.cloudIdentity.google.configMapFilePath }}/{{ .Values.cloudIdentity.google.keyName }}"
          {{- end }}
          {{- end }}
          {{- if (($dw.bigquery | default dict).enabled | default false) }}
          - name: ODBCINI
            value: /odbc-config/odbc.ini
          {{- end }}
          {{- if not (eq .Values.secretsManagement.provider "sdk") }}
          - name: CONNECTIONSTRINGS__LOGGINGDATABASE
            valueFrom:
              secretKeyRef:
                key: ConnectionString_Logging_Database
                name: {{ include "rpi.secrets.secretName" . | quote }}
          - name: CONNECTIONSTRINGS__OPERATIONALDATABASE
            valueFrom:
              secretKeyRef:
                key: ConnectionString_Operations_Database
                name: {{ include "rpi.secrets.secretName" . | quote }}
          {{- end }}
          {{- if eq .Values.databases.operational.provider "postgresql" }}
          - name: RPI_OperationalDatabaseType
            value: "PostgreSQL"
          {{- end }}
          {{- if not (eq .Values.secretsManagement.provider "sdk") }}
          {{- if eq $cfg.authentication.type "basic" }}
          - name: RealtimeAPIConfiguration__AppSettings__RPIAuthToken
            valueFrom:
              secretKeyRef:
                name: {{ include "rpi.secrets.secretName" . | quote }}
                key: RealtimeAPI_Auth_Token
          - name: RealtimeAPIConfiguration__AppSettings__RealtimeAPIKey
            valueFrom:
              secretKeyRef:
                name: {{ include "rpi.secrets.secretName" . | quote }}
                key: RealtimeAPI_Auth_Token
          - name: RealtimeAPIConfiguration__AppSettings__RealtimeAgentAuthToken
            valueFrom:
              secretKeyRef:
                name: {{ include "rpi.secrets.secretName" . | quote }}
                key: RealtimeAPI_Auth_Token
          {{- end }}
          {{- end }}
          {{- if eq $cfg.authentication.type "oauth" }}
          - name: Authentication__EnableOAuth
            value: "true"
          - name: Authentication__EnableTransportSecurityRequirement
            value: "false"
          - name: Authentication__DisableHttpRedirect
            value: "true"
          - name: Authentication__RootServiceURL
            value: "https://{{ include "rpi.ingress.fqdn" (dict "host" $ingCfg.hosts.realtime "domain" $ingCfg.domain) }}"
          - name: Authentication__HttpMetaRootServiceURL
            value: "http://{{ $name }}"
          - name: Authentication__AccessTokenLifetimeSeconds
            value: {{ $cfg.authentication.oauth.accessTokenLifetimeSeconds | quote }}
          - name: Authentication__RefreshTokenLifetimeSeconds
            value: {{ $cfg.authentication.oauth.refreshTokenLifetimeSeconds | quote }}
          {{- end }}
          {{- if not (eq .Values.secretsManagement.provider "sdk") }}
          {{- if eq $cfg.authentication.type "oauth" }}
          - name: ConnectionStrings__DefaultConnection
            valueFrom:
              secretKeyRef:
                name: {{ include "rpi.secrets.secretName" . | quote }}
                key: ConnectionString_RealtimeApi_OAuth
          {{- end }}
          {{- end }}
          {{- if eq .Values.databases.operational.provider "sqlserveronvm" }}
          {{- if eq $cfg.authentication.type "oauth" }}
          - name: Authentication__OAuthDBProvider
            value: "SQLServer"
          {{- end }}
          {{- end }}
          {{- if eq .Values.databases.operational.provider "sqlserver" }}
          {{- if eq $cfg.authentication.type "oauth" }}
          - name: Authentication__OAuthDBProvider
            value: "SQLServer"
          {{- end }}
          {{- end }}
          {{- if eq .Values.databases.operational.provider "postgresql" }}
          {{- if eq $cfg.authentication.type "oauth" }}
          - name: Authentication__OAuthDBProvider
            value: "PostgreSQL"
          {{- end }}
          {{- end }}
          {{- if .Values.storage.persistentVolumeClaims.Plugins.enabled }} 
          - name: RealtimeAPIConfiguration__AppSettings__PluginAssemblyPath
            value: {{ .Values.storage.persistentVolumeClaims.Plugins.mountPath | quote }}
          {{- end }}
          - name: RealtimeAPIConfiguration__AppSettings__IsWebFormProcessorOnly
            value: "false"
          - name: RealtimeAPIConfiguration__AppSettings__MessageDaysExpiry
            value: "30"
          - name: RealtimeAPIConfiguration__AppSettings__CheckForProfileUpdatesOnSave
            value: "false"
          {{- if eq $cfg.authentication.type "basic" }}
          - name: RealtimeAPIConfiguration__BasicAuthenticationRequireToken__Standard
            value: {{ $cfg.authentication.basic.standard | quote }}
          - name: RealtimeAPIConfiguration__BasicAuthenticationRequireToken__Forms
            value: {{ $cfg.authentication.basic.forms | quote }}
          - name: RealtimeAPIConfiguration__BasicAuthenticationRequireToken__ListenerQueue
            value: {{ $cfg.authentication.basic.listenerQueue | quote }}
          - name: RealtimeAPIConfiguration__BasicAuthenticationRequireToken__Recommendations
            value: {{ $cfg.authentication.basic.recommendations | quote }}
          {{- end }}
          - name: RealtimeAPIConfiguration__AppSettings__RealtimeServerCookieEnabled
            value: {{ $cfg.RealtimeServerCookieEnabled | quote }}
          - name: RealtimeAPIConfiguration__AppSettings__ThresholdBetweenSiteVisitsMinutes
            value: {{ $cfg.ThresholdBetweenSiteVisitsMinutes | quote }}
          - name: RealtimeAPIConfiguration__AppSettings__ThresholdBetweenPageVisitsMinutes
            value: {{ $cfg.ThresholdBetweenPageVisitsMinutes | quote }}
          - name: RealtimeAPIConfiguration__AppSettings__CacheOutputCollectIPAddress
            value: {{ $cfg.CacheOutputCollectIPAddress | quote }}
          - name: RealtimeAPIConfiguration__AppSettings__HashVisitorID
            value: {{ $cfg.HashVisitorID | quote }}
          - name: RealtimeAPIConfiguration__AppSettings__EventListeningLocalCacheDuration
            value: {{ $cfg.EventListeningLocalCacheDuration | quote }}
          - name: RealtimeAPIConfiguration__AppSettings__RealtimeServerCookieHttpOnly
            value: {{ $cfg.RealtimeServerCookieHttpOnly | quote }}
          - name: RealtimeAPIConfiguration__AppSettings__RealtimeServerCookieName
            value: {{ $cfg.RealtimeServerCookieName | quote }}
          - name: RealtimeAPIConfiguration__AppSettings__RealtimeServerCookieExpires
            value: {{ $cfg.RealtimeServerCookieExpires | quote }}
          - name: RealtimeAPIConfiguration__AppSettings__RealtimeServerCookieDomain
            value: {{ $cfg.RealtimeServerCookieDomain | quote }}
          - name: RealtimeAPIConfiguration__AppSettings__RealtimeAgentInProcessEnabled
            value: "true"
          - name: RealtimeAPIConfiguration__AppSettings__NoDaysPersistWebEvents
            value: "365"
          - name: RealtimeAPIConfiguration__Queues__CacheOutputQueueEnabled
            value: {{ $cfg.cacheOutputQueueEnabled | quote }}
          - name: RealtimeAPIConfiguration__AppSettings__CacheWebFormData
            value: {{ $cfg.CacheWebFormData | quote }}
          - name: RealtimeAPIConfiguration__AppSettings__EnableHelpPages
            value: {{ $cfg.enableHelpPages | quote }}
          - name: RealtimeAPIConfiguration__AppSettings__CORSOrigins
            value: {{ $cfg.CORSOrigins | quote }}
          - name: RealtimeAPIConfiguration__AppSettings__DecisionCacheDuration
            value: {{ $cfg.decisionCacheDuration | quote }}
          - name: RealtimeAPIConfiguration__AppSettings__RPIClientID
            value: {{ $cfg.rpiClientID | quote }}
          - name: RealtimeAPIConfiguration__AppSettings__EnableAuditMetricsInHeaders
            value: {{ $cfg.enableAuditMetricsInHeaders | quote }}
          - name: RealtimeAPIConfiguration__AppSettings__EnableEventListening
            value: {{ $cfg.enableEventListening | quote }}
          - name: RealtimeAPIConfiguration__GeolocationSettings__Provider
            value: {{ $geo.provider | default "Azure" | quote }}
          {{- if not (eq .Values.secretsManagement.provider "sdk") }}
          - name: RealtimeAPIConfiguration__GeolocationSettings__APIKey
            valueFrom:
              secretKeyRef:
                name: {{ include "rpi.secrets.secretName" . | quote }}
                key: RealtimeAPI_Geolocation_APIKey
          {{- end }}
          - name: RealtimeAPIConfiguration__GeolocationSettings__WeatherUnits
            value: {{ $geo.weatherUnits | default "imperial" | quote }}
          - name: RealtimeAPIConfiguration__GeolocationSettings__CoordsCacheTimespanMinutes
            value: {{ $geo.coordsCacheTimespanMinutes | default 10 | quote }}
          {{- with $geo.pluginAssembly }}
          - name: RealtimeAPIConfiguration__GeolocationSettings__PluginAssembly
            value: {{ . | quote }}
          {{- end }}
          {{- with $geo.pluginType }}
          - name: RealtimeAPIConfiguration__GeolocationSettings__PluginType
            value: {{ . | quote }}
          {{- end }}
          {{- range $i, $s := ($geo.pluginSettings | default list) }}
          - name: RealtimeAPIConfiguration__GeolocationSettings__PluginSettings__{{ $i }}__Key
            value: {{ $s.key | quote }}
          - name: RealtimeAPIConfiguration__GeolocationSettings__PluginSettings__{{ $i }}__Value
            value: {{ $s.value | quote }}
          {{- end }}
          - name: RealtimeAPIConfiguration__GeolocationSettings__IPLookupPlugin__EnableGeoIPLookup
            value: {{ $geoip.enableGeoIPLookup | default false | quote }}
          - name: RealtimeAPIConfiguration__GeolocationSettings__IPLookupPlugin__CoordsCacheTimespanMinutesIPLookup
            value: {{ $geoip.coordsCacheTimespanMinutesIPLookup | default 30 | quote }}
          {{- with $geoip.pluginAssembly }}
          - name: RealtimeAPIConfiguration__GeolocationSettings__IPLookupPlugin__PluginAssembly
            value: {{ . | quote }}
          {{- end }}
          {{- with $geoip.pluginType }}
          - name: RealtimeAPIConfiguration__GeolocationSettings__IPLookupPlugin__PluginType
            value: {{ . | quote }}
          {{- end }}
          {{- range $i, $s := ($geoip.pluginSettings | default list) }}
          - name: RealtimeAPIConfiguration__GeolocationSettings__IPLookupPlugin__PluginSettings__{{ $i }}__Key
            value: {{ $s.key | quote }}
          - name: RealtimeAPIConfiguration__GeolocationSettings__IPLookupPlugin__PluginSettings__{{ $i }}__Value
            value: {{ $s.value | quote }}
          {{- end }}
          {{- if eq .Values.global.deployment.platform "azure" }}
          - name: RealtimeAPIConfiguration__Queues__FormQueuePath
            value: {{ $cfg.queueProvider.queueNames.formQueuePath | quote }}
          - name: RealtimeAPIConfiguration__Queues__EventsQueuePath
            value: {{ $cfg.queueProvider.queueNames.eventsQueuePath | quote }}
          - name: RealtimeAPIConfiguration__Queues__CacheOutputQueuePath
            value: {{ $cfg.queueProvider.queueNames.cacheOutputQueuePath | quote }}
          - name: RealtimeAPIConfiguration__Queues__RecommendationsQueuePath
            value: {{ $cfg.queueProvider.queueNames.recommendationsQueuePath | quote }}
          - name: RealtimeAPIConfiguration__Queues__ListenerQueuePath
            value: {{ $cfg.queueProvider.queueNames.listenerQueuePath | quote }}
          {{- end }}
