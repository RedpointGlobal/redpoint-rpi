{{- $rtCfg := fromYaml (include "rpi.merged.service" (dict "root" . "name" "realtimeapi")) -}}
{{- $qrCfg := fromYaml (include "rpi.merged.service" (dict "root" . "name" "queuereader")) -}}
{{- $rbCfg := fromYaml (include "rpi.merged.service" (dict "root" . "name" "rebrandly")) -}}
{{- $secCtx := fromYaml (include "rpi.merged.securityContext" .) -}}
{{- $QueueReadercacheName := "rpi-queuereader-cache" -}}

{{- if $qrCfg.realtimeConfiguration.isDistributed }}
{{- if eq $qrCfg.internalCache.provider "redis" }}
{{- if eq $qrCfg.internalCache.type "internal" }}
{{- if $qrCfg.internalCache.redisSettings.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $QueueReadercacheName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $QueueReadercacheName "component" "cache") | nindent 4 }}
spec:
  maxUnavailable: {{ $qrCfg.internalCache.redisSettings.podDisruptionBudget.maxUnavailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $QueueReadercacheName }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

---
{{- if $qrCfg.realtimeConfiguration.isDistributed }}
{{- if eq $qrCfg.internalCache.provider "redis" }}
{{- if eq $qrCfg.internalCache.type "internal" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $QueueReadercacheName }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $QueueReadercacheName "component" "cache") | nindent 4 }}
data:
  redis.conf: |
    # Memory (pod limit = 3048Mi ≈ 3.0Gi)
    maxmemory 2300mb
    maxmemory-policy allkeys-lfu
    maxmemory-samples 10

    appendonly yes
    appendfsync everysec
    aof-use-rdb-preamble yes
    aof-rewrite-incremental-fsync yes
    # disable RDB snapshots for a pure cache
    save ""                           

    # Safety / Ops
    stop-writes-on-bgsave-error no
    supervised no                    

    # Networking / timeouts
    bind 0.0.0.0
    port 6379
    {{- if not (eq .Values.secretsManagement.provider "sdk") }}
    protected-mode yes
    {{- end }}
    timeout 300
    tcp-keepalive 60
    tcp-backlog 511

    maxclients 2000

---
apiVersion: v1
kind: Service
metadata:
  name: {{ $QueueReadercacheName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $QueueReadercacheName "component" "cache") | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  selector:
    app.kubernetes.io/name: {{ $QueueReadercacheName }}
    
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $QueueReadercacheName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $QueueReadercacheName "component" "cache") | nindent 4 }}

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $QueueReadercacheName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $QueueReadercacheName "component" "cache") | nindent 4 }}
spec:
  serviceName: {{ $QueueReadercacheName }}
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $QueueReadercacheName }}
  template:
    metadata:
      labels:
        {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $QueueReadercacheName "component" "cache") | nindent 8 }}
        app.kubernetes.io/version: {{ .Values.global.deployment.images.tag | quote }}
    spec:
      {{- if .Values.global.deployment.images.imagePullSecret.enabled }}
      imagePullSecrets:
        - name: {{ .Values.global.deployment.images.imagePullSecret.name }}
      {{- end }}
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["rpi-queuereader"]
                topologyKey: "kubernetes.io/hostname"
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: {{ $QueueReadercacheName }}
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ $QueueReadercacheName }}
      {{- if .Values.nodeSelector.enabled }}
      nodeSelector:
        {{ .Values.nodeSelector.key }}: {{ .Values.nodeSelector.value }}
      {{- end }}
      {{- if .Values.tolerations.enabled }}
      tolerations:
        - effect: NoSchedule
          key: {{ .Values.nodeSelector.key }}
          operator: Equal
          value: {{ .Values.nodeSelector.value }}
      {{- end }}
      terminationGracePeriodSeconds: 120
      containers:
        - name: {{ $QueueReadercacheName }}
          image: {{ include "rpi.image" (dict "root" . "name" "rpi-redis") }}
          imagePullPolicy: {{ .Values.global.deployment.images.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 6379
              name: redis
          {{- if not (eq .Values.secretsManagement.provider "sdk") }}
          command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--requirepass", "$(REDIS_PASSWORD)"]
          {{- end }}
          {{- if eq .Values.secretsManagement.provider "sdk" }}
          command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
          {{- end }}
          env:
          - name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ include "rpi.secrets.internalSecretName" . | quote }}
                key: QueueService_RedisCache_Password
          volumeMounts:
            - name: {{ $QueueReadercacheName }}-data
              mountPath: /data
            - name: {{ $QueueReadercacheName }}-config
              mountPath: /usr/local/etc/redis
          {{- if $qrCfg.internalCache.redisSettings.resources.enabled }}
          resources:
            {{- if $qrCfg.internalCache.redisSettings.resources.limits }}
            limits:
              {{- if $qrCfg.internalCache.redisSettings.resources.limits.cpu }}
              cpu: {{ $qrCfg.internalCache.redisSettings.resources.limits.cpu | quote }}
              {{- end }}
              {{- if $qrCfg.internalCache.redisSettings.resources.limits.memory }}
              memory: {{ $qrCfg.internalCache.redisSettings.resources.limits.memory }}
              {{- end }}
            {{- end }}
            {{- if $qrCfg.internalCache.redisSettings.resources.requests }}
            requests:
              {{- if $qrCfg.internalCache.redisSettings.resources.requests.cpu | quote }}
              cpu: {{ $qrCfg.internalCache.redisSettings.resources.requests.cpu }}
              {{- end }}
              {{- if $qrCfg.internalCache.redisSettings.resources.requests.memory }}
              memory: {{ $qrCfg.internalCache.redisSettings.resources.requests.memory }}
              {{- end }}
            {{- end }}
          {{- end }}
          readinessProbe:
            exec:
              {{- if not (eq .Values.secretsManagement.provider "sdk") }}
              command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG"]
              {{- end }}
              {{- if eq .Values.secretsManagement.provider "sdk" }}
              command: ["sh", "-c", "redis-cli ping | grep PONG"]
              {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            exec:
              {{- if not (eq .Values.secretsManagement.provider "sdk") }}
              command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG"]
              {{- end }}
              {{- if eq .Values.secretsManagement.provider "sdk" }}
              command: ["sh", "-c", "redis-cli ping | grep PONG"]
              {{- end }}
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
      {{- include "rpi.pod.securityContext" (dict "sc" $secCtx) | nindent 6 }}
      volumes:
        - name: {{ $QueueReadercacheName }}-config
          configMap:
            name: {{ $QueueReadercacheName }}-config
        {{- if $qrCfg.internalCache.redisSettings.existingClaim }}
        - name: {{ $QueueReadercacheName }}-data
          persistentVolumeClaim:
            claimName: {{ $qrCfg.internalCache.redisSettings.existingClaim }}
        {{- else if not $qrCfg.internalCache.redisSettings.volumeClaimTemplates.enabled }}
        - name: {{ $QueueReadercacheName }}-data
          emptyDir: {}
        {{- end }}
  {{- if and $qrCfg.internalCache.redisSettings.volumeClaimTemplates.enabled (not $qrCfg.internalCache.redisSettings.existingClaim) }}
  volumeClaimTemplates:
    - metadata:
        name: {{ $QueueReadercacheName }}-data
      spec:
        accessModes:
          - {{ $qrCfg.internalCache.redisSettings.volumeClaimTemplates.accessModes | default "ReadWriteOnce" }}
        {{- if $qrCfg.internalCache.redisSettings.volumeClaimTemplates.storageClassName }}
        storageClassName: {{ $qrCfg.internalCache.redisSettings.volumeClaimTemplates.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ $qrCfg.internalCache.redisSettings.volumeClaimTemplates.storage | quote }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
