{{- $npCfg := fromYaml (include "rpi.merged.networkPolicy" .) -}}
{{- $rtCfg := fromYaml (include "rpi.merged.service" (dict "root" . "name" "realtimeapi")) -}}
{{- $execCfg := fromYaml (include "rpi.merged.service" (dict "root" . "name" "executionservice")) -}}
{{- if $npCfg.enabled }}
# Default deny all ingress traffic in the namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" "default-deny" "component" "network-policy") | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Allow ingress controller to reach API services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-apis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" "allow-ingress-to-apis" "component" "network-policy") | nindent 4 }}
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - rpi-realtimeapi
          - rpi-interactionapi
          - rpi-integrationapi
          - rpi-deploymentapi
          - rpi-callbackapi
          - rpi-queuereader
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8080

---
# Allow inter-service communication within RPI
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rpi-internal
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" "allow-rpi-internal" "component" "network-policy") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: rpi
      app.kubernetes.io/part-of: smartactivation
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: rpi
              app.kubernetes.io/part-of: smartactivation

---
# Allow Redis access from services that need it
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-access
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" "allow-redis-access" "component" "network-policy") | nindent 4 }}
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - rpi-realtimeapi-cache
          - rpi-queuereader-cache
          - rpi-twiliomessaging-cache
          - cdp-cache
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: rpi
              app.kubernetes.io/part-of: smartactivation
      ports:
        - protocol: TCP
          port: 6379

---
# Allow RabbitMQ access from services that need it
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rabbitmq-access
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" "allow-rabbitmq-access" "component" "network-policy") | nindent 4 }}
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - rpi-realtimeapi-rabbitmq
          - rpi-queuereader-rabbitmq
          - cdp-messageq
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: rpi
              app.kubernetes.io/part-of: smartactivation
      ports:
        - protocol: TCP
          port: 5672
        - protocol: TCP
          port: 15672

---
# Allow Prometheus scraping if custom metrics are enabled
{{- if or .Values.customMetrics.enabled $rtCfg.customMetrics.enabled $execCfg.customMetrics.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" "allow-prometheus-scrape" "component" "network-policy") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: rpi
      app.kubernetes.io/part-of: smartactivation
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 8080
{{- end }}

{{- if $npCfg.allowDNS }}
---
# Allow DNS resolution for all pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" "allow-dns" "component" "network-policy") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: rpi
      app.kubernetes.io/part-of: smartactivation
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}

---
# Default deny all egress traffic to enforce least-privilege networking.
# Explicit egress policies below allow only necessary outbound communication.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" "default-deny-egress" "component" "network-policy") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: rpi
      app.kubernetes.io/part-of: smartactivation
  policyTypes:
    - Egress

---
# Allow egress between RPI internal services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rpi-internal-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" "allow-rpi-internal-egress" "component" "network-policy") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: rpi
      app.kubernetes.io/part-of: smartactivation
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: rpi

---
# Allow egress to external databases and cloud services (HTTPS)
# This permits outbound connections to databases, cloud APIs, and SMTP.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" "allow-external-egress" "component" "network-policy") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: rpi
      app.kubernetes.io/part-of: smartactivation
  policyTypes:
    - Egress
  egress:
    # Allow HTTPS egress (cloud APIs, external services)
    - ports:
        - protocol: TCP
          port: 443
    # Allow database egress (SQL Server)
    - ports:
        - protocol: TCP
          port: 1433
    # Allow database egress (PostgreSQL)
    - ports:
        - protocol: TCP
          port: 5432
    # Allow database egress (MongoDB)
    - ports:
        - protocol: TCP
          port: 27017
    # Allow SMTP egress
    - ports:
        - protocol: TCP
          port: {{ .Values.SMTPSettings.SMTP_Port | default 587 }}

---
# Block access to cloud instance metadata endpoints (169.254.169.254)
# Prevents SSRF attacks from reaching cloud provider metadata services.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-cloud-metadata
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" "deny-cloud-metadata" "component" "network-policy") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: rpi
      app.kubernetes.io/part-of: smartactivation
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32
{{- end }}
